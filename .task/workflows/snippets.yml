version: "3"

vars:
  RUNNER: "alef-snippets"
  SNIPPETS_DIR: "docs/snippets"
  ALEF_VERSION: "0.16.23"

tasks:
  install:
    desc: Install alef-snippets (matched to the alef version pinned in alef.toml)
    status:
      - command -v {{.RUNNER}}
    cmds:
      - cargo install --git https://github.com/kreuzberg-dev/alef --tag v{{.ALEF_VERSION}} alef-snippets --features cli --locked --force

  list:
    desc: List all documentation snippets
    cmds:
      - "{{.RUNNER}} list --snippets {{.SNIPPETS_DIR}}"

  list:lang:
    desc: List snippets for specific languages (set LANGUAGES=rust,python)
    requires:
      vars: [LANGUAGES]
    cmds:
      - "{{.RUNNER}} list --snippets {{.SNIPPETS_DIR}} --languages {{.LANGUAGES}}"

  audit:
    desc: Audit snippet inventory + report coverage gaps across bindings
    cmds:
      - "{{.RUNNER}} audit --snippets {{.SNIPPETS_DIR}}"

  validate:syntax:
    desc: Syntax-check all snippets
    cmds:
      - "{{.RUNNER}} validate --snippets {{.SNIPPETS_DIR}} --level syntax"

  validate:compile:
    desc: Compile-check all snippets
    cmds:
      - "{{.RUNNER}} validate --snippets {{.SNIPPETS_DIR}} --level compile"

  validate:run:
    desc: Run all snippets
    cmds:
      - "{{.RUNNER}} validate --snippets {{.SNIPPETS_DIR}} --level run"

  validate:lang:
    desc: Validate snippets for specific languages (set LANGUAGES=rust,python LEVEL=syntax)
    requires:
      vars: [LANGUAGES]
    vars:
      LEVEL: '{{ .LEVEL | default "syntax" }}'
    cmds:
      - "{{.RUNNER}} validate --snippets {{.SNIPPETS_DIR}} --languages {{.LANGUAGES}} --level {{.LEVEL}}"
