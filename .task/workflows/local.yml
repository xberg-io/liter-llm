version: "3"

tasks:
  up:
    desc: Start Ollama via Docker Compose for local LLM testing
    cmds:
      - docker compose -f docker/docker-compose.local-llm.yml up -d
      - |
        echo "Waiting for Ollama health check..."
        for i in $(seq 1 120); do
          if docker compose -f docker/docker-compose.local-llm.yml ps --format json | grep -q '"healthy"'; then
            echo "Ollama is ready"
            break
          fi
          if [ "$i" -eq 120 ]; then
            echo "ERROR: Ollama failed to become healthy within 120s"
            exit 1
          fi
          sleep 1
        done

  down:
    desc: Stop local LLM infrastructure
    cmds:
      - docker compose -f docker/docker-compose.local-llm.yml down -v

  test:
    desc: Run local LLM integration tests (requires Ollama running)
    cmds:
      # Sequential: all tests share single Ollama instance; parallel would cause contention
      - >
        cargo test -p liter-llm --test local_llm
        -- --ignored --test-threads=1
    env:
      OLLAMA_BASE_URL: http://localhost:11434
