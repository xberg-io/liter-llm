version: "3"

# Documentation build + lint + snippet workflows.
# The docs site is an Astro Starlight project under docs-site/ that consumes the
# shared @xberg-io/docs-theme. Snippet commands wrap `alef snippets` and target
# the relocated docs-site/src/snippets tree.

tasks:
  build:
    desc: Build documentation
    cmds:
      - pnpm --dir docs-site install --frozen-lockfile
      - pnpm --dir docs-site build

  build:strict:
    desc: Build documentation (CI-equivalent; astro build fails on errors)
    cmds:
      - pnpm --dir docs-site install --frozen-lockfile
      - pnpm --dir docs-site build

  serve:
    desc: Serve documentation locally with live reload
    cmds:
      - pnpm --dir docs-site install
      - pnpm --dir docs-site dev

  lint:links:
    desc: Check links with lychee
    cmds:
      # Link-check the built site so root-relative links resolve against dist/.
      - task: build
      - lychee --offline --config .lychee.toml --root-dir "$PWD/docs-site/dist" docs-site/dist README.md

  lint:prose:
    desc: Lint prose with textlint
    cmds:
      - npx textlint 'docs-site/src/content/docs/**/*.{md,mdx}'

  # Snippet commands target docs-site/src/snippets — the canonical hand-written
  # snippets imported into Starlight tabs. The alef-emitted docs-site reference
  # tree is validated separately via `alef docs`.

  snippets:list:
    desc: List all documentation snippets discovered by alef
    cmds:
      - alef snippets list --snippets docs-site/src/snippets

  snippets:list:lang:
    desc: List snippets filtered to specific languages (LANGUAGES=rust,python)
    requires:
      vars: [LANGUAGES]
    cmds:
      - alef snippets list --snippets docs-site/src/snippets --languages {{.LANGUAGES}}

  snippets:validate:
    desc: Syntax-validate all snippet entries via alef
    cmds:
      - alef snippets validate --snippets docs-site/src/snippets --timeout 120

  snippets:validate:lang:
    desc: Validate snippets for specific languages (LANGUAGES=rust,python LEVEL=syntax)
    requires:
      vars: [LANGUAGES]
    vars:
      LEVEL: '{{ .LEVEL | default "syntax" }}'
    cmds:
      - alef snippets validate --snippets docs-site/src/snippets --languages {{.LANGUAGES}} --level {{.LEVEL}}

  snippets:gaps:
    desc: Report unreferenced snippets + missing language variants
    cmds:
      - alef snippets gaps --snippets docs-site/src/snippets --docs docs-site/src/content/docs

  snippets:audit:
    desc: Audit snippet structure under docs-site/src/snippets
    cmds:
      - alef snippets audit --snippets docs-site/src/snippets

  snippets:all:
    desc: Run audit + gaps + validate (canonical docs:snippets gate)
    cmds:
      - alef snippets audit --snippets docs-site/src/snippets
      - alef snippets gaps --snippets docs-site/src/snippets --docs docs-site/src/content/docs
      - alef snippets validate --snippets docs-site/src/snippets --timeout 120
