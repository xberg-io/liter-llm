version: "3"

vars:
  JAVA_VERSION: "25"

tasks:
  install:
    desc: Install Java dependencies
    dir: packages/java
    cmds:
      - cmd: bash -c 'if [ -f ~/.sdkman/bin/sdkman-init.sh ]; then source ~/.sdkman/bin/sdkman-init.sh && sdk use java 25.0.2-tem && sdk use maven 3.9.11; fi && mvn clean install -DskipTests'
        platforms: [linux, darwin]
      - cmd: mvn clean install -DskipTests
        platforms: [windows]

  setup:
    desc: Setup Java environment (alias for install)
    dir: packages/java
    cmds:
      - task: java:install

  build:
    desc: Build Java package (depends on Rust FFI)
    cmds:
      - cmd: bash -c 'if [ -f ~/.sdkman/bin/sdkman-init.sh ]; then source ~/.sdkman/bin/sdkman-init.sh && sdk use java 25.0.2-tem && sdk use maven 3.9.11; fi && mvn -f packages/java/pom.xml clean package -DskipTests'
        platforms: [linux, darwin]
      - cmd: mvn -f packages/java/pom.xml clean package -DskipTests
        platforms: [windows]

  build:dev:
    desc: Build Java package in debug mode
    dir: packages/java
    cmds:
      - cmd: bash -c 'if [ -f ~/.sdkman/bin/sdkman-init.sh ]; then source ~/.sdkman/bin/sdkman-init.sh && sdk use java 25.0.2-tem && sdk use maven 3.9.11; fi && mvn clean package -DskipTests -DdebugMode=true'
        platforms: [linux, darwin]
      - cmd: mvn clean package -DskipTests -DdebugMode=true
        platforms: [windows]

  build:release:
    desc: Build Java package in release mode (optimized)
    cmds:
      - cmd: bash -c 'if [ -f ~/.sdkman/bin/sdkman-init.sh ]; then source ~/.sdkman/bin/sdkman-init.sh && sdk use java 25.0.2-tem && sdk use maven 3.9.11; fi && mvn -f packages/java/pom.xml clean package -DskipTests -Pproduction'
        platforms: [linux, darwin]
      - cmd: mvn -f packages/java/pom.xml clean package -DskipTests -Pproduction
        platforms: [windows]

  build:ci:
    desc: Build Java package in CI mode
    cmds:
      - cmd: bash -c 'if [ -f ~/.sdkman/bin/sdkman-init.sh ]; then source ~/.sdkman/bin/sdkman-init.sh && sdk use java 25.0.2-tem && sdk use maven 3.9.11; fi && mvn -f packages/java/pom.xml clean package -DskipTests'
        platforms: [linux, darwin]
      - cmd: mvn -f packages/java/pom.xml clean package -DskipTests
        platforms: [windows]

  test:
    desc: Run Java tests
    dir: packages/java
    cmds:
      - cmd: bash -c 'if [ -f ~/.sdkman/bin/sdkman-init.sh ]; then source ~/.sdkman/bin/sdkman-init.sh && sdk use java 25.0.2-tem && sdk use maven 3.9.11; fi && mvn test -q'
        platforms: [linux, darwin]
      - cmd: mvn test -q
        platforms: [windows]

  test:ci:
    desc: Run Java tests in CI mode
    env:
      MAVEN_OPTS: "-Xmx1024m"
    dir: packages/java
    cmds:
      - cmd: bash -c 'if [ -f ~/.sdkman/bin/sdkman-init.sh ]; then source ~/.sdkman/bin/sdkman-init.sh && sdk use java 25.0.2-tem && sdk use maven 3.9.11; fi && mvn test -B -q'
        platforms: [linux, darwin]
      - cmd: mvn test -B -q
        platforms: [windows]

  test:verbose:
    desc: Run Java tests with verbose output
    dir: packages/java
    cmds:
      - cmd: bash -c 'if [ -f ~/.sdkman/bin/sdkman-init.sh ]; then source ~/.sdkman/bin/sdkman-init.sh && sdk use java 25.0.2-tem && sdk use maven 3.9.11; fi && mvn test -X'
        platforms: [linux, darwin]
      - cmd: mvn test -X
        platforms: [windows]

  lint:
    desc: Lint all Java code (spotless check + checkstyle + PMD)
    dir: packages/java
    cmds:
      - cmd: bash -c 'if [ -f ~/.sdkman/bin/sdkman-init.sh ]; then source ~/.sdkman/bin/sdkman-init.sh && sdk use java 25.0.2-tem && sdk use maven 3.9.11; fi && mvn spotless:check && mvn checkstyle:check && mvn pmd:cpd-check'
        platforms: [linux, darwin]
      - cmd: |
          mvn spotless:check
          mvn checkstyle:check
          mvn pmd:cpd-check
        platforms: [windows]

  lint:check:
    desc: Check all Java code linting without modifications
    dir: packages/java
    cmds:
      - cmd: bash -c 'if [ -f ~/.sdkman/bin/sdkman-init.sh ]; then source ~/.sdkman/bin/sdkman-init.sh && sdk use java 25.0.2-tem && sdk use maven 3.9.11; fi && mvn spotless:check && mvn checkstyle:check && mvn pmd:cpd-check'
        platforms: [linux, darwin]
      - cmd: |
          mvn spotless:check
          mvn checkstyle:check
          mvn pmd:cpd-check
        platforms: [windows]

  format:
    desc: Format all Java code (spotless)
    dir: packages/java
    cmds:
      - cmd: bash -c 'if [ -f ~/.sdkman/bin/sdkman-init.sh ]; then source ~/.sdkman/bin/sdkman-init.sh && sdk use java 25.0.2-tem && sdk use maven 3.9.11; fi && mvn spotless:apply'
        platforms: [linux, darwin]
      - cmd: mvn spotless:apply
        platforms: [windows]

  format:check:
    desc: Check all Java code formatting (spotless)
    dir: packages/java
    cmds:
      - cmd: bash -c 'if [ -f ~/.sdkman/bin/sdkman-init.sh ]; then source ~/.sdkman/bin/sdkman-init.sh && sdk use java 25.0.2-tem && sdk use maven 3.9.11; fi && mvn spotless:check'
        platforms: [linux, darwin]
      - cmd: mvn spotless:check
        platforms: [windows]

  clean:
    desc: Clean Java build artifacts
    dir: packages/java
    cmds:
      - cmd: bash -c 'if [ -f ~/.sdkman/bin/sdkman-init.sh ]; then source ~/.sdkman/bin/sdkman-init.sh && sdk use java 25.0.2-tem && sdk use maven 3.9.11; fi && mvn clean'
        platforms: [linux, darwin]
      - cmd: mvn clean
        platforms: [windows]

  update:
    desc: Update Java dependencies and plugins (including linters)
    dir: packages/java
    cmds:
      - cmd: bash -c 'if [ -f ~/.sdkman/bin/sdkman-init.sh ]; then source ~/.sdkman/bin/sdkman-init.sh && sdk use java 25.0.2-tem && sdk use maven 3.9.11; fi && echo "Updating Java dependencies and plugins..." && mvn -DallowSnapshots=false versions:use-latest-releases -DprocessDependencies=true -DprocessParent=false && echo "Updating plugin versions in properties..." && mvn -DallowSnapshots=false versions:update-properties && echo "Displaying final dependency updates..." && mvn -DallowSnapshots=false versions:display-dependency-updates && echo "Displaying final plugin updates..." && mvn -DallowSnapshots=false versions:display-plugin-updates'
        platforms: [linux, darwin]
      - cmd: |
          echo "Updating Java dependencies and plugins..."
          mvn -DallowSnapshots=false versions:use-latest-releases -DprocessDependencies=true -DprocessParent=false
          echo "Updating plugin versions in properties..."
          mvn -DallowSnapshots=false versions:update-properties
          echo "Displaying final dependency updates..."
          mvn -DallowSnapshots=false versions:display-dependency-updates
          echo "Displaying final plugin updates..."
          mvn -DallowSnapshots=false versions:display-plugin-updates
        platforms: [windows]

  e2e:generate:
    desc: Generate Java E2E tests from fixtures
    env:
      PROJECT_ROOT: "{{.PROJECT_ROOT}}"
    cmds:
      - alef e2e generate --lang java
      - task: e2e:format

  e2e:format:
    desc: Format Java bindings using Alef-configured format commands
    cmds:
      - alef fmt --lang java

  e2e:lint:
    desc: Lint Java bindings using Alef-configured lint commands
    cmds:
      - alef lint --lang java

  e2e:test:
    desc: Run Java E2E tests using Alef-configured test commands
    cmds:
      - alef test --lang java --e2e

  e2e:verify:
    desc: Regenerate and validate Java E2E suite (build + generate + lint + test)
    cmds:
      - task: build
      - task: e2e:generate
      - task: e2e:lint
      - task: e2e:test
