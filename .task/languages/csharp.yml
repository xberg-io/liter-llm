version: "3"

vars:
  FFI_LIB_PATH: '{{.PROJECT_ROOT}}/target/release/libliter_llm_ffi.{{if eq OS "darwin"}}dylib{{else if eq OS "windows"}}dll{{else}}so{{end}}'
  DOTNET_VERSION: "10.0"

tasks:
  install:
    desc: Restore C# dependencies
    dir: packages/csharp
    cmds:
      - dotnet restore LiterLlm/LiterLlm.csproj

  build:ffi:
    desc: Build FFI shared library for C#
    env:
      PROJECT_ROOT: "{{.PROJECT_ROOT}}"
    cmds:
      - cargo build -p liter-llm-ffi --release

  build:
    desc: Build C# binding (depends on Rust FFI)
    dir: packages/csharp
    cmds:
      - dotnet build LiterLlm/LiterLlm.csproj -c Release

  build:dev:
    desc: Build C# binding in debug mode
    dir: packages/csharp
    cmds:
      - dotnet build LiterLlm/LiterLlm.csproj -c Debug

  build:release:
    desc: Build C# binding in release mode (optimized)
    dir: packages/csharp
    cmds:
      - dotnet build LiterLlm/LiterLlm.csproj -c Release

  build:ci:
    desc: Build C# binding in CI mode
    dir: packages/csharp
    cmds:
      - dotnet build LiterLlm/LiterLlm.csproj -c Release

  package:
    desc: Pack C# NuGet package for publishing
    dir: packages/csharp
    cmds:
      - dotnet pack LiterLlm/LiterLlm.csproj -c Release --no-build {{.CLI_ARGS | default ""}}

  test:
    desc: Run C# tests (requires FFI built first)
    deps: [build:ffi]
    dir: packages/csharp
    env:
      LD_LIBRARY_PATH: "{{.PROJECT_ROOT}}/target/release:${LD_LIBRARY_PATH:-}"
      DYLD_LIBRARY_PATH: "{{.PROJECT_ROOT}}/target/release:${DYLD_LIBRARY_PATH:-}"
    cmds:
      - dotnet test LiterLlm/LiterLlm.csproj -c Release

  test:ci:
    desc: Run C# tests in CI mode
    env:
      DOTNET_CLI_TELEMETRY_OPTOUT: "true"
    dir: packages/csharp
    cmds:
      - dotnet test LiterLlm/LiterLlm.csproj -c Release

  test:verbose:
    desc: Run C# tests with verbose output
    dir: packages/csharp
    cmds:
      - dotnet test LiterLlm/LiterLlm.csproj -c Release --verbosity detailed

  lint:
    desc: Lint all C# code for style violations with auto-fix (dotnet format)
    dir: packages/csharp
    cmds:
      - dotnet format LiterLlm/LiterLlm.csproj

  lint:check:
    desc: Check all C# code style violations without modifications (dotnet format verify)
    dir: packages/csharp
    cmds:
      - dotnet restore LiterLlm/LiterLlm.csproj
      - dotnet format LiterLlm/LiterLlm.csproj --verify-no-changes

  format:
    desc: Format C# code with automatic style corrections (dotnet format)
    dir: packages/csharp
    cmds:
      - dotnet format LiterLlm/LiterLlm.csproj

  format:check:
    desc: Check C# code formatting without modifications (dotnet format verify)
    dir: packages/csharp
    cmds:
      - dotnet restore LiterLlm/LiterLlm.csproj
      - dotnet format LiterLlm/LiterLlm.csproj --verify-no-changes

  clean:
    desc: Clean C# build artifacts
    dir: packages/csharp
    cmds:
      - python -c "import shutil; [shutil.rmtree(d, ignore_errors=True) for d in ['bin', 'obj', '.vs']]"
      - dotnet clean LiterLlm/LiterLlm.csproj

  update:
    desc: Update C# dependencies to latest versions (including major versions)
    dir: packages/csharp
    cmds:
      - echo "Updating C# dependencies to latest versions..."
      - dotnet tool install --global dotnet-outdated-tool || dotnet tool update --global dotnet-outdated-tool
      - dotnet outdated LiterLlm/LiterLlm.csproj --upgrade
      - echo "Checking remaining outdated packages..."
      - dotnet list LiterLlm/LiterLlm.csproj package --outdated || true

  e2e:generate:
    desc: Generate C# E2E tests from fixtures
    env:
      PROJECT_ROOT: "{{.PROJECT_ROOT}}"
    cmds:
      - alef e2e generate --lang csharp
      - task: e2e:format

  e2e:format:
    desc: Format C# bindings using Alef-configured format commands
    cmds:
      - alef fmt --lang csharp

  e2e:lint:
    desc: Lint C# bindings using Alef-configured lint commands
    cmds:
      - alef lint --lang csharp

  e2e:test:
    desc: Run C# E2E tests using Alef-configured test commands
    cmds:
      - alef test --lang csharp --e2e

  e2e:verify:
    desc: Regenerate and validate C# E2E suite (generate + lint + test)
    cmds:
      - task: e2e:generate
      - task: e2e:lint
      - task: e2e:test
