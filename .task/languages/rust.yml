version: "3"

tasks:
  install:
    desc: Install Rust toolchain and tools
    cmds:
      - echo "Checking Rust toolchain..."
      - rustc --version
      - rustup component add rustfmt clippy
      - task: install:cargo-machete

  install:cargo-machete:
    desc: Install cargo-machete for unused dependency detection
    cmds:
      - cargo-machete --version 2>/dev/null || cargo install cargo-machete
    ignore_error: true

  build:
    desc: Build all crates
    cmds:
      - cargo build --workspace

  build:release:
    desc: Build in release mode (optimized)
    cmds:
      - cargo build --workspace --release

  test:
    desc: Run all Rust tests
    cmds:
      - cargo test --workspace

  lint:
    desc: Auto-fix Rust code linting (cargo fmt + clippy)
    cmds:
      - cargo fmt --all
      - cargo clippy --workspace --exclude liter-llm-wasm --exclude liter-llm-swift --exclude liter-llm-dart --fix --allow-dirty --allow-staged -- -D warnings

  lint:check:
    desc: Check Rust code linting without modifications
    cmds:
      - cargo fmt --all -- --check
      - cargo clippy --workspace --exclude liter-llm-wasm --exclude liter-llm-swift --exclude liter-llm-dart -- -D warnings

  format:
    desc: Format all Rust code
    cmds:
      - cargo fmt --all

  format:check:
    desc: Check Rust formatting (CI)
    cmds:
      - cargo fmt --all -- --check

  clean:
    desc: Clean Rust build artifacts
    cmds:
      - cargo clean

  doc:
    desc: Generate and open documentation
    cmds:
      - cargo doc --workspace --no-deps --open

  update:
    desc: Update Rust dependencies
    cmds:
      - echo "Updating Rust dependencies (workspace)..."
      - cargo upgrade --incompatible
      - cargo update
      - echo "Updating Rust dependencies (e2e)..."
      - cargo upgrade --incompatible --manifest-path e2e/rust/Cargo.toml
      - cargo update --manifest-path e2e/rust/Cargo.toml

  e2e:generate:
    desc: Generate and format Rust E2E tests from fixtures
    env:
      PROJECT_ROOT: "{{.PROJECT_ROOT}}"
    cmds:
      - alef e2e generate --lang rust
      - task: e2e:format

  e2e:format:
    desc: Format Rust bindings using Alef-configured format commands
    cmds:
      - alef fmt --lang rust

  e2e:test:
    desc: Run Rust E2E tests using Alef-configured test commands
    cmds:
      - alef test --lang rust --e2e

  e2e:verify:
    desc: Regenerate and validate Rust E2E suite (generate + format + test)
    cmds:
      - task: e2e:generate
      - task: e2e:format
      - task: e2e:test
