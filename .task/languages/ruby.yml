version: "3"

tasks:
    deps:
        desc: Install Ruby dependencies
        dir: packages/ruby
        cmds:
            - bundle install

    install:
        desc: Install Ruby dependencies (alias for deps)
        cmds:
            - task: deps

    update:
        desc: Update Ruby dependencies to latest versions
        dir: packages/ruby
        cmds:
            - echo "Updating Ruby dependencies to latest versions..."
            - bundle update --all --conservative=false
            - echo "Checking for remaining outdated dependencies..."
            - bundle outdated || true

    build:
        desc: Build Ruby native extension (requires Ruby 3.2-3.4 via rbenv)
        dir: packages/ruby
        env:
            PROJECT_ROOT: "{{.PROJECT_ROOT}}"
            CARGO_TARGET_DIR: "{{.PROJECT_ROOT}}/target"
        cmds:
            - bundle exec rake compile

    test:
        desc: Run Ruby tests
        dir: packages/ruby
        env:
            PROJECT_ROOT: "{{.PROJECT_ROOT}}"
        cmds:
            - bundle exec rspec

    format:
        desc: Format Ruby code
        dir: packages/ruby
        cmds:
            - bundle exec rubocop --config .rubocop.yml --autocorrect-all .

    format:check:
        desc: Check Ruby formatting (CI)
        dir: packages/ruby
        cmds:
            - bundle exec rubocop --config .rubocop.yml --format simple .

    lint:
        desc: Lint Ruby code
        dir: packages/ruby
        cmds:
            - bundle exec rubocop --config .rubocop.yml .

    lint:check:
        desc: Check Ruby linting without modifications (CI)
        dir: packages/ruby
        cmds:
            - bundle exec rubocop --config .rubocop.yml --format simple .

    typecheck:
        desc: Run Steep type checking
        dir: packages/ruby
        cmds:
            - bundle exec steep check

    rbs-validate:
        desc: Validate RBS type signatures
        dir: packages/ruby
        cmds:
            - bundle exec rbs validate

    clean:
        desc: Clean Ruby build artifacts
        dir: packages/ruby
        cmds:
            - rm -rf tmp lib/liter_llm/liter_llm_ruby.* vendor/liter-llm-core vendor/Cargo.toml

    e2e:generate:
        desc: Generate Ruby E2E tests from fixtures
        env:
            PROJECT_ROOT: "{{.PROJECT_ROOT}}"
        cmds:
            - alef e2e generate --lang ruby

    e2e:test:
        desc: Run Ruby E2E tests using Alef-configured test commands
        cmds:
            - alef test --lang ruby --e2e
