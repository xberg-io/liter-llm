version: "3"

tasks:
  build:
    desc: Build PHP extension (requires php-config)
    env:
      PROJECT_ROOT: "{{.PROJECT_ROOT}}"
    cmds:
      - cargo build --release --manifest-path crates/liter-llm-php/Cargo.toml

  build:dev:
    desc: Build PHP extension in debug mode
    env:
      PROJECT_ROOT: "{{.PROJECT_ROOT}}"
    cmds:
      - cargo build --manifest-path crates/liter-llm-php/Cargo.toml

  test:
    desc: Run PHP smoke test
    env:
      PROJECT_ROOT: "{{.PROJECT_ROOT}}"
    cmds:
      - php examples/php_smoke/convert.php

  format:
    desc: Format PHP code
    cmds:
      - poly fmt --fix packages/php

  format:check:
    desc: Check PHP formatting (CI)
    cmds:
      - poly fmt --check packages/php

  lint:
    desc: Lint PHP code
    cmds:
      - poly lint packages/php

  lint:check:
    desc: Check PHP linting without modifications (CI)
    cmds:
      - poly lint packages/php

  clean:
    desc: Clean PHP build artifacts
    cmds:
      - rm -rf crates/liter-llm-php/vendor crates/liter-llm-php/target

  update:
    desc: Update PHP dependencies to latest versions (including major versions)
    cmds:
      - echo "Updating root composer.json dependencies..."
      - composer update --with-all-dependencies || true
      - echo "Checking remaining outdated dependencies..." && composer outdated --direct || true
      - echo "Updating e2e/php dependencies to latest versions..."
      - cd e2e/php && composer update --with-all-dependencies || true
      - cd e2e/php && echo "Checking remaining outdated dependencies..." && composer outdated --direct || true

  e2e:generate:
    desc: Generate PHP E2E tests from fixtures
    env:
      PROJECT_ROOT: "{{.PROJECT_ROOT}}"
    cmds:
      - alef e2e generate --lang php

  e2e:test:
    desc: Run PHP E2E tests using Alef-configured test commands
    cmds:
      - alef test --lang php --e2e
