version: "3"

includes:
  _cfg:
    taskfile: .task/config/vars.yml
    internal: true
  _platforms:
    taskfile: .task/config/platforms.yml
    internal: true
  rust:
    taskfile: .task/languages/rust.yml
  python:
    taskfile: .task/languages/python.yml
  node:
    taskfile: .task/languages/node.yml
  go:
    taskfile: .task/languages/go.yml
  java:
    taskfile: .task/languages/java.yml
  elixir:
    taskfile: .task/languages/elixir.yml
  c:
    taskfile: .task/languages/c.yml
  ruby:
    taskfile: .task/languages/ruby.yml
  wasm:
    taskfile: .task/languages/wasm.yml
  php:
    taskfile: .task/languages/php.yml
  csharp:
    taskfile: .task/languages/csharp.yml
  _build_wf:
    taskfile: .task/workflows/build.yml
    internal: true
  _test_wf:
    taskfile: .task/workflows/test.yml
    internal: true
  _lint_wf:
    taskfile: .task/workflows/lint.yml
    internal: true
  version:
    taskfile: .task/tools/version-sync.yml
  tools:
    taskfile: .task/tools/general.yml
  test-apps:
    taskfile: .task/tools/test-apps.yml
  docs:
    taskfile: .task/tools/docs.yml
  snippets:
    taskfile: .task/workflows/snippets.yml
  local:
    taskfile: .task/workflows/local.yml
  e2e:
    taskfile: .task/workflows/e2e.yml

vars:
  PROJECT_ROOT:
    sh: pwd
  VERSION:
    sh: python3 -c "import tomllib; print(tomllib.load(open('Cargo.toml','rb'))['workspace']['package']['version'])"

# Preconditions for task setup:
# - Rust toolchain (rustup) — install via https://rustup.rs
# - alef CLI — install via cargo install --git https://github.com/kreuzberg-dev/alef
# - prek — install via cargo install prek
# - Per-language tools auto-skipped via alef preconditions; install as needed:
#   - Python: uv, Node: pnpm (corepack enable), Ruby: bundle, PHP: composer
#   - Go: go, Java: mvn (use sdkman: task setup:sdkman), C#: dotnet, Elixir: mix

tasks:
  default:
    desc: Show available tasks
    cmds:
      - task --list

  setup:
    desc: "Install all dependencies and dev tools"
    cmds:
      - task: rust:install
      - alef setup
      - prek install
      - prek install --hook-type commit-msg

  setup:sdkman:
    desc: "Install and configure sdkman for JVM toolchain management (run separately if you need Java/Maven)"
    cmds:
      - task: _platforms:setup:sdkman

  ai-rulez:
    desc: Generate ai-rulez configuration files (CLAUDE.md, etc.)
    cmds:
      - task: tools:ai-rulez

  build:
    desc: Build core Rust library
    cmds:
      - task: rust:build

  build:all:
    desc: Build core libraries and ALL language bindings
    cmds:
      - task: rust:build
      - task: python:build
      - task: node:build
      - task: go:build
      - task: java:build
      - task: csharp:build
      - task: php:build
      - task: elixir:build
      - task: ruby:build
      - task: wasm:build

  build:release:
    desc: Build in release mode (optimized)
    cmds:
      - task: rust:build:release

  test:
    desc: Run Rust unit and FFI tests
    cmds:
      - task: rust:test

  test:all:
    desc: Run ALL test suites across all languages
    cmds:
      - task: rust:test
      - task: go:test
      - task: java:test
      - task: csharp:test
      - task: elixir:test

  proxy:test:
    desc: Run all proxy tests (unit + integration)
    cmds:
      - cargo test -p liter-llm-proxy

  proxy:docker:build:
    desc: Build proxy Docker image for testing
    cmds:
      - docker build -f docker/Dockerfile -t liter-llm:test .

  proxy:docker:test:
    desc: Run Docker integration tests locally
    deps: [proxy:docker:build]
    cmds:
      - python3 scripts/ci/docker/test_docker.py --image liter-llm:test --port 14000

  proxy:schemathesis:
    desc: Run schemathesis API contract tests against proxy Docker image
    cmds:
      - docker build -f docker/Dockerfile -t liter-llm:schemathesis .
      - |
        container_id=$(docker run -d -p 4111:4000 \
          -e LITER_LLM_MASTER_KEY=sk-schema-test \
          liter-llm:schemathesis)
        sleep 3
        FAILED=0
        schemathesis run http://localhost:4111/openapi.json \
          --max-examples=10 \
          --request-timeout=30000 \
          --header "Authorization: Bearer sk-schema-test" \
          --checks status_code_conformance,response_schema_conformance,negative_data_rejection || FAILED=1
        docker stop "$container_id"
        exit $FAILED

  lint:
    desc: Run all linters and formatters via prek (pre-commit framework)
    cmds:
      - prek run --all-files

  check:
    desc: Run all checks (lint + test)
    cmds:
      - task: lint
      - task: test

  format:
    desc: Format all code
    cmds:
      - alef fmt

  update:
    desc: Update all dependencies within current major versions
    cmds:
      - echo "Updating dependencies (within-major)..."
      - alef update
      - prek autoupdate
      - gh-actions-updater --update .
      - task: generate:pricing
      - echo "All dependencies updated"

  upgrade:
    desc: Upgrade all dependencies to latest versions (may cross major versions)
    cmds:
      - echo "Upgrading dependencies (latest)..."
      - alef update --latest
      - prek autoupdate
      - gh-actions-updater --update .
      - task: generate:pricing
      - echo "All dependencies upgraded"

  clean:
    desc: Clean all build artifacts
    cmds:
      - task: rust:clean
      - alef clean

  # Alef binding generation
  alef:extract:
    desc: Extract API surface from Rust source
    cmds:
      - alef extract

  alef:generate:
    desc: Generate all language bindings
    cmds:
      - alef generate

  alef:all:
    desc: Run full alef pipeline (extract + generate + stubs + scaffold + readme + docs + e2e)
    cmds:
      - alef all

  alef:verify:
    desc: Check bindings are up-to-date (CI)
    cmds:
      - alef verify --exit-code

  generate:all:
    desc: Regenerate all generated code
    cmds:
      - alef all

  generate:docs:
    desc: Generate API reference documentation
    cmds:
      - alef docs

  generate:docs:check:
    desc: Validate API reference docs are up-to-date (CI)
    cmds:
      - alef verify --exit-code

  generate:docs:normalize:
    desc: Normalize generated docs to match pre-commit formatting
    internal: true
    cmds:
      - |
        for f in docs/reference/*.md; do
          # Strip trailing whitespace (portable across macOS/Linux)
          sed -i.bak 's/[[:space:]]*$//' "$f" && rm -f "$f.bak"
        done

  generate:readme:
    desc: Generate package READMEs
    cmds:
      - alef readme

  generate:readme:check:
    desc: Validate package READMEs are up-to-date (CI)
    cmds:
      - alef verify --exit-code

  generate:providers-doc:
    desc: Generate providers documentation from schemas/providers.json
    cmds:
      - uv run --no-sync python scripts/generate_providers_doc.py

  generate:providers-doc:check:
    desc: Validate providers documentation is up-to-date (CI)
    cmds:
      - uv run --no-sync python scripts/generate_providers_doc.py --validate

  generate:pricing:
    desc: Refresh schemas/pricing.json from models.dev (also runs as part of `task update`/`upgrade`)
    cmds:
      - uv run --no-sync python scripts/generate_pricing.py

  generate:pricing:check:
    desc: Validate pricing.json is up-to-date with models.dev (CI)
    cmds:
      - uv run --no-sync python scripts/generate_pricing.py --validate

  test:e2e:
    desc: Generate and run e2e tests across all bindings (alias for e2e:verify:all)
    cmds:
      - task: e2e:verify:all

  e2e:generate:
    desc: Generate E2E tests for all languages from fixtures (alias for e2e:generate:all)
    cmds:
      - task: e2e:generate:all

  e2e:test:
    desc: Run E2E tests for all languages (alias for e2e:test:all)
    cmds:
      - task: e2e:test:all

  publish:validate:
    desc: "Validate publish manifests are consistent"
    cmds:
      - alef publish validate

  publish:prepare:
    desc: "Prepare packages for publishing (vendor deps, stage FFI)"
    cmds:
      - alef publish prepare

  publish:build:
    desc: "Build release artifacts for all languages"
    cmds:
      - alef publish build

  publish:package:
    desc: "Package built artifacts into distributable archives"
    cmds:
      - alef publish package -o dist/

  e2e:test:rust:
    desc: Run Rust E2E tests (alias for rust:e2e:test)
    cmds:
      - task: rust:e2e:test
