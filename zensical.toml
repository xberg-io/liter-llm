[project]
site_name = "liter-llm"
site_description = "Universal LLM API client for 143 providers with polyglot bindings."
site_url = "https://docs.liter-llm.kreuzberg.dev"
site_author = "kreuzberg.dev"
repo_name = "xberg-io/liter-llm"
repo_url = "https://github.com/xberg-io/liter-llm"
edit_uri = "edit/main/docs/"
copyright = "Copyright &copy; 2024-2026 Kreuzberg.dev"
extra_css = ["css/extra.css"]
nav = [
  { "Home" = "index.md" },

  { "Get Started" = [
    { "Installation" = "getting-started/installation.md" },
  ] },

  { "Guides" = [
    { "Core" = [
      { "AI Coding Assistants" = "usage/agent-skills.md" },
      { "Chat & Streaming" = "usage/chat.md" },
      { "Multimodal I/O" = "usage/multimodal.md" },
      { "Embeddings & Rerank" = "usage/embeddings.md" },
      { "Media (Images, Speech, Transcription)" = "usage/media.md" },
      { "Search & OCR" = "usage/search-ocr.md" },
      { "Files & Batches" = "usage/files.md" },
      { "Configuration" = "usage/configuration.md" },
    ] },
    { "Advanced" = [
      { "Authentication" = "usage/authentication.md" },
      { "Batches" = "usage/batches.md" },
      { "Fallback & Routing" = "usage/fallback-routing.md" },
      { "Local LLMs" = "usage/local-llms.md" },
      { "Error Handling" = "usage/error-handling.md" },
      { "Multi-Tenancy" = "usage/multi-tenancy.md" },
      { "Observability" = "usage/observability.md" },
    ] },
    { "Deployment" = [
      { "Proxy Server" = "server/proxy-server.md" },
      { "Proxy Configuration" = "server/proxy-configuration.md" },
      { "Embedding the Proxy" = "server/embedding.md" },
      { "Key Resolvers" = "server/key-resolvers.md" },
      { "MCP Server" = "server/mcp-server.md" },
      { "MCP & IDE Integration" = "usage/mcp-integration.md" },
    ] },
  ] },

  { "Concepts" = [
    { "Architecture" = "concepts/architecture.md" },
    { "Feature Flags" = "concepts/feature-flags.md" },
    { "Tokenizer" = "concepts/tokenizer.md" },
    { "Cost Estimation" = "concepts/cost-estimation.md" },
  ] },

  { "Reference" = [
    { "API" = [
      { "Rust" = "reference/api-rust.md" },
      { "Python" = "reference/api-python.md" },
      { "TypeScript / Node.js" = "reference/api-typescript.md" },
      { "Go" = "reference/api-go.md" },
      { "Java" = "reference/api-java.md" },
      { "Kotlin (Android)" = "reference/api-kotlin-android.md" },
      { "C#" = "reference/api-csharp.md" },
      { "Ruby" = "reference/api-ruby.md" },
      { "PHP" = "reference/api-php.md" },
      { "Elixir" = "reference/api-elixir.md" },
      { "Dart" = "reference/api-dart.md" },
      { "Swift" = "reference/api-swift.md" },
      { "Zig" = "reference/api-zig.md" },
      { "WebAssembly" = "reference/api-wasm.md" },
      { "C / FFI" = "reference/api-c.md" },
    ] },
    { "Providers" = "providers.md" },
    { "Configuration" = "reference/configuration.md" },
    { "Types" = "reference/types.md" },
    { "Errors" = "reference/errors.md" },
  ] },

  { "More" = [
    { "Contributing" = "contributing.md" },
    { "Changelog" = "CHANGELOG.md" },
    { "Ecosystem" = "ecosystem.md" },
  ] },
]

[project.theme]
name = "material"
custom_dir = "docs/overrides"
logo = "assets/logo.svg"
favicon = "assets/favicon.ico"
language = "en"
features = [
  "content.code.copy",
  "content.code.annotate",
  "content.tabs.link",
  "navigation.instant",
  "navigation.instant.progress",
  "navigation.path",
  "navigation.prune",
  "navigation.indexes",
  "navigation.sections",
  "navigation.tabs",
  "navigation.tabs.sticky",
  "navigation.tracking",
  "navigation.top",
  "search.highlight",
  "search.share",
  "search.suggest",
  "toc.follow",
  "toc.integrate",
  "announce.dismiss",
]

[project.theme.font]
text = "Inter"
code = "JetBrains Mono"

[project.theme.icon]
repo = "github"
search = "search"

[[project.theme.palette]]
media = "(prefers-color-scheme: dark)"
scheme = "slate"
primary = "custom"
accent = "custom"
toggle.icon = "sun"
toggle.name = "Switch to light mode"

[[project.theme.palette]]
media = "(prefers-color-scheme: light)"
scheme = "default"
primary = "custom"
accent = "custom"
toggle.icon = "moon"
toggle.name = "Switch to dark mode"

# Markdown extensions

[project.markdown_extensions.admonition]
[project.markdown_extensions.attr_list]
[project.markdown_extensions.def_list]
[project.markdown_extensions.footnotes]
[project.markdown_extensions.md_in_html]
[project.markdown_extensions.tables]

[project.markdown_extensions.toc]
permalink = true
toc_depth = 3

[project.markdown_extensions.pymdownx.details]

[project.markdown_extensions.pymdownx.emoji]
emoji_index = "zensical.extensions.emoji.twemoji"
emoji_generator = "zensical.extensions.emoji.to_svg"
options = { custom_icons = ["docs/overrides/.icons"] }

[project.markdown_extensions.pymdownx.highlight]
anchor_linenums = true
line_spans = "__span"
pygments_lang_class = true
linenums = false
use_pygments = true

[project.markdown_extensions.pymdownx.inlinehilite]
[project.markdown_extensions.pymdownx.keys]
[project.markdown_extensions.pymdownx.mark]
[project.markdown_extensions.pymdownx.smartsymbols]

[project.markdown_extensions.pymdownx.snippets]
base_path = [".", "docs"]
check_paths = true

[project.markdown_extensions.pymdownx.superfences]
custom_fences = [
  { name = "mermaid", class = "mermaid", format = "pymdownx.superfences.fence_code_format" },
]

[project.markdown_extensions.pymdownx.tabbed]
alternate_style = true
combine_header_slug = true

[project.markdown_extensions.pymdownx.tabbed.slugify]
case = "lower"

[project.markdown_extensions.pymdownx.tasklist]
custom_checkbox = true

# Plugins

[project.plugins.search]

