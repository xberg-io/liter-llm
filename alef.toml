[crates.readme.languages.kotlin_android]
name = "Kotlin (Android)"
template = "language_package.md"
output_path = "packages/kotlin-android/README.md"
package_manager = ["gradle", "maven"]
package_name = "io.xberg.literllm:liter-llm-android"
install_command = """
implementation("io.xberg.literllm:liter-llm-android:{{ version }}")"""
description = """
Universal LLM API client for Android, packaged as an AAR with bundled JNI libraries for `arm64-v8a` and `x86_64`.
Server-side Kotlin/JVM consumers should use the `io.xberg.literllm:liter-llm` Java package directly — Panama FFM is unavailable on Android, which is why Android ships as its own artifact.
"""

[crates.readme.languages.kotlin_android.features]
streaming = false
async = true
tool_calling = true
provider_routing = true
cost_tracking = true
search = true
ocr = true

[crates.readme.languages.kotlin_android.snippets]
basic_chat = "getting-started/basic_chat.md"

[crates.readme.languages.swift]
template = "language_package.md"
name = "Swift"
package_name = "LiterLlm"
package_manager = ["swift_package_manager"]
install_command = """
.package(url: \"https://github.com/xberg-io/liter-llm.git\", from: \"{{ version }}\")"""
description = """
Universal LLM API client for Swift. Access 163 LLM providers through a single Swift Concurrency-native interface (async/await, AsyncSequence streaming) with Codable request/response types.
"""

[crates.readme.languages.swift.features]
streaming = true
async = true
tool_calling = true
provider_routing = true
cost_tracking = true
search = true
ocr = true

[crates.readme.languages.swift.snippets]
basic_chat = "getting-started/basic_chat.md"

