[crates.readme.languages.zig]
template = "language_package.md"
name = "Zig"
package_name = "liter_llm"
package_manager = ["zig"]
install_command = """
zig fetch --save https://github.com/xberg-io/liter-llm/archive/refs/tags/v{{ version }}.tar.gz"""
description = """
Universal LLM API client for Zig. Access 163 LLM providers through Zig's allocator-aware sync API with explicit error sets — no hidden allocations, no exceptions, deterministic resource lifetimes.
"""

[crates.readme.languages.zig.features]
streaming = false
