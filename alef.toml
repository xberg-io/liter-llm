name = "Ruby"
package_name = "liter_llm"
badge_url = "https://img.shields.io/gem/v/liter_llm?label=Ruby&color=007ec6"
docs_url = "https://github.com/kreuzberg-dev/liter-llm"
description = "Universal LLM API client for Ruby. Access 143+ LLM providers through a single interface with idiomatic Ruby API and native performance."
package_manager = ["rubygems", "bundler"]
optional_sections = ["async_support", "streaming_support"]

