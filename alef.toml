[crates.lint.python]
before = "uv sync --no-install-project --no-install-workspace"

[crates.lint.node]
precondition = "command -v pnpm >/dev/null 2>&1"
format = "pnpm dlx oxfmt crates/liter-llm-node"
check = "pnpm dlx oxlint crates/liter-llm-node"

[crates.lint.wasm]
precondition = "command -v pnpm >/dev/null 2>&1"
format = "pnpm dlx oxfmt crates/liter-llm-wasm"
check = "pnpm dlx oxlint crates/liter-llm-wasm"

[crates.lint.php]
precondition = "command -v php >/dev/null 2>&1 && command -v composer >/dev/null 2>&1"
before = "cd packages/php && composer install --no-interaction --quiet"
format = "cd packages/php && PHP_CS_FIXER_IGNORE_ENV=1 php vendor/bin/php-cs-fixer fix src"
check = "cd packages/php && PHP_CS_FIXER_IGNORE_ENV=1 php vendor/bin/php-cs-fixer fix --dry-run src"

[crates.lint.go]
precondition = "command -v golangci-lint >/dev/null 2>&1"
before = "cargo build --release -p liter-llm-ffi"

[crates.lint.ffi]
precondition = "test -d crates/liter-llm-ffi/src"

[crates.lint.kotlin_android]
precondition = "command -v ktfmt >/dev/null 2>&1"
format = "find packages/kotlin-android \\( -name build -o -name .gradle \\) -prune -o \\( -name '*.kt' -o -name '*.kts' \\) -type f -print0 | xargs -0 ktfmt --kotlinlang-style"
check = "find packages/kotlin-android \\( -name build -o -name .gradle \\) -prune -o \\( -name '*.kt' -o -name '*.kts' \\) -type f -print0 | xargs -0 ktfmt --kotlinlang-style --dry-run --set-exit-if-changed"

[crates.test.rust]
precondition = "command -v cargo >/dev/null 2>&1"
e2e = "cargo test --manifest-path e2e/rust/Cargo.toml"

[crates.test.python]
precondition = "command -v uv >/dev/null 2>&1"
e2e = [
    "cd e2e/python && uv sync --no-install-project --no-install-workspace",
    "cd e2e/python && uv run --no-sync pytest tests/ -q",
]

[crates.test.node]
precondition = "command -v pnpm >/dev/null 2>&1"
e2e = [
    "pnpm -r --filter=\"./crates/liter-llm-node\" run build",
    "cd e2e/node && pnpm install --no-frozen-lockfile && pnpm dlx vitest run",
]

[crates.test.go]
precondition = "command -v go >/dev/null 2>&1"
before = "cargo build -p liter-llm-ffi --release && cargo build --manifest-path e2e/rust/Cargo.toml --bin mock-server --release"
e2e = "scripts/e2e/run-with-mock-server.sh 'cd e2e/go && go test -v ./...'"

[crates.test.java]
precondition = "command -v mvn >/dev/null 2>&1"
before = "mvn -f packages/java/pom.xml package -DskipTests"
e2e = "cd e2e/java && mvn -B -DtrimStackTrace=false -Dsurefire.useFile=false test"

[crates.test.csharp]
precondition = "command -v dotnet >/dev/null 2>&1"
before = "cargo build -p liter-llm-ffi --release"
e2e = "cd e2e/csharp && DYLD_LIBRARY_PATH=\"$PWD/../../target/release:${DYLD_LIBRARY_PATH:-}\" LD_LIBRARY_PATH=\"$PWD/../../target/release:${LD_LIBRARY_PATH:-}\" dotnet test -c Release"

[crates.test.ruby]
precondition = "command -v bundle >/dev/null 2>&1"
e2e = ["cd e2e/ruby && bundle install", "cd e2e/ruby && bundle exec rspec"]

[crates.test.php]
precondition = "command -v php >/dev/null 2>&1 && command -v composer >/dev/null 2>&1"
before = "cargo build --release -p liter-llm-php"
e2e = [
    "cd e2e/php && bash ../../scripts/ci/php/create-ci-php-ini.sh",
    "cd e2e/php && composer install --no-progress --prefer-dist",
    "cd e2e/php && php -c php-liter-llm.ini vendor/bin/phpunit",
]

[crates.test.elixir]
precondition = "command -v mix >/dev/null 2>&1"
e2e = [
    "cd e2e/elixir && LITER_LLM_BUILD=1 MIX_ENV=test mix deps.get",
    "cd e2e/elixir && LITER_LLM_BUILD=1 MIX_ENV=test mix test",
]

[crates.test.wasm]
precondition = "command -v pnpm >/dev/null 2>&1"
e2e = ["cd e2e/wasm && pnpm install", "cd e2e/wasm && pnpm vitest run"]

[crates.test.ffi]
precondition = "command -v make >/dev/null 2>&1"
before = "cargo build -p liter-llm-ffi --release && cargo build --manifest-path e2e/rust/Cargo.toml --bin mock-server --release"
e2e = "cd e2e/c && make test"

[crates.test.dart]
precondition = "command -v dart >/dev/null 2>&1"
before = "cargo build --release -p liter-llm-dart && cargo build --manifest-path e2e/rust/Cargo.toml --bin mock-server --release"
e2e = [
    "cd e2e/dart && dart pub get",
    "FRB_DART_LOAD_EXTERNAL_LIBRARY_NATIVE_LIB_DIR=\"$PWD/target/release\" scripts/e2e/run-with-mock-server.sh 'cd e2e/dart && dart test'",
]

[crates.test.swift]
precondition = "command -v swift >/dev/null 2>&1"
before = "cargo build --release -p liter-llm-swift && cargo build --release -p liter-llm-ffi && cargo build --manifest-path e2e/rust/Cargo.toml --bin mock-server --release"
e2e = "scripts/e2e/run-with-mock-server.sh 'cd e2e/swift_e2e && swift test'"

[crates.test.zig]
precondition = "command -v zig >/dev/null 2>&1"
before = "cargo build -p liter-llm-ffi --release && cargo build --manifest-path e2e/rust/Cargo.toml --bin mock-server --release"
e2e = "scripts/e2e/run-with-mock-server.sh 'cd e2e/zig && zig build test'"

[crates.test.kotlin_android]
precondition = "command -v gradle >/dev/null 2>&1"
before = "cargo build --release -p liter-llm-ffi -p liter-llm-jni && cargo build --manifest-path e2e/rust/Cargo.toml --bin mock-server --release"
e2e = "scripts/e2e/run-with-mock-server.sh 'cd e2e/kotlin_android && gradle test --no-daemon'"

[crates.update.python]
precondition = "command -v uv >/dev/null 2>&1"
update = "uv sync --upgrade --no-install-project --no-install-workspace"
upgrade = "uv sync --all-packages --all-extras --upgrade --no-install-project --no-install-workspace"

[crates.update.kotlin_android]
precondition = "command -v gradle >/dev/null 2>&1"
update = "echo 'kotlin-android: dependencyUpdates skipped (plugin v0.52.0 incompatible with Gradle 9; report-only no-op)'"
upgrade = "echo 'kotlin-android: dependencyUpdates skipped (plugin v0.52.0 incompatible with Gradle 9; report-only no-op)'"

[crates.publish]
core_crate = "crates/liter-llm"

[crates.publish.languages.elixir]
nif_versions = ["2.16", "2.17"]

[crates.publish.languages.ffi]
pkg_config = true
cmake_config = true

[crates.e2e]
fixtures = "fixtures"
output = "e2e"
languages = [
    "python",
    "node",
    "ruby",
    "php",
    "c",
    "go",
    "java",
    "csharp",
    "elixir",
    "wasm",
    "zig",
    "dart",
    "swift",
    "kotlin_android",
    "rust",
    "homebrew",
]
exclude_categories = ["cache", "proxy", "budget", "hooks"]
# NOTE: only include paths that are *always* enum-typed across every result type they
fields_enum = ["choices[0].finish_reason", "choices[0].message.role"]
fields_display_as_text = ["choices[0].message.content"]
fields_optional = [
    "usage",
    "choices[0].message.content",
    "choices[0].finish_reason",
    "system_fingerprint",
    "choices[0].message.tool_calls",
    "data[0].url",
    "data[0].b64_json",
    "results[0].document",
    "segments",
]
