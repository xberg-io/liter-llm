[workspace]
alef_version = "0.38.4"
languages = [
    "python",
    "node",
    "ruby",
    "php",
    "ffi",
    "go",
    "java",
    "csharp",
    "elixir",
    "wasm",
    "zig",
    "dart",
    "swift",
    "kotlin_android",
    "jni",
]
extra_clippy_allows = ["single_match", "collapsible_match"]

[workspace.format]
enabled = false

[workspace.docs]
reference_output = "docs-site/src/content/docs/reference"

[workspace.docs.cli]
sources = [
    "crates/liter-llm-cli/src/main.rs",
    "crates/liter-llm-cli/src/commands/mod.rs",
    "crates/liter-llm-cli/src/commands/api.rs",
    "crates/liter-llm-cli/src/commands/mcp.rs",
]

[workspace.docs.mcp]
sources = ["crates/liter-llm-proxy/src/mcp/mod.rs", "crates/liter-llm-proxy/src/mcp/tools.rs"]

[workspace.docs.skills]
template_dir = "templates/docs/skills"
outputs = [".codex/skills", ".agents/skills", ".claude/skills"]

[workspace.docs.snippets]
dirs = ["docs-site/src/snippets"]

[workspace.generated_header]
issues_url = "https://github.com/xberg-io/liter-llm/issues"

[workspace.sync]
extra_paths = [
    "package.json",
    "crates/liter-llm-node/package.json",
    "crates/liter-llm-node/npm/*/package.json",
    "packages/node/package.json",
]

[workspace.citation]
title = "liter-llm"
abstract = "Universal LLM API client with native bindings for 14 languages and 163 providers."
repository-code = "https://github.com/xberg-io/liter-llm"
url = "https://xberg.io"
license = "MIT"
date-released = "2026-05-17"

[[workspace.citation.authors]]
family-names = "Hirschfeld"
given-names = "Na'aman"
email = "naaman@xberg.io"
orcid = "https://orcid.org/0009-0000-2247-5072"

[workspace.poly]
exclude = [
    "**/_generated/**",
    "Package.swift",
    "packages/**",
    "e2e/**",
    "test_apps/**",
    "**/*_bridge_generated/**",
    "**/frb_generated.rs",
    "crates/*-dart/**",
    "crates/*-ffi/**",
    "crates/*-jni/**",
    "crates/*-node/**",
    "crates/*-php/**",
    "crates/*-py/**",
    "crates/*-rb/**",
    "crates/*-wasm/**",
    "crates/*-ffi/include/*.h",
    "packages/go/include/*.h",
    "**/catalog.json",
    ".cargo/config.toml",
]

[workspace.poly.uncomment]
enabled = true
remove-todos = false
remove-fixme = false
remove-docs = false
use-default-ignores = true
preserve-patterns = [
    "~keep",
    "SAFETY",
    "HACK",
    "WORKAROUND",
    "NOTE",
    "Copyright",
    "Licensed",
    "License",
    "SPDX",
    "Apache",
    "MIT",
    "WITHOUT WARRANTIES",
    "limitations under the License",
    "copyright",
    "licensed",
    "license",
    "apache",
    "you may not use this file except in compliance",
    "You may obtain a copy of the License",
    "you may obtain a copy of the license",
    "http://www.apache.org/licenses/LICENSE-2.0",
    "http://www.apache.org/licenses/license-2.0",
    "Unless required by applicable law",
    "unless required by applicable law",
    "distributed under the License",
    "distributed under the license",
    "AS IS",
    "as is",
    "without warranties",
    "specific language governing permissions",
    "limitations under the license",
]

[[workspace.poly.hooks-sources]]
id = "ai-rulez"
git = "https://github.com/Goldziher/ai-rulez.git"
revision = "v4.9.3"
hooks = ["ai-rulez-validate"]

[workspace.poly.typos.extend-words]
Hashi = "Hashi"
ein = "ein"
ist = "ist"

[workspace.poly.per-file-ignores]
"scripts/**/*.py" = [
    "B904",
    "BLE001",
    "C901",
    "D",
    "G004",
    "G201",
    "PERF203",
    "PERF401",
    "PLC0415",
    "PLR0912",
    "PLR0915",
    "PLW2901",
    "PTH123",
    "S",
    "SIM105",
    "T201",
]
"cli-proxy/**/*.py" = ["ANN", "PLR0913", "PLR2004", "S", "T201"]
"templates/readme/**/*.md" = ["MD057"]

[[crates]]
name = "liter-llm"
core_import = "liter_llm"
sources = [
    "crates/liter-llm/src/error.rs",
    "crates/liter-llm/src/bindings.rs",
    "crates/liter-llm/src/types/common.rs",
    "crates/liter-llm/src/types/chat.rs",
    "crates/liter-llm/src/types/embedding.rs",
    "crates/liter-llm/src/types/image.rs",
    "crates/liter-llm/src/image.rs",
    "crates/liter-llm/src/types/audio.rs",
    "crates/liter-llm/src/types/moderation.rs",
    "crates/liter-llm/src/types/rerank.rs",
    "crates/liter-llm/src/types/search.rs",
    "crates/liter-llm/src/types/ocr.rs",
    "crates/liter-llm/src/types/models.rs",
    "crates/liter-llm/src/types/files.rs",
    "crates/liter-llm/src/types/batch.rs",
    "crates/liter-llm/src/types/responses.rs",
    "crates/liter-llm/src/client/mod.rs",
    "crates/liter-llm/src/provider/custom.rs",
    "crates/liter-llm/src/provider/mod.rs",
    "crates/liter-llm/src/lib.rs",
    "crates/liter-llm/src/cost/refresh.rs",
    "crates/liter-llm/src/tower/budget.rs",
    "crates/liter-llm/src/tower/cache.rs",
    "crates/liter-llm/src/tower/rate_limit.rs",
]
version_from = "Cargo.toml"
workspace_root = "."
features = ["native-http", "full"]
untagged_union_text_types = ["AssistantContent"]

[crates.python]
module_name = "_internal_bindings"
pip_name = "liter-llm"
run_wrapper = "uv run --no-sync"

[crates.python.stubs]
output = "packages/python/liter_llm/"

[crates.node]
package_name = "@xberg-io/liter-llm"
exclude_platforms = ["linux-x64-musl", "linux-arm64-musl"]

[crates.ruby]
gem_name = "liter_llm"

[crates.ruby.stubs]
output = "packages/ruby/sig/"

[crates.php]
composer_package = "xberg-io/liter-llm"
# ext-php-rs's `#[php_impl]` macro can't resolve `Self::ensure_crypto_provider`
exclude_functions = ["ensure_crypto_provider"]

[crates.elixir]
app_name = "liter_llm"

[crates.elixir.extra_dependencies]
futures-util = "0.3"

[crates.wasm]
features = ["wasm-http"]
exclude_types = [
    "BudgetConfig",
    "CacheConfig",
    "CacheBackend",
    "RateLimitConfig",
    "Enforcement",
    "CircuitState",
    "HealthStatus",
    "IntentPrototype",
    "SingleflightResult",
]
exclude_functions = ["count_tokens", "count_request_tokens"]

[crates.jni]
exclude_functions = ["count_tokens", "count_request_tokens"]

[crates.ffi]
prefix = "literllm"
header_name = "liter_llm.h"
lib_name = "liter_llm_ffi"
# `wasm-http` is referenced in FFI `#[cfg(any(feature = "native-http", feature =
extra_features = ["wasm-http"]

[crates.go]
module = "github.com/xberg-io/liter-llm/packages/go"
package_name = "literllm"

[crates.java]
package = "io.xberg.literllm"
project_file = "packages/java/pom.xml"

[crates.csharp]
namespace = "LiterLlm"
package_id = "XbergIo.LiterLlm"
project_file = "packages/csharp/LiterLlm/LiterLlm.csproj"

[crates.zig]
module_name = "liter_llm"

[crates.dart]
package_name = "liter_llm"

[crates.swift]
package_name = "LiterLlm"
exclude_functions = ["all_providers"]

[crates.swift.client_constructor_body]
DefaultClient = """    let mut config = liter_llm::ClientConfig::new(api_key);
    if let Some(url) = base_url {
        config.base_url = Some(url);
    }
    liter_llm::client::DefaultClient::new(config, None)
        .map_err(|e| e.to_string())
        .map(DefaultClient)"""

[crates.kotlin_android]
package = "io.xberg.literllm.android"
namespace = "io.xberg.literllm.android"
artifact_id = "liter-llm-android"
group_id = "io.xberg.literllm"
abis = ["arm64-v8a", "x86_64"]
exclude_types = ["BudgetConfig", "CacheConfig", "CacheBackend", "RateLimitConfig", "Enforcement"]
exclude_functions = ["count_tokens", "count_request_tokens"]

