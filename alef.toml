[crates.e2e]
fixtures = "fixtures"
output = "e2e"
# Categories whose fixtures are NOT part of the public DefaultClient surface —
# they exercise tower middleware (cache, router, fallback, budget, hooks) and
# the proxy server's HTTP layer. Coverage lives in `crates/liter-llm/tests/*`
# (Rust integration) and `crates/liter-llm-proxy/tests/*` (proxy server tests),
# not in cross-language e2e bindings.
exclude_categories = ["cache", "proxy", "budget", "hooks"]
# Fields whose values are enum types — assertions use _alef_e2e_text() instead of .strip().
# NOTE: only include paths that are *always* enum-typed across every result type they
# appear on. `status` / `purpose` are context-dependent (BatchStatus on BatchObject,
# but plain String on ResponseObject/FileObject) so they are configured per-call via
# `enum_fields = { "status" = "..." }` overrides, not globally.
fields_enum = ["choices[0].finish_reason", "choices[0].message.role"]
# Optional fields on result types — generator emits unwrap handling for these paths.
fields_optional = [
  # ChatCompletionResponse
  "usage",
  "choices[0].message.content",
  "choices[0].finish_reason",
  "system_fingerprint",
  # AssistantMessage.tool_calls is Option<Vec<ToolCall>>
  "choices[0].message.tool_calls",
  # ImageData optional fields
  "data[0].url",
  "data[0].b64_json",
  # RerankResult.document is Option<RerankResultDocument>
  "results[0].document",
  # TranscriptionResponse.segments is Option<Vec<TranscriptionSegment>>
  "segments",
]
# Fields that are Vec/array types — used with fields_optional to emit is_some_and checks.
fields_array = ["choices[0].message.tool_calls", "segments"]
# Top-level result fields present on at least one result type.
# Assertions on fields NOT in this list are emitted as comments (skipped).
# Excludes streaming-specific fields (stream_content, chunks, stream_complete),
# middleware-only fields (cache_hit, cache_bypassed), and error pseudo-fields.
result_fields = [
  # Chat/embedding/moderation/rerank shared
  "id",
  "model",
  "usage",
  "object",
  "created",
  # Chat
  "choices",
  "system_fingerprint",
  # Embedding
  "data",
  # Models
  "models",
  # Transcription
  "text",
  "language",
  "duration",
  "words",
  "segments",
  "task",
  "audio",
  # Image generation
  "images",
  # Moderation
  "results",
  "flagged",
  # Rerank
  "results_count",
  # Search
  "query",
  # OCR
  "pages",
  # Files
  "bytes",
  "filename",
  "purpose",
  "status",
  "has_more",
  # Files/Batches delete
  "deleted",
  # Batch
  "endpoint",
  "errors",
  "input_file_id",
  "completion_window",
  "request_counts",
  # Responses API
  "output",
  "instructions",
  "tools",
  # Content
  "content",
]
# Fields that are method calls (no property access) — the Rust codegen emits
# `()` for these so that `err.status_code` becomes `err.status_code()`.
fields_method_calls = ["status_code"]

# Aliases for error-type field access.  When a fixture has
# `field = "error.<sub>"` the Rust e2e generator resolves `<sub>` through this
# map to the actual field/method name on the error type.
[crates.e2e.error_field_aliases]
status_code = "status_code"

# C FFI primitive accessor return types — used by the C e2e codegen to emit
# typed local variables (uint64_t/int32_t/double/...) instead of char* for
# leaf field accessors that return scalars in the FFI header.
[crates.e2e.fields_c_types]
"usage.prompt_tokens" = "uint64_t"
"usage.completion_tokens" = "uint64_t"
"usage.total_tokens" = "uint64_t"
"file_object.bytes" = "uint64_t"
"file_object.created_at" = "uint64_t"
"delete_response.deleted" = "int32_t"
"rerank_result.index" = "uint32_t"
"rerank_result.relevance_score" = "double"
"embedding_object.index" = "uint32_t"
"moderation_result.flagged" = "int32_t"
"ocr_page.index" = "uint32_t"
"choice.index" = "uint32_t"
"chat_completion_response.created" = "uint64_t"
"images_response.created" = "uint64_t"
# Opaque enum returns: the FFI returns a pointer to an opaque struct (e.g.
# LITERLLMBatchStatus*) and the C codegen must convert via
# {prefix}_{enum_snake}_to_string before string-comparing. Pair with a per-call
# `enum_fields = { "status" = "BatchStatus" }` override on each C call site.
"batch_object.status" = "BatchStatus"

[crates.e2e.call]
function = "chat"
path = "/chat/completions"
module = "liter_llm"
result_var = "result"
async = true

[[crates.e2e.call.args]]
name = "request"
field = "input"
type = "json_object"
owned = true

[crates.e2e.call.overrides.node]
client_factory = "createClient"

[crates.e2e.call.overrides.php]
php_client_factory = "createClient"

[crates.e2e.call.overrides.wasm]
client_factory = "createClient"
options_type = "WasmChatCompletionRequest"
# Fields whose wasm-bindgen setter expects BigInt (Rust u64/i64). The chat
# request struct uses these for maxTokens (u64) and seed (i64); per-call
# wasm overrides extend this set when their request struct adds more.
bigint_fields = ["maxTokens", "seed"]

[crates.e2e.call.overrides.c]
result_type = "ChatCompletionResponse"
client_factory = "create_client"

[crates.e2e.call.overrides.go]
client_factory = "CreateClient"

[crates.e2e.call.overrides.python]
client_factory = "create_client"

[crates.e2e.call.overrides.rust]
client_factory = "create_client"
trait_imports = ["LlmClient", "FileClient", "BatchClient", "ResponseClient"]

[crates.e2e.call.overrides.csharp]
client_factory = "CreateClient"
options_via = "from_json"

[crates.e2e.call.overrides.ruby]
client_factory = "create_client"
