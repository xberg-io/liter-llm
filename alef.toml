[workspace]
alef_version = "0.15.10"
languages = ["python", "node", "ruby", "php", "ffi", "go", "java", "csharp", "elixir", "wasm"]

[workspace.sync]
extra_paths = [
  "package.json",
  "crates/liter-llm-node/package.json",
  "crates/liter-llm-node/npm/*/package.json",
  "packages/node/package.json",
]

[[crates]]
name = "liter-llm"
core_import = "liter_llm"
sources = [
  "crates/liter-llm/src/error.rs",
  "crates/liter-llm/src/bindings.rs",
  "crates/liter-llm/src/types/common.rs",
  "crates/liter-llm/src/types/chat.rs",
  "crates/liter-llm/src/types/embedding.rs",
  "crates/liter-llm/src/types/image.rs",
  "crates/liter-llm/src/types/audio.rs",
  "crates/liter-llm/src/types/moderation.rs",
  "crates/liter-llm/src/types/rerank.rs",
  "crates/liter-llm/src/types/search.rs",
  "crates/liter-llm/src/types/ocr.rs",
  "crates/liter-llm/src/types/models.rs",
  "crates/liter-llm/src/types/files.rs",
  "crates/liter-llm/src/types/batch.rs",
  "crates/liter-llm/src/types/responses.rs",
  "crates/liter-llm/src/client/mod.rs",
  "crates/liter-llm/src/provider/custom.rs",
]
version_from = "Cargo.toml"
workspace_root = "."
features = ["native-http", "full"]

[crates.python]
module_name = "_internal_bindings"
pip_name = "liter-llm"
run_wrapper = "uv run --no-sync"

[crates.python.stubs]
output = "packages/python/liter_llm/"

[crates.node]
package_name = "@kreuzberg/liter-llm-node"

[crates.ruby]
gem_name = "liter_llm"

[crates.ruby.stubs]
output = "packages/ruby/sig/"

[crates.elixir]
app_name = "liter_llm"

[crates.elixir.extra_dependencies]
futures-util = "0.3"

[crates.wasm]
features = ["wasm-http"]

[crates.ffi]
prefix = "literllm"
header_name = "liter_llm.h"
lib_name = "liter_llm_ffi"

[crates.go]
module = "github.com/kreuzberg-dev/liter-llm/packages/go"
package_name = "literllm"

[crates.java]
package = "dev.kreuzberg.literllm"
project_file = "packages/java/pom.xml"

[crates.csharp]
namespace = "LiterLlm"
project_file = "packages/csharp/LiterLlm/LiterLlm.csproj"

[crates.output]
python = "crates/liter-llm-py/src/"
node = "crates/liter-llm-node/src/"
ruby = "packages/ruby/ext/liter_llm_rb/src/"
php = "crates/liter-llm-php/src/"
ffi = "crates/liter-llm-ffi/src/"
go = "packages/go/"
elixir = "packages/elixir/native/liter_llm_nif/src/"
wasm = "crates/liter-llm-wasm/src/"
java = "packages/java/"
csharp = "packages/csharp/"

[crates.exclude]
types = [
  # Traits (can't cross FFI)
  "LlmClient",
  "LlmClientRaw",
  "BatchClient",
  "FileClient",
  "ResponseClient",
  # Opaque async types
  "BoxFuture",
  "BoxStream",
  # Types with Arc<dyn Trait> / generics
  "ClientConfig",
  "ClientConfigBuilder",
  "PreparedRequest",
  "RawExchange",
  "RawStreamExchange",
  # Internal error types
  "ErrorResponse",
  "ApiError",
  # Tower-internal Service request/response enums (externally tagged, contain BoxStream/Bytes)
  "LlmRequest",
  "LlmResponse",
  "CachedResponse",
  # Tower middleware (feature-gated, generic Service types)
  "BudgetConfig",
  "BudgetState",
  "BudgetLayer",
  "CacheConfig",
  "CacheStore",
  "InMemoryStore",
  "CacheLayer",
  "OpenDalCacheStore",
  "CooldownLayer",
  "CostTrackingLayer",
  "HealthCheckLayer",
  "HealthCheckService",
  "LlmHook",
  "HooksLayer",
  "RateLimitConfig",
  "ModelRateLimitLayer",
  "RouterState",
  "Router",
  "LlmService",
  "TracingLayer",
  # Auth credential providers (Arc<dyn>, async trait methods)
  "AzureAdCredentialProvider",
  "WebIdentityCredentialProvider",
  "GithubCopilotCredentialProvider",
  "VertexOAuthCredentialProvider",
  "CredentialProvider",
  "StaticTokenProvider",
  # File config (has provider Vec, enum fields)
  "FileConfig",
  "FileCacheConfig",
  "FileBudgetConfig",
  "FileRateLimitConfig",
  "FileProviderConfig",
  # Managed client (Tower-dependent)
  "ManagedClient",
  # Internal provider
  "ModelPricing",
]
methods = [
  # Raw methods on DefaultClient
  "DefaultClient.chat_raw",
  "DefaultClient.chat_stream_raw",
  "DefaultClient.embed_raw",
  "DefaultClient.image_generate_raw",
  "DefaultClient.transcribe_raw",
  "DefaultClient.moderate_raw",
  "DefaultClient.rerank_raw",
  "DefaultClient.search_raw",
  "DefaultClient.ocr_raw",
  # Constructor takes ClientConfig (excluded type) — use create_client() instead
  "DefaultClient.new",
  # Internal provider methods
  "DefaultClient.resolve_provider_for_model",
  "DefaultClient.resolve_auth_header",
  "DefaultClient.resolve_auth_header_for_provider",
  "DefaultClient.all_headers",
  "DefaultClient.all_headers_for_provider",
  "DefaultClient.prepare_request",
  # Error internal methods
  "LiterLlmError.from_status",
  # Methods that require binding→core From on output types (not yet supported)
  "ChatCompletionResponse.estimated_cost",
  "EmbeddingResponse.estimated_cost",
  # Internal error methods
  "LiterLlmError.is_transient",
  "LiterLlmError.error_type",
]
functions = ["str_pair", "build_provider"]

[crates.lint.python]
before = "uv sync --no-install-project"

[crates.lint.node]
precondition = "command -v pnpm >/dev/null 2>&1"
format = "pnpm dlx oxfmt packages/typescript"
check = "pnpm dlx oxlint packages/typescript"

[crates.lint.wasm]
precondition = "command -v pnpm >/dev/null 2>&1"
format = "pnpm dlx oxfmt packages/wasm"
check = "pnpm dlx oxlint packages/wasm"

[crates.lint.php]
precondition = "command -v php >/dev/null 2>&1 && command -v composer >/dev/null 2>&1"
before = "cd packages/php && composer install --no-interaction --quiet"
format = "cd packages/php && PHP_CS_FIXER_IGNORE_ENV=1 php vendor/bin/php-cs-fixer fix --config php-cs-fixer.php src"
check = "cd packages/php && PHP_CS_FIXER_IGNORE_ENV=1 php vendor/bin/php-cs-fixer fix --config php-cs-fixer.php --dry-run src"

[crates.lint.go]
precondition = "command -v golangci-lint >/dev/null 2>&1"
before = "cargo build --release -p liter-llm-ffi"

[crates.lint.ffi]
precondition = "test -d crates/liter-llm-ffi/src"

[crates.test.rust]
precondition = "command -v cargo >/dev/null 2>&1"
e2e = "cargo test --manifest-path e2e/rust/Cargo.toml"

[crates.test.python]
precondition = "command -v uv >/dev/null 2>&1"
e2e = ["cd e2e/python && uv sync", "cd e2e/python && uv run pytest tests/ -q"]

[crates.test.node]
precondition = "command -v pnpm >/dev/null 2>&1"
e2e = [
  "pnpm -r --filter=\"./crates/liter-llm-node\" run build",
  "cd e2e/node && pnpm install && pnpm dlx vitest run",
]

[crates.test.go]
precondition = "command -v go >/dev/null 2>&1"
before = "cargo build -p liter-llm-ffi --release"
e2e = "cd e2e/go && go test -v ./..."

[crates.test.java]
precondition = "command -v mvn >/dev/null 2>&1"
before = "mvn -f packages/java/pom.xml package -DskipTests"
e2e = "cd e2e/java && mvn -B -DtrimStackTrace=false -Dsurefire.useFile=false test"

[crates.test.csharp]
precondition = "command -v dotnet >/dev/null 2>&1"
before = "cargo build -p liter-llm-ffi --release"
e2e = "cd e2e/csharp && DYLD_LIBRARY_PATH=\"$PWD/../../target/release:${DYLD_LIBRARY_PATH:-}\" LD_LIBRARY_PATH=\"$PWD/../../target/release:${LD_LIBRARY_PATH:-}\" dotnet test -c Release"

[crates.test.ruby]
precondition = "command -v bundle >/dev/null 2>&1"
e2e = ["cd e2e/ruby && bundle install", "cd e2e/ruby && bundle exec rspec"]

[crates.test.php]
precondition = "command -v php >/dev/null 2>&1 && command -v composer >/dev/null 2>&1"
e2e = [
  "cd e2e/php && bash ../../scripts/ci/php/create-ci-php-ini.sh",
  "cd e2e/php && composer install --no-progress --prefer-dist",
  "cd e2e/php && php -c php-liter-llm.ini vendor/bin/phpunit",
]

[crates.test.elixir]
precondition = "command -v mix >/dev/null 2>&1"
e2e = ["cd e2e/elixir && MIX_ENV=test mix deps.get", "cd e2e/elixir && MIX_ENV=test mix test"]

[crates.test.wasm]
precondition = "command -v pnpm >/dev/null 2>&1"
e2e = ["cd e2e/wasm && pnpm install", "cd e2e/wasm && pnpm vitest run"]

[crates.test.ffi]
precondition = "command -v make >/dev/null 2>&1"
before = "cargo build -p liter-llm-ffi --release && cargo build --manifest-path e2e/rust/Cargo.toml --bin mock-server --release"
e2e = "cd e2e/c && make test"

[crates.publish]
core_crate = "crates/liter-llm"

[crates.publish.languages.ruby]
vendor_mode = "core-only"

[crates.publish.languages.elixir]
vendor_mode = "core-only"
nif_versions = ["2.16", "2.17"]

[crates.publish.languages.ffi]
pkg_config = true
cmake_config = true

[crates.e2e]
fixtures = "fixtures"
output = "e2e"
# Categories whose fixtures are NOT part of the public DefaultClient surface —
# they exercise tower middleware (cache, router, fallback, budget, hooks) and
# the proxy server's HTTP layer. Coverage lives in `crates/liter-llm/tests/*`
# (Rust integration) and `crates/liter-llm-proxy/tests/*` (proxy server tests),
# not in cross-language e2e bindings.
exclude_categories = ["cache", "proxy", "budget", "hooks"]
# Fields whose values are enum types — assertions use _alef_e2e_text() instead of .strip().
fields_enum = [
  "status",
  "purpose",
  "choices[0].finish_reason",
  "choices[0].message.role",
]
# Optional fields on result types — generator emits unwrap handling for these paths.
fields_optional = [
  # ChatCompletionResponse
  "usage",
  "choices[0].message.content",
  "choices[0].finish_reason",
  "system_fingerprint",
  # AssistantMessage.tool_calls is Option<Vec<ToolCall>>
  "choices[0].message.tool_calls",
  # ImageData optional fields
  "data[0].url",
  "data[0].b64_json",
  # RerankResult.document is Option<RerankResultDocument>
  "results[0].document",
  # TranscriptionResponse.segments is Option<Vec<TranscriptionSegment>>
  "segments",
]
# Fields that are Vec/array types — used with fields_optional to emit is_some_and checks.
fields_array = ["choices[0].message.tool_calls", "segments"]
# Top-level result fields present on at least one result type.
# Assertions on fields NOT in this list are emitted as comments (skipped).
# Excludes streaming-specific fields (stream_content, chunks, stream_complete),
# middleware-only fields (cache_hit, cache_bypassed), and error pseudo-fields.
result_fields = [
  # Chat/embedding/moderation/rerank shared
  "id",
  "model",
  "usage",
  "object",
  "created",
  # Chat
  "choices",
  "system_fingerprint",
  # Embedding
  "data",
  # Models
  "models",
  # Transcription
  "text",
  "language",
  "duration",
  "words",
  "segments",
  "task",
  "audio",
  # Image generation
  "images",
  # Moderation
  "results",
  "flagged",
  # Rerank
  "results_count",
  # Search
  "query",
  # OCR
  "pages",
  # Files
  "bytes",
  "filename",
  "purpose",
  "status",
  "has_more",
  # Files/Batches delete
  "deleted",
  # Batch
  "endpoint",
  "errors",
  "input_file_id",
  "completion_window",
  "request_counts",
  # Responses API
  "output",
  "instructions",
  "tools",
  # Content
  "content",
]

# C FFI primitive accessor return types — used by the C e2e codegen to emit
# typed local variables (uint64_t/int32_t/double/...) instead of char* for
# leaf field accessors that return scalars in the FFI header.
[crates.e2e.fields_c_types]
"usage.prompt_tokens" = "uint64_t"
"usage.completion_tokens" = "uint64_t"
"usage.total_tokens" = "uint64_t"
"file_object.bytes" = "uint64_t"
"file_object.created_at" = "uint64_t"
"delete_response.deleted" = "int32_t"
"rerank_result.index" = "uint32_t"
"rerank_result.relevance_score" = "double"
"embedding_object.index" = "uint32_t"
"moderation_result.flagged" = "int32_t"
"ocr_page.index" = "uint32_t"
"choice.index" = "uint32_t"
"chat_completion_response.created" = "uint64_t"
"images_response.created" = "uint64_t"

[crates.e2e.call]
function = "chat"
path = "/chat/completions"
module = "liter_llm"
result_var = "result"
async = true

[[crates.e2e.call.args]]
name = "request"
field = "input"
type = "json_object"
owned = true

[crates.e2e.call.overrides.node]
client_factory = "createClient"

[crates.e2e.call.overrides.php]
php_client_factory = "createClient"

[crates.e2e.call.overrides.wasm]
client_factory = "createClient"
options_type = "WasmChatCompletionRequest"
# Fields whose wasm-bindgen setter expects BigInt (Rust u64/i64). The chat
# request struct uses these for maxTokens (u64) and seed (i64); per-call
# wasm overrides extend this set when their request struct adds more.
bigint_fields = ["maxTokens", "seed"]

[crates.e2e.call.overrides.c]
result_type = "ChatCompletionResponse"
client_factory = "create_client"

[crates.e2e.call.overrides.go]
client_factory = "CreateClient"

[crates.e2e.call.overrides.python]
client_factory = "create_client"

[crates.e2e.call.overrides.rust]
client_factory = "create_client"
trait_imports = ["LlmClient", "FileClient", "BatchClient", "ResponseClient"]

[crates.e2e.call.overrides.csharp]
client_factory = "CreateClient"
options_via = "from_json"

[crates.e2e.call.overrides.ruby]
client_factory = "create_client"
options_type = "LiterLlm::ChatCompletionRequest"

[crates.e2e.call.overrides.elixir]
client_factory = "create_client"

[crates.e2e.call.overrides.java]
client_factory = "createClient"

