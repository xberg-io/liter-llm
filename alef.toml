[workspace]
alef_version = "0.16.70"
languages = [
  "python",
  "node",
  "ruby",
  "php",
  "ffi",
  "go",
  "java",
  "csharp",
  "elixir",
  "wasm",
  "zig",
  "dart",
  "swift",
  "kotlin_android",
  "jni",
]

[workspace.sync]
extra_paths = [
  "package.json",
  "crates/liter-llm-node/package.json",
  "crates/liter-llm-node/npm/*/package.json",
  "packages/node/package.json",
]

[workspace.citation]
title = "liter-llm"
abstract = "Universal LLM API client with native bindings for 14 languages and 143 providers."
repository-code = "https://github.com/kreuzberg-dev/liter-llm"
url = "https://kreuzberg.dev"
license = "MIT"
date-released = "2026-05-17"

[[workspace.citation.authors]]
family-names = "Hirschfeld"
given-names = "Na'aman"
email = "naaman@kreuzberg.dev"
orcid = "https://orcid.org/0009-0000-2247-5072"

[[crates]]
name = "liter-llm"
core_import = "liter_llm"
sources = [
  "crates/liter-llm/src/error.rs",
  "crates/liter-llm/src/bindings.rs",
  "crates/liter-llm/src/types/common.rs",
  "crates/liter-llm/src/types/chat.rs",
  "crates/liter-llm/src/types/embedding.rs",
  "crates/liter-llm/src/types/image.rs",
  "crates/liter-llm/src/types/audio.rs",
  "crates/liter-llm/src/types/moderation.rs",
  "crates/liter-llm/src/types/rerank.rs",
  "crates/liter-llm/src/types/search.rs",
  "crates/liter-llm/src/types/ocr.rs",
  "crates/liter-llm/src/types/models.rs",
  "crates/liter-llm/src/types/files.rs",
  "crates/liter-llm/src/types/batch.rs",
  "crates/liter-llm/src/types/responses.rs",
  "crates/liter-llm/src/client/mod.rs",
  "crates/liter-llm/src/provider/custom.rs",
  # Tower middleware: expose public config DTOs (BudgetConfig, CacheConfig,
  # RateLimitConfig + their enums Enforcement, CacheBackend). The accompanying
  # Layer/Service/State types in these files are kept out of bindings via the
  # [crates.exclude] list above per the locked decision (middleware composition
  # remains a Rust pattern).
  "crates/liter-llm/src/tower/budget.rs",
  "crates/liter-llm/src/tower/cache.rs",
  "crates/liter-llm/src/tower/rate_limit.rs",
]
version_from = "Cargo.toml"
workspace_root = "."
features = ["native-http", "full"]

[crates.python]
module_name = "_internal_bindings"
pip_name = "liter-llm"
run_wrapper = "uv run --no-sync"

[crates.python.stubs]
output = "packages/python/liter_llm/"

[crates.node]
package_name = "@kreuzberg/liter-llm-node"

[crates.ruby]
gem_name = "liter_llm"
# TODO(alef): Magnus codegen has a known limitation around `Map<K, V>` fields inside
# enum variants — `field_type_for_serde_inner` collapses them to `String` at the binding
# struct level, but the shared conversion-arm codegen still emits
# `.into_iter().map(...).collect()` for the core→binding direction, which fails to
# type-check against a `String` field. Excluding `CacheBackend` (which has Map-in-variant)
# also forces `CacheConfig` out of the Ruby surface because `CacheConfig.backend: CacheBackend`
# still references the excluded type from a non-excluded struct context.
# Track the proper Magnus codegen fix as part of the broader "expose everything in all
# bindings" effort. Until then, Ruby ships with the other Tower configs (BudgetConfig,
# RateLimitConfig, Enforcement) plus all the request/response DTOs.
exclude_types = ["CacheBackend", "CacheConfig"]

[crates.ruby.stubs]
output = "packages/ruby/sig/"

[crates.elixir]
app_name = "liter_llm"

[crates.elixir.extra_dependencies]
futures-util = "0.3"

[crates.wasm]
features = ["wasm-http"]
# Tower middleware config DTOs are exposed in every other binding, but the WASM
# build uses the `wasm-http` feature which excludes `tower`. The configs aren't
# reachable through `liter_llm::*` in that build, so skip them in the WASM
# binding to avoid E0433 "cannot find `tower`" / "cannot find `BudgetConfig`" etc.
exclude_types = ["BudgetConfig", "CacheConfig", "CacheBackend", "RateLimitConfig", "Enforcement"]

[crates.ffi]
prefix = "literllm"
header_name = "liter_llm.h"
lib_name = "liter_llm_ffi"

[crates.go]
module = "github.com/kreuzberg-dev/liter-llm/packages/go"
package_name = "literllm"

[crates.java]
package = "dev.kreuzberg.literllm"
project_file = "packages/java/pom.xml"

[crates.csharp]
namespace = "LiterLlm"
project_file = "packages/csharp/LiterLlm/LiterLlm.csproj"

[crates.zig]
module_name = "liter_llm"

[crates.dart]
package_name = "liter_llm"

[crates.swift]
package_name = "LiterLlm"

[crates.swift.client_constructor_body]
DefaultClient = """    let mut config = liter_llm::ClientConfig::new(api_key);
    if let Some(url) = base_url {
        config.base_url = Some(url);
    }
    liter_llm::client::DefaultClient::new(config, None)
        .map_err(|e| e.to_string())
        .map(DefaultClient)"""

[crates.kotlin_android]
# Android AAR — Kotlin/JVM consumers use the Java package directly (Kotlin/Java
# interop is total). Panama FFM is unavailable on Android (max JDK 17), which is
# why Android needs its own JNI-based package with bundled .so files.
# Emitted by alef-backend-kotlin-android (alef >= 0.16).
package = "dev.kreuzberg.literllm.android"
namespace = "dev.kreuzberg.literllm.android"
artifact_id = "liter-llm-android"
group_id = "dev.kreuzberg"
abis = ["arm64-v8a", "x86_64"]

[crates.output]
python = "crates/liter-llm-py/src/"
node = "crates/liter-llm-node/src/"
ruby = "packages/ruby/ext/liter_llm_rb/src/"
php = "crates/liter-llm-php/src/"
ffi = "crates/liter-llm-ffi/src/"
go = "packages/go/"
elixir = "packages/elixir/native/liter_llm_nif/src/"
wasm = "crates/liter-llm-wasm/src/"
java = "packages/java/"
csharp = "packages/csharp/"
zig = "packages/zig/src/"
dart = "packages/dart/"
swift = "packages/swift/Sources/LiterLlm/"
kotlin_android = "packages/kotlin-android/src/main/kotlin/dev/kreuzberg/literllm/android/"

[crates.exclude]
types = [
  # Traits (can't cross FFI)
  "LlmClient",
  "LlmClientRaw",
  "BatchClient",
  "FileClient",
  "ResponseClient",
  # Opaque async types
  "BoxFuture",
  "BoxStream",
  # Types with Arc<dyn Trait> / generics
  "ClientConfig",
  "ClientConfigBuilder",
  "PreparedRequest",
  "RawExchange",
  "RawStreamExchange",
  # Tower-internal Service request/response enums (externally tagged, contain BoxStream/Bytes)
  "LlmRequest",
  "LlmResponse",
  "CachedResponse",
  # Tower middleware Layer/Service/State wrappers (Rust-only middleware composition).
  # Public config DTOs (BudgetConfig, CacheConfig, RateLimitConfig, CacheBackend,
  # Enforcement) are intentionally NOT excluded — they are exposed across all bindings.
  "BudgetState",
  "BudgetLayer",
  "CacheStore",
  "InMemoryStore",
  "CacheLayer",
  "OpenDalCacheStore",
  "CooldownLayer",
  "CostTrackingLayer",
  "HealthCheckLayer",
  "HealthCheckService",
  "LlmHook",
  "HooksLayer",
  "ModelRateLimitLayer",
  "RouterState",
  "Router",
  "LlmService",
  "TracingLayer",
  # Auth credential providers (Arc<dyn>, async trait methods)
  "AzureAdCredentialProvider",
  "WebIdentityCredentialProvider",
  "GithubCopilotCredentialProvider",
  "VertexOAuthCredentialProvider",
  "CredentialProvider",
  "StaticTokenProvider",
  # File config (has provider Vec, enum fields)
  "FileConfig",
  "FileCacheConfig",
  "FileBudgetConfig",
  "FileRateLimitConfig",
  "FileProviderConfig",
  # Managed client (Tower-dependent)
  "ManagedClient",
  # Internal provider
  "ModelPricing",
]
methods = [
  # Raw methods on DefaultClient
  "DefaultClient.chat_raw",
  "DefaultClient.chat_stream_raw",
  "DefaultClient.embed_raw",
  "DefaultClient.image_generate_raw",
  "DefaultClient.transcribe_raw",
  "DefaultClient.moderate_raw",
  "DefaultClient.rerank_raw",
  "DefaultClient.search_raw",
  "DefaultClient.ocr_raw",
  # Constructor takes ClientConfig (excluded type) — use create_client() instead
  "DefaultClient.new",
  # Internal provider methods
  "DefaultClient.resolve_provider_for_model",
  "DefaultClient.resolve_auth_header",
  "DefaultClient.resolve_auth_header_for_provider",
  "DefaultClient.all_headers",
  "DefaultClient.all_headers_for_provider",
  "DefaultClient.prepare_request",
  # Error internal HTTP-status parser (private helper)
  "LiterLlmError.from_status",
  # Methods that require binding→core From on output types (not yet supported)
  "ChatCompletionResponse.estimated_cost",
  "EmbeddingResponse.estimated_cost",
]
functions = ["str_pair", "build_provider"]

