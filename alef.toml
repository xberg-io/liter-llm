# test_apps version sync — anchor on package-name strings so unrelated semver
# tokens (junit, jackson, vitest, etc.) aren't clobbered. Mirrors the pattern
# used by ../html-to-markdown.
[[workspace.sync.text_replacements]]
path = "test_apps/node/package.json"
search = '"@kreuzberg/liter-llm-node": "[^"]*"'
replace = '"@kreuzberg/liter-llm-node": "{version}"'

[[workspace.sync.text_replacements]]
path = "test_apps/wasm/package.json"
search = '"@kreuzberg/liter-llm-wasm": "[^"]*"'
replace = '"@kreuzberg/liter-llm-wasm": "{version}"'

[[workspace.sync.text_replacements]]
path = "test_apps/python/pyproject.toml"
search = '"liter-llm==[^"]*"'
replace = '"liter-llm=={version}"'

[[workspace.sync.text_replacements]]
path = "test_apps/ruby/Gemfile"
search = "gem 'liter_llm', '[^']*'"
replace = "gem 'liter_llm', '{version}'"

[[workspace.sync.text_replacements]]
path = "test_apps/java/pom.xml"
search = "<artifactId>liter-llm</artifactId>\\s*<version>[^<]*</version>"
replace = "<artifactId>liter-llm</artifactId>\n            <version>{version}</version>"

[[workspace.sync.text_replacements]]
path = "test_apps/csharp/LiterLlm.E2eTests.csproj"
search = 'Include="LiterLlm" Version="[^"]*"'
replace = 'Include="LiterLlm" Version="{version}"'

[[workspace.sync.text_replacements]]
path = "test_apps/php/composer.json"
search = '"kreuzberg-dev/liter-llm": "[^"]*"'
replace = '"kreuzberg-dev/liter-llm": "{version}"'

[[workspace.sync.text_replacements]]
path = "test_apps/go/go.mod"
search = 'github\.com/kreuzberg-dev/liter-llm/packages/go v[0-9][^\s]*'
replace = "github.com/kreuzberg-dev/liter-llm/packages/go v{version}"

[[workspace.sync.text_replacements]]
path = "test_apps/rust/Cargo.toml"
search = 'package = "liter-llm", version = "[^"]*"'
replace = 'package = "liter-llm", version = "{version}"'

