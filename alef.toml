[crates.readme.languages.elixir]
template = "language_package.md"
name = "Elixir"
package_name = "liter_llm"
badge_url = "https://img.shields.io/hexpm/v/liter_llm?label=Elixir&color=007ec6"
docs_url = "https://github.com/xberg-io/liter-llm"
description = "Universal LLM API client for Elixir. Access 163 LLM providers through a single interface with native BEAM concurrency, OTP integration, and idiomatic Elixir API."
package_manager = ["mix"]
optional_sections = ["async_support", "streaming_support"]

[crates.readme.languages.elixir.features]
streaming = true
async = true
tool_calling = true
provider_routing = true
cost_tracking = true
