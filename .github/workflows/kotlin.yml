name: Kotlin

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: packages/kotlin
    steps:
      - uses: actions/checkout@v6
      - name: Set up JDK
        uses: actions/setup-java@v5
        with:
          java-version: "25"
          distribution: temurin
      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4
      # Skip ktlint: alef.toml's [crates.kotlin] config currently uses the
      # ignored `package_name` field (canonical is `package`); without the fix
      # alef falls back to `com.github.kreuzberg_dev` which trips ktlint's
      # no-underscore rule. Tracked separately — full alef regen needed.
      - name: Run Gradle build
        run: gradle build -x ktlintMainSourceSetCheck -x ktlintKotlinScriptCheck
      - name: Run Gradle tests
        run: gradle test
