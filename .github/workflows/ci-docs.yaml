name: CI Docs

on:
  push:
    branches: [main]
    paths:
      - "docs-site/**"
      - "alef.toml"
      - ".github/workflows/ci-docs.yaml"
  pull_request:
    branches: [main]
    paths:
      - "docs-site/**"
      - "alef.toml"
      - ".github/workflows/ci-docs.yaml"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: ci-docs-${{ github.ref }}
  cancel-in-progress: false

jobs:
  docs:
    uses: xberg-io/actions/.github/workflows/reusable-docs-deploy.yml@v1
    with:
      deploy: ${{ github.event_name == 'push' && github.ref == 'refs/heads/main' }}
