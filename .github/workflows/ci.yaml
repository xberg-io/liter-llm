name: CI

on:
  workflow_dispatch:
    inputs:
      skip_tests:
        description: "Skip Docker API contract tests (build only)"
        required: false
        type: boolean
        default: false
  push:
    branches: [main]
    paths:
      - crates/**
      - packages/**
      - e2e/**
      - schemas/**
      - docs/**
      - tools/**
      - docker/**
      - scripts/**
      - fixtures/**
      - pyproject.toml
      - uv.lock
      - package.json
      - pnpm-lock.yaml
      - pnpm-workspace.yaml
      - Cargo.toml
      - Cargo.lock
      - Gemfile
      - Gemfile.lock
      - composer.json
      - composer.lock
      - go.mod
      - go.sum
      - rustfmt.toml
      - alef.toml
      - zensical.toml
      - .pre-commit-config.yaml
      - .task/**
      - Taskfile.yml
      - .dockerignore
      - .github/workflows/ci.yaml
  pull_request:
    branches: [main]
    paths:
      - crates/**
      - packages/**
      - e2e/**
      - schemas/**
      - docs/**
      - tools/**
      - docker/**
      - scripts/**
      - fixtures/**
      - pyproject.toml
      - uv.lock
      - package.json
      - pnpm-lock.yaml
      - pnpm-workspace.yaml
      - Cargo.toml
      - Cargo.lock
      - Gemfile
      - Gemfile.lock
      - composer.json
      - composer.lock
      - go.mod
      - go.sum
      - rustfmt.toml
      - alef.toml
      - zensical.toml
      - .pre-commit-config.yaml
      - .task/**
      - Taskfile.yml
      - .dockerignore
      - .github/workflows/ci.yaml

permissions:
  contents: read

concurrency:
  group: ci-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always
  CARGO_INCREMENTAL: 0
  BUILD_PROFILE: ci
  GO_VERSION: "1.26"

# --- Stage 1: Validate ---

jobs:
  validate:
    name: Validate
    if: github.repository == 'kreuzberg-dev/liter-llm' && github.actor != 'dependabot[bot]'
    runs-on: ubuntu-24.04-arm
    timeout-minutes: 60
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Install Task
        uses: kreuzberg-dev/actions/install-task@v1

      - name: Setup Rust
        uses: kreuzberg-dev/actions/setup-rust@v1
        with:
          components: rustfmt, clippy, llvm-tools-preview

      - name: Setup Python
        uses: kreuzberg-dev/actions/setup-python-env@v1
        with:
          python-version: "3.13"

      - name: Create WASM pkg stub
        run: mkdir -p crates/liter-llm-wasm/pkg && echo '{"name":"liter_llm","version":"0.0.0"}' > crates/liter-llm-wasm/pkg/package.json
        shell: bash

      - name: Setup Node Workspace
        uses: kreuzberg-dev/actions/setup-node-workspace@v1

      - name: Setup Go
        uses: actions/setup-go@v6
        with:
          go-version: ${{ env.GO_VERSION }}
          check-latest: true

      - name: Setup Java
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: "25"

      - name: Setup Elixir
        uses: kreuzberg-dev/actions/setup-elixir@v1

      - name: Setup Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: "3.4"
          bundler-cache: false

      - name: Setup PHP
        uses: kreuzberg-dev/actions/setup-php@v1

      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: "10.0.x"

      - name: Install C/C++ tools
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends clang-format shellcheck
          # pre-commit-hooks cppcheck wrapper pins 2.20.0 exactly. Ubuntu 24.04
          # ships 2.13.0 so build 2.20.0 from source via CMake.
          CPPCHECK_VERSION="2.20.0"
          if ! command -v cppcheck >/dev/null 2>&1 || [[ "$(cppcheck --version | awk '{print $2}')" != "${CPPCHECK_VERSION}" ]]; then
            sudo apt-get install -y --no-install-recommends build-essential cmake libpcre3-dev
            curl -fsSL "https://github.com/danmar/cppcheck/archive/refs/tags/${CPPCHECK_VERSION}.tar.gz" | tar xz
            cmake -S "cppcheck-${CPPCHECK_VERSION}" -B "cppcheck-${CPPCHECK_VERSION}/build" \
              -DCMAKE_BUILD_TYPE=Release \
              -DCMAKE_INSTALL_PREFIX=/usr/local \
              -DHAVE_RULES=ON \
              -DUSE_MATCHCOMPILER=Auto
            cmake --build "cppcheck-${CPPCHECK_VERSION}/build" -j"$(nproc)"
            sudo cmake --install "cppcheck-${CPPCHECK_VERSION}/build"
            rm -rf "cppcheck-${CPPCHECK_VERSION}"
          fi
          cppcheck --version
        shell: bash

      - name: Install alef
        uses: kreuzberg-dev/actions/install-alef@v1

      - name: Run alef setup
        run: alef setup
        shell: bash

      - name: Install Go Tools
        run: task go:install
        shell: bash

      - name: Install Elixir Dependencies
        working-directory: packages/elixir
        run: mix deps.get
        shell: bash

      - name: Install Ruby Dependencies
        run: task ruby:install
        shell: bash

      - name: Install PHP Dependencies
        working-directory: packages/php
        run: composer install --no-progress --prefer-dist
        shell: bash

      - name: Restore C# Dependencies
        run: task csharp:install
        shell: bash

      - name: Run Rust Lint Check
        run: task rust:lint:check
        shell: bash

      - name: Run PHP Clippy
        run: cargo clippy -p liter-llm-php --all-targets -- -D warnings
        shell: bash

      - name: Run Python Lint Check
        run: task python:lint:check
        shell: bash

      - name: Run Node Lint Check
        run: task node:lint:check
        shell: bash

      - name: Run Go Lint Check
        run: task go:lint:check
        shell: bash

      - name: Run Java Lint Check
        run: task java:lint:check
        shell: bash

      - name: Run Elixir Format Check
        run: task elixir:format:check
        shell: bash

      - name: Run Ruby Lint Check
        run: task ruby:lint:check
        shell: bash

      - name: Run PHP Lint Check
        run: task php:lint:check
        shell: bash

      - name: Run C# Format Check
        run: task csharp:format:check
        shell: bash

      - name: Verify alef-generated code is up-to-date
        run: alef verify --exit-code
        shell: bash

      - name: Run Pre-commit Hooks
        uses: j178/prek-action@v2
        with:
          extra-args: --all-files

      - name: Validate Providers Doc
        run: task generate:providers-doc:check
        shell: bash

  changes:
    name: Detect Changes
    if: github.repository == 'kreuzberg-dev/liter-llm' && github.actor != 'dependabot[bot]'
    runs-on: ubuntu-24.04-arm
    timeout-minutes: 5
    outputs:
      core: ${{ steps.filter.outputs.core }}
      rust: ${{ steps.filter.outputs.rust }}
      python: ${{ steps.filter.outputs.python }}
      node: ${{ steps.filter.outputs.node }}
      go: ${{ steps.filter.outputs.go }}
      java: ${{ steps.filter.outputs.java }}
      csharp: ${{ steps.filter.outputs.csharp }}
      ruby: ${{ steps.filter.outputs.ruby }}
      php: ${{ steps.filter.outputs.php }}
      elixir: ${{ steps.filter.outputs.elixir }}
      wasm: ${{ steps.filter.outputs.wasm }}
      ffi: ${{ steps.filter.outputs.ffi }}
      docker: ${{ steps.filter.outputs.docker }}
      local-llm: ${{ steps.filter.outputs.local-llm }}
      docs: ${{ steps.filter.outputs.docs }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Filter paths
        uses: dorny/paths-filter@v4
        id: filter
        with:
          filters: |
            core:
              - crates/liter-llm/**
              - Cargo.toml
              - Cargo.lock
              - alef.toml
              - .task/**
              - Taskfile.yml
            rust:
              - crates/**
              - e2e/rust/**
              - rustfmt.toml
            python:
              - packages/python/**
              - crates/liter-llm-py/**
              - e2e/python/**
              - pyproject.toml
              - uv.lock
            node:
              - packages/typescript/**
              - crates/liter-llm-node/**
              - e2e/node/**
              - package.json
              - pnpm-lock.yaml
              - pnpm-workspace.yaml
            go:
              - packages/go/**
              - e2e/go/**
              - go.mod
              - go.sum
            java:
              - packages/java/**
              - e2e/java/**
            csharp:
              - packages/csharp/**
              - e2e/csharp/**
            ruby:
              - packages/ruby/**
              - e2e/ruby/**
              - Gemfile
              - Gemfile.lock
            php:
              - packages/php/**
              - crates/liter-llm-php/**
              - e2e/php/**
              - composer.json
              - composer.lock
            elixir:
              - packages/elixir/**
              - e2e/elixir/**
            wasm:
              - crates/liter-llm-wasm/**
              - e2e/wasm/**
              - package.json
              - pnpm-lock.yaml
              - pnpm-workspace.yaml
            ffi:
              - crates/liter-llm-ffi/**
              - e2e/c/**
            docker:
              - crates/liter-llm-proxy/**
              - crates/liter-llm-cli/**
              - docker/**
              - .dockerignore
              - scripts/ci/docker/**
            local-llm:
              - schemas/providers.json
              - crates/liter-llm/src/provider/**
              - crates/liter-llm/tests/local_llm.rs
              - docker/docker-compose.local-llm.yml
              - .task/workflows/local.yml
              - fixtures/smoke/local_*
            docs:
              - docs/**
              - tools/snippet-runner/**
              - zensical.toml
              - pyproject.toml

  # --- Stage 2: Core ---

  rust-tests:
    name: Rust Tests (${{ matrix.os }})
    needs: [validate, changes]
    if: >-
      !failure() && !cancelled() &&
      needs.validate.result == 'success' &&
      github.repository == 'kreuzberg-dev/liter-llm' &&
      github.actor != 'dependabot[bot]' &&
      (
        github.event_name == 'workflow_dispatch' ||
        needs.changes.outputs.core == 'true' ||
        needs.changes.outputs.rust == 'true'
      )
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
    timeout-minutes: 60
    services: ${{ matrix.os == 'ubuntu-latest' && fromJSON('{"redis":{"image":"redis:7-alpine","ports":["6379:6379"],"options":"--health-cmd \"redis-cli ping\" --health-interval 5s --health-timeout 3s --health-retries 5"}}') || fromJSON('{}') }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Rust
        uses: kreuzberg-dev/actions/setup-rust@v1
        with:
          components: rustfmt, clippy, llvm-tools-preview

      - name: Install Task
        uses: kreuzberg-dev/actions/install-task@v1

      - name: Run Rust Tests
        env:
          RUST_BACKTRACE: full
        run: task rust:test
        shell: bash

      - name: Run Integration Tests (with ignored)
        if: matrix.os == 'ubuntu-latest'
        env:
          RUST_BACKTRACE: full
        run: >
          cargo test -p liter-llm --features full
          -- --include-ignored --skip live_device_flow
        shell: bash

      - name: Check Rust Formatting
        if: matrix.os == 'ubuntu-latest'
        run: task rust:format:check
        shell: bash

      - name: Run Clippy
        if: matrix.os == 'ubuntu-latest'
        run: task rust:lint:check
        shell: bash

  build-ffi:
    name: Build FFI (${{ matrix.os }})
    needs: [validate, changes]
    if: >-
      !failure() && !cancelled() &&
      needs.validate.result == 'success' &&
      github.repository == 'kreuzberg-dev/liter-llm' &&
      github.actor != 'dependabot[bot]' &&
      (
        github.event_name == 'workflow_dispatch' ||
        needs.changes.outputs.core == 'true' ||
        needs.changes.outputs.ffi == 'true'
      )
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, ubuntu-24.04-arm, macos-latest, windows-latest]
    timeout-minutes: 60
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Rust
        uses: kreuzberg-dev/actions/setup-rust@v1

      - name: Build FFI Library
        uses: kreuzberg-dev/actions/build-rust-ffi@v1
        with:
          crate-name: liter-llm-ffi

      - name: Upload FFI artifacts
        uses: actions/upload-artifact@v7
        with:
          name: ffi-${{ matrix.os }}
          path: target/release/
          retention-days: 1

  docker-build:
    name: Docker Build and Test
    needs: [validate, changes]
    if: >-
      !failure() && !cancelled() &&
      needs.validate.result == 'success' &&
      github.repository == 'kreuzberg-dev/liter-llm' &&
      github.actor != 'dependabot[bot]' &&
      (
        github.event_name == 'workflow_dispatch' ||
        needs.changes.outputs.core == 'true' ||
        needs.changes.outputs.docker == 'true'
      )
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v6

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Build Docker image
        uses: docker/build-push-action@v7
        with:
          context: .
          file: docker/Dockerfile
          load: true
          tags: liter-llm:test
          cache-from: type=gha
          cache-to: type=gha,mode=max,scope=ci-docker

      - name: Run Docker integration tests
        run: python3 scripts/ci/docker/test_docker.py --image liter-llm:test --port 14000
        shell: bash

      - name: Schemathesis API contract tests
        if: ${{ !inputs.skip_tests }}
        run: |
          pip3 install schemathesis

          container_id=$(docker run -d -p 14001:4000 \
            -e LITER_LLM_MASTER_KEY=sk-schema-test \
            liter-llm:test)
          sleep 3

          FAILED=0
          schemathesis run http://localhost:14001/openapi.json \
            --max-examples=10 \
            --request-timeout=30000 \
            --header "Authorization: Bearer sk-schema-test" \
            --checks status_code_conformance,response_schema_conformance,negative_data_rejection || FAILED=1

          docker stop "$container_id"
          exit $FAILED
        shell: bash

      - name: Check image size
        uses: kreuzberg-dev/actions/check-docker-image-size@v1
        with:
          image: liter-llm:test
          warn-mb: "100"

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: docker-test-results
          path: /tmp/liter-llm-docker-test-results.json
          retention-days: 7

      - name: Save image artifact
        if: failure()
        run: docker save liter-llm:test | gzip > liter-llm-test.tar.gz
        shell: bash

      - name: Upload image artifact
        if: failure()
        uses: actions/upload-artifact@v7
        with:
          name: docker-image-test
          path: liter-llm-test.tar.gz
          retention-days: 3

  test-docs:
    name: Test Docs
    needs: [changes]
    if: >-
      !failure() && !cancelled() &&
      github.repository == 'kreuzberg-dev/liter-llm' &&
      github.actor != 'dependabot[bot]' &&
      (
        github.event_name == 'workflow_dispatch' ||
        needs.changes.outputs.docs == 'true'
      )
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v6

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.13"

      - name: Install uv
        uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "22"

      - name: Setup Go
        uses: actions/setup-go@v6
        with:
          go-version: "1.23"

      - name: Setup Java
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: "21"

      - name: Setup Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: "3.3"

      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: "8.0.x"

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: "8.3"

      - name: Setup Elixir
        uses: erlef/setup-beam@v1
        with:
          elixir-version: "1.17"
          otp-version: "27"

      - name: Cargo cache
        uses: actions/cache@v5
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-snippet-runner-${{ hashFiles('tools/snippet-runner/Cargo.toml') }}

      - name: Build snippet-runner
        run: cargo build --release -p snippet-runner
        shell: bash

      - name: Validate snippets
        run: ./target/release/snippet-runner validate --snippets docs/snippets --level syntax --timeout 120
        shell: bash

      - name: Build docs
        run: |
          uv sync --group doc --no-editable --no-install-workspace --no-install-project
          uv run --no-sync zensical build --clean
        shell: bash

      - name: Check links (lychee)
        uses: lycheeverse/lychee-action@v2
        with:
          args: "--config .lychee.toml site/"
          fail: true

  # --- Stage 3: Language Tests ---

  test-python:
    name: Python ${{ matrix.python }} on ${{ matrix.os }}
    needs: [validate, changes, rust-tests]
    if: >-
      !failure() && !cancelled() &&
      needs.rust-tests.result == 'success' &&
      github.repository == 'kreuzberg-dev/liter-llm' &&
      github.actor != 'dependabot[bot]' &&
      (
        github.event_name == 'workflow_dispatch' ||
        needs.changes.outputs.core == 'true' ||
        needs.changes.outputs.python == 'true'
      )
    runs-on: ${{ matrix.os }}
    timeout-minutes: 60
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
        python: ["3.10"]
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Install Task
        uses: kreuzberg-dev/actions/install-task@v1

      - name: Install uv
        uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python }}

      - name: Setup Rust
        uses: kreuzberg-dev/actions/setup-rust@v1

      - name: Install Dependencies
        uses: nick-fields/retry@v4
        with:
          timeout_minutes: 5
          max_attempts: 3
          retry_wait_seconds: 30
          command: |
            if [[ "${{ runner.os }}" == "Windows" ]] && [[ -d ".venv" ]]; then
              echo "Removing existing .venv directory on Windows"
              rm -rf .venv
            fi
            uv sync --all-extras --no-install-workspace
          shell: bash

      - name: Build Python Bindings
        run: uvx maturin develop --release
        working-directory: packages/python
        shell: bash

      - name: Smoke Test Python Bindings
        run: |
          uv run python -c "import liter_llm; print('liter_llm imported successfully:', dir(liter_llm))"
        shell: bash

  test-node:
    name: Node (${{ matrix.runtime }}) on ${{ matrix.os }}
    needs: [validate, changes, rust-tests]
    if: >-
      !failure() && !cancelled() &&
      needs.rust-tests.result == 'success' &&
      github.repository == 'kreuzberg-dev/liter-llm' &&
      github.actor != 'dependabot[bot]' &&
      (
        github.event_name == 'workflow_dispatch' ||
        needs.changes.outputs.core == 'true' ||
        needs.changes.outputs.node == 'true'
      )
    runs-on: ${{ matrix.os }}
    timeout-minutes: 60
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
        runtime: [node]
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Install Task
        uses: kreuzberg-dev/actions/install-task@v1

      - name: Setup Rust
        uses: kreuzberg-dev/actions/setup-rust@v1

      - name: Create WASM pkg stub
        if: matrix.runtime == 'node'
        run: mkdir -p crates/liter-llm-wasm/pkg && echo '{"name":"liter_llm","version":"0.0.0"}' > crates/liter-llm-wasm/pkg/package.json
        shell: bash

      - name: Setup Node Workspace
        if: matrix.runtime == 'node'
        uses: kreuzberg-dev/actions/setup-node-workspace@v1

      - name: Setup Bun
        if: matrix.runtime == 'bun'
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Build NAPI-RS Bindings (Node.js)
        if: matrix.runtime == 'node'
        uses: kreuzberg-dev/actions/build-node-napi@v1
        with:
          crate-dir: crates/liter-llm-node

      - name: Install Workspace Dependencies (Bun)
        if: matrix.runtime == 'bun'
        run: bun install
        shell: bash

      - name: Build NAPI-RS Bindings (Bun)
        if: matrix.runtime == 'bun'
        working-directory: crates/liter-llm-node
        run: bun run build
        shell: bash

      - name: Test NAPI-RS Module (Node.js)
        if: matrix.runtime == 'node'
        run: task node:test
        shell: bash

      - name: Build Mock Server
        if: matrix.runtime == 'node'
        run: cargo build --manifest-path e2e/rust/Cargo.toml --bin mock-server --release
        shell: bash

      - name: Run E2E Tests (Node.js)
        if: matrix.runtime == 'node'
        run: task node:e2e:test
        shell: bash

  test-go:
    name: Go on ${{ matrix.os }}
    needs: [validate, changes, rust-tests, build-ffi]
    if: >-
      !failure() && !cancelled() &&
      needs.rust-tests.result == 'success' &&
      needs.build-ffi.result == 'success' &&
      github.repository == 'kreuzberg-dev/liter-llm' &&
      github.actor != 'dependabot[bot]' &&
      (
        github.event_name == 'workflow_dispatch' ||
        needs.changes.outputs.core == 'true' ||
        needs.changes.outputs.ffi == 'true' ||
        needs.changes.outputs.go == 'true'
      )
    runs-on: ${{ matrix.os }}
    timeout-minutes: 60
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, ubuntu-24.04-arm, macos-latest]
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Rust
        uses: kreuzberg-dev/actions/setup-rust@v1

      - name: Install Task
        uses: kreuzberg-dev/actions/install-task@v1

      - name: Setup Go
        uses: actions/setup-go@v6
        with:
          go-version: ${{ env.GO_VERSION }}
          check-latest: true

      - name: Download FFI artifacts
        uses: actions/download-artifact@v7
        with:
          name: ffi-${{ matrix.os }}
          path: target/release/

      - name: Setup Go CGO Environment
        uses: kreuzberg-dev/actions/setup-go-cgo-env@v1
        with:
          ffi-crate-dir: crates/liter-llm-ffi
          ffi-lib-name: liter_llm_ffi

      - name: Install Go Tools
        run: task go:install
        shell: bash

      - name: Install golangci-lint
        uses: golangci/golangci-lint-action@v9
        with:
          install-only: true

      - name: Run Go Tests
        env:
          RUST_BACKTRACE: full
          CGO_ENABLED: "1"
        run: task go:test:ci
        shell: bash

      - name: Run Go Lint
        run: task go:lint:check
        shell: bash

  test-java:
    name: Java on ${{ matrix.os }}
    needs: [validate, changes, rust-tests, build-ffi]
    if: >-
      !failure() && !cancelled() &&
      needs.rust-tests.result == 'success' &&
      needs.build-ffi.result == 'success' &&
      github.repository == 'kreuzberg-dev/liter-llm' &&
      github.actor != 'dependabot[bot]' &&
      (
        github.event_name == 'workflow_dispatch' ||
        needs.changes.outputs.core == 'true' ||
        needs.changes.outputs.ffi == 'true' ||
        needs.changes.outputs.java == 'true'
      )
    runs-on: ${{ matrix.os }}
    timeout-minutes: 60
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Rust
        uses: kreuzberg-dev/actions/setup-rust@v1

      - name: Test Java Panama FFI Bindings
        uses: kreuzberg-dev/actions/test-java-ffi@v1
        with:
          ffi-crate-name: liter-llm-ffi
          ffi-lib-name: liter_llm_ffi
          java-version: "25.0.2+10.0.LTS"

  test-csharp:
    name: C# on ${{ matrix.os }}
    needs: [validate, changes, rust-tests, build-ffi]
    if: >-
      !failure() && !cancelled() &&
      needs.rust-tests.result == 'success' &&
      needs.build-ffi.result == 'success' &&
      github.repository == 'kreuzberg-dev/liter-llm' &&
      github.actor != 'dependabot[bot]' &&
      (
        github.event_name == 'workflow_dispatch' ||
        needs.changes.outputs.core == 'true' ||
        needs.changes.outputs.ffi == 'true' ||
        needs.changes.outputs.csharp == 'true'
      )
    runs-on: ${{ matrix.os }}
    timeout-minutes: 60
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Rust
        uses: kreuzberg-dev/actions/setup-rust@v1

      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: "10.0.x"

      - name: Install Task
        uses: kreuzberg-dev/actions/install-task@v1

      - name: Download FFI artifacts
        uses: actions/download-artifact@v7
        with:
          name: ffi-${{ matrix.os }}
          path: target/release/

      - name: Restore C# Dependencies
        run: task csharp:install
        shell: bash

      - name: Build C# Bindings
        run: task csharp:build:ci
        shell: bash

      - name: Check C# Formatting
        if: matrix.os == 'ubuntu-latest'
        run: task csharp:format:check
        shell: bash

      - name: Run C# Tests (Unix)
        if: runner.os != 'Windows'
        env:
          DOTNET_CLI_TELEMETRY_OPTOUT: "true"
          LD_LIBRARY_PATH: ${{ github.workspace }}/target/release
          DYLD_LIBRARY_PATH: ${{ github.workspace }}/target/release
        run: |
          cd packages/csharp
          dotnet test LiterLlm.slnx -c Release
        shell: bash

      - name: Run C# Tests (Windows)
        if: runner.os == 'Windows'
        env:
          DOTNET_CLI_TELEMETRY_OPTOUT: "true"
        run: |
          $env:PATH = "${{ github.workspace }}\target\release;$env:PATH"
          cd packages/csharp
          dotnet test LiterLlm.slnx -c Release
        shell: pwsh

  test-ruby:
    name: Ruby ${{ matrix.ruby }} on ${{ matrix.os }}
    needs: [validate, changes, rust-tests]
    if: >-
      !failure() && !cancelled() &&
      needs.rust-tests.result == 'success' &&
      github.repository == 'kreuzberg-dev/liter-llm' &&
      github.actor != 'dependabot[bot]' &&
      (
        github.event_name == 'workflow_dispatch' ||
        needs.changes.outputs.core == 'true' ||
        needs.changes.outputs.ruby == 'true'
      )
    runs-on: ${{ matrix.os }}
    timeout-minutes: 60
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        ruby: ["3.2"]
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Rust
        uses: kreuzberg-dev/actions/setup-rust@v1

      - name: Install Task
        uses: kreuzberg-dev/actions/install-task@v1

      - name: Setup Ruby (Unix)
        if: runner.os != 'Windows'
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: ${{ matrix.ruby }}
          bundler: "2.7.2"
          bundler-cache: false
          working-directory: packages/ruby

      - name: Setup Ruby (Windows)
        if: runner.os == 'Windows'
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: ${{ matrix.ruby }}
          bundler: "2.7.2"
          bundler-cache: false
          working-directory: packages/ruby
          windows-toolchain: UCRT64

      - name: Build Ruby Extension
        uses: kreuzberg-dev/actions/build-ruby-gem@v1

      - name: Run Rubocop (Ubuntu, Ruby 3.2 only)
        if: matrix.os == 'ubuntu-latest' && matrix.ruby == '3.2'
        run: task ruby:lint:check
        shell: bash

      - name: Validate RBS Signatures (Ubuntu, Ruby 3.2 only)
        if: matrix.os == 'ubuntu-latest' && matrix.ruby == '3.2'
        run: task ruby:rbs-validate
        shell: bash

      - name: Run Steep Type Checking (Ubuntu, Ruby 3.2 only)
        if: matrix.os == 'ubuntu-latest' && matrix.ruby == '3.2'
        run: task ruby:typecheck
        shell: bash

      - name: Run Ruby Tests (Unix)
        if: runner.os != 'Windows'
        run: task ruby:test
        shell: bash

      - name: Run Ruby Tests (Windows)
        if: runner.os == 'Windows'
        working-directory: packages/ruby
        shell: pwsh
        run: bundle exec rspec

  test-php:
    name: PHP
    needs: [validate, changes, rust-tests]
    if: >-
      !failure() && !cancelled() &&
      needs.rust-tests.result == 'success' &&
      github.repository == 'kreuzberg-dev/liter-llm' &&
      github.actor != 'dependabot[bot]' &&
      (
        github.event_name == 'workflow_dispatch' ||
        needs.changes.outputs.core == 'true' ||
        needs.changes.outputs.php == 'true'
      )
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: "8.4"
          tools: composer:2.9.1
          coverage: none

      - name: Setup Rust
        uses: kreuzberg-dev/actions/setup-rust@v1

      - name: Install Task
        uses: kreuzberg-dev/actions/install-task@v1

      - name: Install Root Composer Dependencies
        uses: ramsey/composer-install@v4
        with:
          dependency-versions: locked
        env:
          COMPOSER_AUTH: '{"github-oauth":{"github.com":"${{ secrets.GITHUB_TOKEN }}"}}'

      - name: Install PHP Package Composer Dependencies
        uses: ramsey/composer-install@v4
        with:
          dependency-versions: locked
          working-directory: packages/php
        env:
          COMPOSER_AUTH: '{"github-oauth":{"github.com":"${{ secrets.GITHUB_TOKEN }}"}}'

      - name: Build PHP Extension
        id: build-php-extension
        uses: kreuzberg-dev/actions/build-php-extension@v1
        with:
          crate-name: liter-llm-php
          lib-name: liter_llm_php

      - name: Run PHP Static Analysis
        run: task php:lint:check
        shell: bash

      - name: Run PHP E2E Tests
        env:
          EXTENSION_PATH: ${{ steps.build-php-extension.outputs.extension-path }}
          PROJECT_ROOT: ${{ github.workspace }}
        run: task php:e2e:test
        shell: bash

  test-elixir:
    name: Elixir
    needs: [validate, changes, rust-tests]
    if: >-
      !failure() && !cancelled() &&
      needs.rust-tests.result == 'success' &&
      github.repository == 'kreuzberg-dev/liter-llm' &&
      github.actor != 'dependabot[bot]' &&
      (
        github.event_name == 'workflow_dispatch' ||
        needs.changes.outputs.core == 'true' ||
        needs.changes.outputs.elixir == 'true'
      )
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Elixir
        uses: erlef/setup-beam@v1
        with:
          elixir-version: "1.17"
          otp-version: "27"

      - name: Setup Rust
        uses: kreuzberg-dev/actions/setup-rust@v1

      - name: Install Task
        uses: kreuzberg-dev/actions/install-task@v1

      - name: Install Hex and Rebar
        run: |
          mix local.hex --force
          mix local.rebar --force
        shell: bash

      - name: Install Elixir Dependencies
        run: task elixir:deps
        shell: bash

      - name: Compile Elixir + Rustler NIF
        env:
          PROJECT_ROOT: ${{ github.workspace }}
          LITER_LLM_BUILD: "1"
        run: task elixir:build
        shell: bash

      - name: Run Elixir Tests
        env:
          MIX_ENV: test
          PROJECT_ROOT: ${{ github.workspace }}
          LITER_LLM_BUILD: "1"
        run: task elixir:test
        shell: bash

      - name: Check Elixir Formatting
        run: task elixir:format:check
        shell: bash

      - name: Run Credo Lint
        env:
          PROJECT_ROOT: ${{ github.workspace }}
        run: task elixir:lint:check
        shell: bash

  test-wasm:
    name: WASM
    needs: [validate, changes, rust-tests]
    if: >-
      !failure() && !cancelled() &&
      needs.rust-tests.result == 'success' &&
      github.repository == 'kreuzberg-dev/liter-llm' &&
      github.actor != 'dependabot[bot]' &&
      (
        github.event_name == 'workflow_dispatch' ||
        needs.changes.outputs.core == 'true' ||
        needs.changes.outputs.wasm == 'true'
      )
    runs-on: ubuntu-latest
    timeout-minutes: 120
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Install Task
        uses: kreuzberg-dev/actions/install-task@v1

      - name: Setup Rust
        uses: kreuzberg-dev/actions/setup-rust@v1
        with:
          target: wasm32-unknown-unknown
          use-sccache: false

      - name: Ensure WASM Target Installed
        run: rustup target add wasm32-unknown-unknown
        shell: bash

      - name: Install wasm-pack
        run: cargo install wasm-pack
        shell: bash

      - name: Create WASM pkg stub
        run: mkdir -p crates/liter-llm-wasm/pkg && echo '{"name":"liter_llm","version":"0.0.0"}' > crates/liter-llm-wasm/pkg/package.json
        shell: bash

      - name: Setup Node Workspace
        uses: kreuzberg-dev/actions/setup-node-workspace@v1

      - name: Build WASM Package
        uses: kreuzberg-dev/actions/build-wasm-package@v1
        with:
          crate-dir: crates/liter-llm-wasm
          build-command: "pnpm run build"

      - name: Run WASM Rust Tests
        working-directory: crates/liter-llm-wasm
        run: wasm-pack test --headless --firefox
        shell: bash

      - name: Build WASM Package (Node.js target for E2E)
        working-directory: crates/liter-llm-wasm
        run: pnpm run build:nodejs
        shell: bash

      - name: Build Mock Server
        run: cargo build --manifest-path e2e/rust/Cargo.toml --bin mock-server --release
        shell: bash

      - name: Run WASM E2E Tests
        env:
          PROJECT_ROOT: ${{ github.workspace }}
        run: task wasm:e2e:test
        shell: bash

  test-c-ffi:
    name: C FFI (${{ matrix.runner }})
    needs: [validate, changes, rust-tests, build-ffi]
    if: >-
      !failure() && !cancelled() &&
      needs.rust-tests.result == 'success' &&
      needs.build-ffi.result == 'success' &&
      github.repository == 'kreuzberg-dev/liter-llm' &&
      github.actor != 'dependabot[bot]' &&
      (
        github.event_name == 'workflow_dispatch' ||
        needs.changes.outputs.core == 'true' ||
        needs.changes.outputs.ffi == 'true'
      )
    runs-on: ${{ matrix.runner }}
    timeout-minutes: 60
    strategy:
      fail-fast: false
      matrix:
        runner:
          - ubuntu-latest
          - ubuntu-24.04-arm
          - macos-latest
          - windows-latest
    env:
      CARGO_INCREMENTAL: 0
      RUST_BACKTRACE: short
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Rust
        uses: kreuzberg-dev/actions/setup-rust@v1
        with:
          cache-key-prefix: c-ffi
          use-sccache: false

      - name: Install C Dependencies (Linux)
        if: runner.os == 'Linux'
        run: sudo apt-get update -q && sudo apt-get install -y libcurl4-openssl-dev
        shell: bash

      - name: Download FFI artifacts
        uses: actions/download-artifact@v7
        with:
          name: ffi-${{ matrix.runner }}
          path: target/release/

      - name: Verify Header Generated
        run: |
          test -f crates/liter-llm-ffi/liter_llm.h
          grep 'LITER_LLM_VERSION_MAJOR' crates/liter-llm-ffi/liter_llm.h || \
            echo "Warning: version constants not yet defined in header"
        shell: bash

      - name: Build C E2E Tests
        if: runner.os != 'Windows'
        working-directory: e2e/c
        run: make all LIB_DIR=${{ github.workspace }}/target/release
        shell: bash

      - name: Run C E2E Tests
        if: runner.os != 'Windows'
        working-directory: e2e/c
        env:
          LD_LIBRARY_PATH: ${{ github.workspace }}/target/release
          DYLD_LIBRARY_PATH: ${{ github.workspace }}/target/release
        run: make run LIB_DIR=${{ github.workspace }}/target/release
        shell: bash

      - name: Verify Header (Windows)
        if: runner.os == 'Windows'
        run: |
          test -f crates/liter-llm-ffi/liter_llm.h
          echo "Header verified on Windows."
        shell: bash

  test-local-llm:
    name: Local LLM Integration
    needs: [validate, changes, rust-tests]
    if: >-
      !failure() && !cancelled() &&
      needs.rust-tests.result == 'success' &&
      github.repository == 'kreuzberg-dev/liter-llm' &&
      github.actor != 'dependabot[bot]' &&
      (
        github.event_name == 'workflow_dispatch' ||
        needs.changes.outputs.local-llm == 'true'
      )
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Install Ollama
        run: curl -fsSL https://ollama.com/install.sh | sh
        shell: bash

      - name: Start Ollama and pull models
        run: |
          ollama serve &
          echo "Waiting for Ollama to be ready..."
          for _i in $(seq 1 30); do
            if curl -sf http://localhost:11434/api/tags > /dev/null 2>&1; then
              echo "Ollama is ready"
              break
            fi
            sleep 1
          done
          ollama pull qwen2:0.5b
          ollama pull all-minilm
          curl -sf http://localhost:11434/v1/models
        shell: bash

      - name: Setup Rust
        uses: kreuzberg-dev/actions/setup-rust@v1

      - name: Run local LLM integration tests
        # Sequential: all tests share single Ollama instance; parallel would cause contention
        run: >
          cargo test -p liter-llm --test local_llm
          -- --ignored --test-threads=1
        env:
          OLLAMA_BASE_URL: http://localhost:11434
          RUST_BACKTRACE: full
        shell: bash
# trigger CI
