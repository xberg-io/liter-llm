name: Swift

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable
      - name: Show Swift version
        run: swift --version
      - name: Build liter-llm-swift Rust crate
        run: cargo build -p liter-llm-swift
      - name: Copy swift-bridge generated sources
        run: |
          OUT=$(find target/debug/build -maxdepth 2 -type d -name out -path '*/liter-llm-swift-*/out' -print0 2>/dev/null | xargs -0 ls -dt 2>/dev/null | head -1)
          cat "$OUT/SwiftBridgeCore.h" "$OUT/liter-llm-swift/liter-llm-swift.h" \
              > packages/swift/Sources/RustBridgeC/RustBridgeC.h
          { echo "import RustBridgeC"; cat "$OUT/SwiftBridgeCore.swift"; } \
              > packages/swift/Sources/RustBridge/SwiftBridgeCore.swift
          { echo "import RustBridgeC"; cat "$OUT/liter-llm-swift/liter-llm-swift.swift"; } \
              > packages/swift/Sources/RustBridge/liter-llm-swift.swift
      - name: Build Swift package
        working-directory: packages/swift
        run: swift build
      - name: Run tests
        working-directory: packages/swift
        run: swift test
