name: Publish Release

on:
    workflow_dispatch:
        inputs:
            tag:
                description: "Git tag to publish (e.g. v1.0.0-rc.1)"
                required: true
                type: string
            ref:
                description: "Git ref (branch, tag, or commit) to build; defaults to the tag"
                required: false
                type: string
            dry_run:
                description: "Dry run — build everything but skip registry publishes"
                required: false
                default: "false"
                type: boolean
            force_republish:
                description: "Force publish even if the version already exists in registries"
                required: false
                type: boolean
                default: false
            republish:
                description: "Delete and re-create the tag on current HEAD before publishing (retag + full republish)"
                required: false
                type: boolean
                default: false
            targets:
                description: "Comma-separated targets to publish (empty = all). Values: crates python node wasm ruby go java elixir csharp php homebrew"
                required: false
                default: ""
                type: string
    release:
        types: [published]
    repository_dispatch:
        types: [publish-release]

concurrency:
    group: ${{ github.workflow }}-${{ (github.event_name == 'workflow_dispatch' && (github.event.inputs.tag)) || github.ref || github.run_id }}
    cancel-in-progress: false

permissions:
    contents: read

env:
    CARGO_TERM_COLOR: always

# ─────────────────────────────────────────────────────────────────────────────
# Phase 1 — Prepare
# ─────────────────────────────────────────────────────────────────────────────
jobs:
    prepare:
        name: Prepare
        runs-on: ubuntu-latest
        timeout-minutes: 15
        outputs:
            tag: ${{ steps.meta.outputs.tag }}
            # In dry-run dispatches, the tag from alef's release-metadata
            # (e.g. refs/tags/v0.0.0-dryrun) doesn't exist as a real git ref,
            # so downstream checkouts would 404. Fall back to the dispatch ref.
            checkout_ref: ${{ steps.meta.outputs.dry_run == 'true' && (inputs.ref || github.ref) || steps.meta.outputs.checkout_ref }}
            version: ${{ steps.meta.outputs.version }}
            is_tag: ${{ steps.meta.outputs.is_tag }}
            npm_tag: ${{ steps.meta.outputs.npm_tag }}
            dry_run: ${{ steps.meta.outputs.dry_run }}
            force_republish: ${{ steps.meta.outputs.force_republish }}
            target_sha: ${{ steps.meta.outputs.target_sha }}
            release_crates: ${{ steps.meta.outputs.release_crates }}
            release_python: ${{ steps.meta.outputs.release_python }}
            release_node: ${{ steps.meta.outputs.release_node }}
            release_wasm: ${{ steps.meta.outputs.release_wasm }}
            release_ruby: ${{ steps.meta.outputs.release_ruby }}
            release_go: ${{ steps.meta.outputs.release_go }}
            release_java: ${{ steps.meta.outputs.release_java }}
            release_elixir: ${{ steps.meta.outputs.release_elixir }}
            release_csharp: ${{ steps.meta.outputs.release_csharp }}
            release_php: ${{ steps.meta.outputs.release_php }}
            release_homebrew: ${{ steps.meta.outputs.release_homebrew }}
            release_kotlin: ${{ steps.meta.outputs.release_kotlin }}
            release_dart: ${{ steps.meta.outputs.release_dart }}
            release_zig: ${{ steps.meta.outputs.release_zig }}
            release_swift: ${{ steps.meta.outputs.release_swift }}
        steps:
            - uses: actions/create-github-app-token@v2
              id: app-token
              with:
                  app-id: ${{ secrets.BOT_APP_ID }}
                  private-key: ${{ secrets.BOT_APP_PRIVATE_KEY }}
                  owner: kreuzberg-dev

            - name: Checkout
              uses: actions/checkout@v6
              with:
                  fetch-depth: 0
                  ref: ${{ (inputs.republish == true && (inputs.ref || github.event.repository.default_branch)) || inputs.ref || github.ref }}
                  token: ${{ steps.app-token.outputs.token }}
                  persist-credentials: true

            - name: Retag for republish
              if: ${{ inputs.republish == true || github.event.client_payload.republish == true }}
              uses: kreuzberg-dev/actions/retag-for-republish@v1
              with:
                  tag: ${{ inputs.tag || github.event.client_payload.tag }}
              env:
                  GH_TOKEN: ${{ steps.app-token.outputs.token }}

            - name: Extract release metadata
              id: meta
              uses: kreuzberg-dev/actions/prepare-release-metadata@v1
              with:
                  available-targets: "crates,python,node,wasm,ruby,go,java,elixir,csharp,php,homebrew,kotlin,dart,zig,swift"

    # ─────────────────────────────────────────────────────────────────────────
    # Phase 2 — Validate version consistency
    # ─────────────────────────────────────────────────────────────────────────
    validate-versions:
        name: Validate versions
        needs: prepare
        runs-on: ubuntu-latest
        timeout-minutes: 15
        steps:
            - uses: actions/checkout@v6
              with:
                  ref: ${{ needs.prepare.outputs.checkout_ref }}

            - name: Check version consistency
              uses: kreuzberg-dev/actions/validate-versions@v1
              with:
                  version: ${{ needs.prepare.outputs.version }}
                  manifest-paths: |
                      cargo=Cargo.toml
                      python=packages/python/pyproject.toml
                      npm=packages/typescript/package.json
                      gem=packages/ruby/liter_llm.gemspec
                      maven=packages/java/pom.xml
                      mix=packages/elixir/mix.exs
                      csproj=packages/csharp/LiterLlm.csproj
                      composer=composer.json

    # ─────────────────────────────────────────────────────────────────────────
    # Phase 3 — Idempotency checks (all parallel)
    # ─────────────────────────────────────────────────────────────────────────
    check-registries:
        name: Check registries
        needs: [prepare]
        uses: kreuzberg-dev/actions/.github/workflows/reusable-check-registries.yml@main
        with:
            version: ${{ needs.prepare.outputs.version }}
            registries: >-
                [
                  {"name": "cratesio", "registry": "cratesio", "package": "liter-llm"},
                  {"name": "pypi", "registry": "pypi", "package": "liter-llm"},
                  {"name": "npm", "registry": "npm", "package": "@kreuzberg/liter-llm"},
                  {"name": "npm-wasm", "registry": "npm", "package": "@kreuzberg/liter-llm-wasm"},
                  {"name": "rubygems", "registry": "rubygems", "package": "liter_llm"},
                  {"name": "maven", "registry": "maven", "package": "dev.kreuzberg.literllm:liter-llm"},
                  {"name": "hex", "registry": "hex", "package": "liter_llm"},
                  {"name": "packagist", "registry": "packagist", "package": "kreuzberg-dev/liter-llm"},
                  {"name": "nuget", "registry": "nuget", "package": "LiterLlm"},
                  {"name": "go", "registry": "github-release", "package": "liter-llm", "repo": "kreuzberg-dev/liter-llm", "asset-prefix": "liter-llm-go-v"}
                ]

    registry-results:
        name: Parse registry results
        needs: [prepare, check-registries]
        if: always()
        runs-on: ubuntu-latest
        timeout-minutes: 2
        outputs:
            cratesio: ${{ steps.parse.outputs.cratesio }}
            pypi: ${{ steps.parse.outputs.pypi }}
            npm: ${{ steps.parse.outputs.npm }}
            npm_wasm: ${{ steps.parse.outputs.npm_wasm }}
            rubygems: ${{ steps.parse.outputs.rubygems }}
            maven: ${{ steps.parse.outputs.maven }}
            hex: ${{ steps.parse.outputs.hex }}
            packagist: ${{ steps.parse.outputs.packagist }}
            nuget: ${{ steps.parse.outputs.nuget }}
            go: ${{ steps.parse.outputs.go }}
        steps:
            - name: Parse check results
              id: parse
              env:
                  RESULTS: ${{ needs.check-registries.outputs.results }}
              run: |
                  if [ -z "$RESULTS" ] || [ "$RESULTS" = "null" ]; then
                    for key in cratesio pypi npm npm_wasm rubygems maven hex packagist nuget go; do
                      echo "${key}=false" >> "$GITHUB_OUTPUT"
                    done
                  else
                    echo "$RESULTS" | python3 -c "
                  import json, sys, os
                  data = json.load(sys.stdin)
                  out = os.environ.get('GITHUB_OUTPUT', '/dev/stdout')
                  with open(out, 'a') as f:
                      for key in ['cratesio','pypi','npm','npm_wasm','rubygems','maven','hex','packagist','nuget','go']:
                          # The reusable workflow returns 'result' from the matrix, keyed by check name
                          val = str(data.get(key, data.get(key.replace('_','-'), 'false'))).lower()
                          f.write(f'{key}={val}\n')
                  "
                  fi
              shell: bash

    # ─────────────────────────────────────────────────────────────────────────
    # Phase 3b — Pub.dev registry checks
    # ─────────────────────────────────────────────────────────────────────────
    check-pub:
        name: Check pub.dev for Dart package
        needs: prepare
        if: ${{ needs.prepare.outputs.release_dart == 'true' && (needs.prepare.outputs.is_tag == 'true' || needs.prepare.outputs.dry_run == 'true') }}
        runs-on: ubuntu-latest
        outputs:
            exists: ${{ steps.check.outputs.exists }}
        steps:
            - id: check
              uses: kreuzberg-dev/actions/check-registry@v1
              with:
                  registry: pub
                  package: liter_llm
                  version: ${{ needs.prepare.outputs.version }}

    build-dart-native:
        name: Build Dart native lib (${{ matrix.label }})
        needs: [prepare, check-pub]
        if: ${{ needs.prepare.outputs.release_dart == 'true' && (needs.prepare.outputs.is_tag == 'true' || needs.prepare.outputs.dry_run == 'true') && (needs.check-pub.outputs.exists != 'true' || needs.prepare.outputs.force_republish == 'true') }}
        strategy:
            fail-fast: false
            matrix:
                include:
                    - label: macos-arm64
                      runner: macos-latest
                      lib_name: libliter_llm_dart.dylib
                      # Published name inside lib/src/liter_llm_bridge_generated/
                      pub_name: libliter_llm_dart.dylib
                    - label: linux-x86_64
                      runner: ubuntu-latest
                      lib_name: libliter_llm_dart.so
                      pub_name: libliter_llm_dart_x86_64.so
                    - label: linux-arm64
                      runner: ubuntu-24.04-arm
                      lib_name: libliter_llm_dart.so
                      pub_name: libliter_llm_dart_aarch64.so
        runs-on: ${{ matrix.runner }}
        timeout-minutes: 60
        steps:
            - uses: actions/checkout@v6
              with:
                  ref: ${{ needs.prepare.outputs.checkout_ref }}

            - name: Setup Rust
              uses: kreuzberg-dev/actions/setup-rust@v1
              with:
                  cache-key-prefix: dart-native-${{ matrix.label }}
                  use-sccache: false

            - name: Build liter-llm-dart cdylib
              run: cargo build -p liter-llm-dart --release

            - name: Rename lib to publish name
              shell: bash
              run: |
                  cp target/release/${{ matrix.lib_name }} ${{ matrix.pub_name }}

            - name: Upload native lib
              uses: actions/upload-artifact@v7
              with:
                  name: dart-native-${{ matrix.label }}
                  path: ${{ matrix.pub_name }}
                  if-no-files-found: error
                  retention-days: 7

    assemble-dart-package:
        name: Assemble Dart package artifact
        needs: [prepare, check-pub, build-dart-native]
        if: ${{ needs.prepare.outputs.release_dart == 'true' && (needs.prepare.outputs.is_tag == 'true' || needs.prepare.outputs.dry_run == 'true') && (needs.check-pub.outputs.exists != 'true' || needs.prepare.outputs.force_republish == 'true') }}
        runs-on: ubuntu-latest
        steps:
            - uses: actions/checkout@v6
              with:
                  ref: ${{ needs.prepare.outputs.checkout_ref }}

            - name: Download macOS arm64 native lib
              uses: actions/download-artifact@v7
              with:
                  name: dart-native-macos-arm64
                  path: dart-natives

            - name: Download Linux x86_64 native lib
              uses: actions/download-artifact@v7
              with:
                  name: dart-native-linux-x86_64
                  path: dart-natives

            - name: Download Linux arm64 native lib
              uses: actions/download-artifact@v7
              with:
                  name: dart-native-linux-arm64
                  path: dart-natives

            - name: Bundle native libs into Dart package
              shell: bash
              run: |
                  BRIDGE_DIR="packages/dart/lib/src/liter_llm_bridge_generated"
                  ls dart-natives/
                  cp dart-natives/libliter_llm_dart.dylib "$BRIDGE_DIR/"
                  cp dart-natives/libliter_llm_dart_x86_64.so "$BRIDGE_DIR/"
                  cp dart-natives/libliter_llm_dart_aarch64.so "$BRIDGE_DIR/"

            - uses: actions/upload-artifact@v7
              with:
                  name: dart-package-assembled
                  path: packages/dart
                  if-no-files-found: error
                  retention-days: 7

    check-zig:
        name: Check Zig package presence
        needs: prepare
        if: ${{ (needs.prepare.outputs.is_tag == 'true' || needs.prepare.outputs.dry_run == 'true') && needs.prepare.outputs.release_zig == 'true' }}
        runs-on: ubuntu-latest
        outputs:
            exists: ${{ steps.check.outputs.exists }}
        steps:
            - id: check
              # `registry: github-release` (not `registry: zig`) — alef check-registry's
              # zig path only verifies the release tag exists. On a real release that's
              # always true, so it short-circuits `publish-zig` to skipped. Verify
              # the actual asset is present instead.
              uses: kreuzberg-dev/actions/check-registry@v1
              with:
                  registry: github-release
                  package: liter-llm-zig-v${{ needs.prepare.outputs.version }}.tar.gz
                  version: ${{ needs.prepare.outputs.version }}
                  repo: ${{ github.repository }}
                  assets: liter-llm-zig-v${{ needs.prepare.outputs.version }}.tar.gz

    # ─────────────────────────────────────────────────────────────────────────
    # Phase 4 — Build jobs
    # ─────────────────────────────────────────────────────────────────────────

    # ── Python wheels ──────────────────────────────────────────────────────────
    build-python-wheels:
        name: Build Python wheels (${{ matrix.label }})
        needs: [prepare, registry-results]
        if: |
            always() &&
            needs.prepare.outputs.release_python == 'true' &&
            (needs.registry-results.outputs.pypi != 'true' || needs.prepare.outputs.force_republish == 'true')
        runs-on: ${{ matrix.runner }}
        timeout-minutes: 90
        strategy:
            fail-fast: false
            matrix:
                include:
                    - label: linux-x86_64
                      runner: ubuntu-latest
                    - label: linux-aarch64
                      runner: ubuntu-24.04-arm
                    - label: macos-arm64
                      runner: macos-latest
                    - label: windows-x86_64
                      runner: windows-latest
        steps:
            - uses: actions/checkout@v6
              with:
                  ref: ${{ needs.prepare.outputs.checkout_ref }}
            - uses: kreuzberg-dev/actions/build-python-wheels@v1
              with:
                  package-dir: packages/python
                  # abi3-py310 is enabled in pyo3 features → one wheel per platform covers 3.10+.
                  # Without this override, cibuildwheel rebuilds for cp310/cp311/cp312/cp313/cp314 = 5x duplicates.
                  cibw-build: "cp310-*"
                  cibw-skip: "*-musllinux* *-win32 *-manylinux_i686 *-macosx_x86_64"
                  # The alef-generated .cargo/config.toml pins the aarch64-linux-gnu linker
                  # to `aarch64-linux-gnu-gcc` (cross-compile name), but manylinux containers
                  # running natively on arm64 only ship plain `cc`/`gcc`. Override per-target.
                  cibw-environment: 'MATURIN_BUILD_ARGS="--compatibility linux" CARGO_TARGET_AARCH64_UNKNOWN_LINUX_GNU_LINKER=cc'
                  artifact-name: python-wheel-${{ matrix.label }}

    build-python-sdist:
        name: Build Python sdist
        needs: [prepare, registry-results, publish-crates]
        if: |
            !cancelled() && needs.publish-crates.result != 'failure' &&
            needs.prepare.outputs.release_python == 'true' &&
            (needs.registry-results.outputs.pypi != 'true' || needs.prepare.outputs.force_republish == 'true')
        runs-on: ubuntu-latest
        timeout-minutes: 30
        steps:
            - uses: actions/checkout@v6
              with:
                  ref: ${{ needs.prepare.outputs.checkout_ref }}
            - uses: kreuzberg-dev/actions/setup-rust@v1
              with:
                  use-sccache: false
            - uses: actions/setup-python@v6
              with:
                  python-version: "3.14"
            - uses: kreuzberg-dev/actions/build-python-sdist@v1
              with:
                  package-dir: packages/python
                  output-dir: dist
                  dry-run: ${{ needs.prepare.outputs.dry_run }}
            - uses: actions/upload-artifact@v7
              with:
                  name: python-sdist
                  path: dist/*.tar.gz
                  retention-days: 14

    # ── Node.js NAPI native ────────────────────────────────────────────────────
    build-node-native:
        name: Build Node native (${{ matrix.label }})
        needs: [prepare, registry-results]
        if: |
            always() &&
            needs.prepare.outputs.release_node == 'true' &&
            (needs.registry-results.outputs.npm != 'true' || needs.prepare.outputs.force_republish == 'true')
        runs-on: ${{ matrix.runner }}
        timeout-minutes: 60
        strategy:
            fail-fast: false
            matrix:
                include:
                    - label: linux-x64-gnu
                      runner: ubuntu-latest
                      napi_target: x86_64-unknown-linux-gnu
                    - label: linux-arm64-gnu
                      runner: ubuntu-24.04-arm
                      napi_target: aarch64-unknown-linux-gnu
                    - label: darwin-arm64
                      runner: macos-latest
                      napi_target: aarch64-apple-darwin
                    - label: win32-x64-msvc
                      runner: windows-latest
                      napi_target: x86_64-pc-windows-msvc
        steps:
            - uses: actions/checkout@v6
              with:
                  ref: ${{ needs.prepare.outputs.checkout_ref }}
            - uses: kreuzberg-dev/actions/setup-rust@v1
              with:
                  target: ${{ matrix.napi_target }}
                  use-sccache: false
            - uses: actions/setup-node@v6
              with:
                  node-version: 22
            - run: npm install -g @napi-rs/cli
              shell: bash
            - name: Build NAPI binding
              run: napi build --release --platform --target ${{ matrix.napi_target }}
              working-directory: crates/liter-llm-node
              shell: bash
            - uses: actions/upload-artifact@v7
              with:
                  name: node-native-${{ matrix.label }}
                  path: crates/liter-llm-node/*.node
                  retention-days: 14

    # ── WebAssembly ────────────────────────────────────────────────────────────
    build-wasm:
        name: Build WASM
        needs: [prepare, registry-results]
        if: |
            always() &&
            needs.prepare.outputs.release_wasm == 'true' &&
            (needs.registry-results.outputs.npm_wasm != 'true' || needs.prepare.outputs.force_republish == 'true')
        runs-on: ubuntu-latest
        timeout-minutes: 60
        steps:
            - uses: actions/checkout@v6
              with:
                  ref: ${{ needs.prepare.outputs.checkout_ref }}
            - uses: kreuzberg-dev/actions/setup-rust@v1
              with:
                  target: wasm32-unknown-unknown
                  use-sccache: false
            - name: Install wasm-pack
              run: curl https://rustwasm.github.io/wasm-pack/installer/init.sh -sSf | sh
              shell: bash
            - name: Build WASM package
              env:
                  CARGO_PROFILE_RELEASE_LTO: "false"
                  CARGO_PROFILE_RELEASE_CODEGEN_UNITS: "16"
              run: wasm-pack build --target web --release
              working-directory: crates/liter-llm-wasm
              shell: bash
            - name: Patch pkg/package.json
              env:
                  VERSION: ${{ needs.prepare.outputs.version }}
              run: |
                  python3 - <<'EOF'
                  import json, os
                  path = "crates/liter-llm-wasm/pkg/package.json"
                  with open(path) as f:
                    pkg = json.load(f)
                  pkg["name"] = "@kreuzberg/liter-llm-wasm"
                  pkg["version"] = os.environ["VERSION"]
                  pkg["publishConfig"] = {"registry": "https://registry.npmjs.org/", "access": "public"}
                  with open(path, "w") as f:
                    json.dump(pkg, f, indent=2)
                  EOF
              shell: bash
            - uses: actions/upload-artifact@v7
              with:
                  name: wasm-pkg
                  path: crates/liter-llm-wasm/pkg/
                  retention-days: 14

    # ── Ruby gems ──────────────────────────────────────────────────────────────
    build-ruby-gem:
        name: Build Ruby gem (${{ matrix.label }})
        needs: [prepare, registry-results, publish-crates]
        if: |
            !cancelled() && needs.publish-crates.result != 'failure' &&
            needs.prepare.outputs.release_ruby == 'true' &&
            (needs.registry-results.outputs.rubygems != 'true' || needs.prepare.outputs.force_republish == 'true')
        runs-on: ${{ matrix.runner }}
        timeout-minutes: 120
        strategy:
            fail-fast: false
            matrix:
                include:
                    - label: linux-x86_64
                      runner: ubuntu-latest
                      ruby_platform: x86_64-linux
                    - label: linux-aarch64
                      runner: ubuntu-24.04-arm
                      ruby_platform: aarch64-linux
                    - label: macos-arm64
                      runner: macos-latest
                      ruby_platform: arm64-darwin
        env:
            RB_SYS_CARGO_PROFILE: release
        steps:
            - uses: actions/checkout@v6
              with:
                  ref: ${{ needs.prepare.outputs.checkout_ref }}
                  fetch-depth: 0

            - name: Setup Rust
              uses: kreuzberg-dev/actions/setup-rust@v1
              with:
                  cache-key-prefix: publish-ruby-${{ matrix.label }}
                  use-sccache: false

            - name: Set up Ruby
              uses: ruby/setup-ruby@v1
              with:
                  ruby-version: "3.3"
                  bundler: none
                  bundler-cache: false

            - name: Install Bundler
              shell: bash
              run: (gem install bundler -v 4.0.0 --no-document || gem install bundler --no-document) && bundler --version

            - name: Install Task
              uses: kreuzberg-dev/actions/install-task@v1

            - name: Rewrite native dependencies to registry versions
              if: needs.prepare.outputs.dry_run != 'true'
              uses: kreuzberg-dev/actions/rewrite-native-deps@v1
              with:
                  lang: ruby

            - name: Build FFI library
              run: cargo build -p liter-llm-ffi --release
              shell: bash

            - name: Install Ruby dependencies
              shell: bash
              working-directory: packages/ruby
              run: |
                  bundle config set --local path vendor/bundle
                  bundle check || bundle install

            - name: Compile native extension
              shell: bash
              working-directory: packages/ruby
              timeout-minutes: 60
              run: |
                  echo "Compiling native extension..."
                  if ! bundle exec rake compile 2>&1 | tee compile.log; then
                    echo "ERROR: Rake compile failed with exit code ${PIPESTATUS[0]}" >&2
                    exit 1
                  fi
                  echo "Native extension compiled successfully"
                  echo "=== Native libraries ==="
                  find lib -name '*.so' -o -name '*.bundle' -o -name '*.dylib' 2>/dev/null | head -20

            - name: Build platform gem
              shell: bash
              working-directory: packages/ruby
              run: ruby ../../scripts/publish/ruby/build-native-gem.rb "${{ matrix.ruby_platform }}"

            - name: Verify platform gem was built
              shell: bash
              working-directory: packages/ruby
              run: |
                  if [ ! -d pkg ]; then
                    echo "ERROR: pkg directory does not exist" >&2
                    ls -la >&2
                    exit 1
                  fi
                  if ! find pkg -maxdepth 1 -name "liter_llm-*-${{ matrix.ruby_platform }}.gem" -print -quit | grep -q .; then
                    echo "ERROR: No platform gem for ${{ matrix.ruby_platform }} found in pkg/" >&2
                    ls -la pkg/ >&2
                    exit 1
                  fi
                  echo "Platform gem built successfully:"
                  ls -lh pkg/*.gem

            - uses: actions/upload-artifact@v7
              with:
                  name: rubygems-${{ matrix.label }}
                  path: packages/ruby/pkg/*.gem
                  retention-days: 14
                  compression-level: 0

    # ── Elixir NIFs ────────────────────────────────────────────────────────────
    build-elixir-nifs:
        name: Build Elixir NIFs (${{ matrix.label }})
        needs: [prepare, registry-results, publish-crates]
        if: |
            !cancelled() && needs.publish-crates.result != 'failure' &&
            needs.prepare.outputs.release_elixir == 'true' &&
            (needs.registry-results.outputs.hex != 'true' || needs.prepare.outputs.force_republish == 'true')
        runs-on: ${{ matrix.runner }}
        timeout-minutes: 60
        strategy:
            fail-fast: false
            matrix:
                include:
                    - label: linux-x86_64
                      runner: ubuntu-latest
                      target: x86_64-unknown-linux-gnu
                      lib_ext: so
                    - label: linux-aarch64
                      runner: ubuntu-24.04-arm
                      target: aarch64-unknown-linux-gnu
                      lib_ext: so
                    - label: macos-arm64
                      runner: macos-latest
                      target: aarch64-apple-darwin
                      lib_ext: dylib
                    - label: windows-x86_64
                      runner: windows-latest
                      target: x86_64-pc-windows-gnu
                      lib_ext: dll
        steps:
            - uses: actions/checkout@v6
              with:
                  ref: ${{ needs.prepare.outputs.checkout_ref }}
            - uses: kreuzberg-dev/actions/setup-rust@v1
              with:
                  target: ${{ matrix.target }}
                  use-sccache: false
            - name: Rewrite native dependencies to registry versions
              if: needs.prepare.outputs.dry_run != 'true'
              uses: kreuzberg-dev/actions/rewrite-native-deps@v1
              with:
                  lang: elixir
            - name: Build Rustler NIF
              run: >
                  cargo build --release
                  --target ${{ matrix.target }}
                  --manifest-path packages/elixir/native/liter_llm_nif/Cargo.toml
              shell: bash
            - name: Create NIF tarballs (nif-2.16 and nif-2.17)
              env:
                  VERSION: ${{ needs.prepare.outputs.version }}
                  TARGET: ${{ matrix.target }}
                  LIB_EXT: ${{ matrix.lib_ext }}
              run: |
                  # liter_llm_nif is excluded from the root workspace and has no own
                  # [workspace] declaration, so cargo writes its build output under
                  # packages/elixir/native/liter_llm_nif/target/, not repo-root/target/.
                  NIF_TARGET_DIR="packages/elixir/native/liter_llm_nif/target"
                  if [ "$LIB_EXT" = "dll" ]; then
                    LIB_SRC="${NIF_TARGET_DIR}/${TARGET}/release/liter_llm_nif.${LIB_EXT}"
                  else
                    LIB_SRC="${NIF_TARGET_DIR}/${TARGET}/release/libliter_llm_nif.${LIB_EXT}"
                  fi
                  # rustler_precompiled 0.9.0 hardcodes `.so` for every non-Windows target
                  # in `lib_name_with_ext/2`. Normalize darwin output to `.so` so the
                  # release asset name matches what `generate-elixir-checksums` and
                  # consumer `mix deps.get` look up. Windows stays `.dll`.
                  case "$LIB_EXT" in
                    dylib) PUBLISH_EXT="so" ;;
                    *)     PUBLISH_EXT="$LIB_EXT" ;;
                  esac
                  mkdir -p nif-tarballs
                  for NIF_VER in 2.16 2.17; do
                    TARBALL="nif-tarballs/libliter_llm_nif-v${VERSION}-nif-${NIF_VER}-${TARGET}.${PUBLISH_EXT}.tar.gz"
                    INNER="libliter_llm_nif-v${VERSION}-nif-${NIF_VER}-${TARGET}.${PUBLISH_EXT}"
                    cp "$LIB_SRC" "$INNER"
                    tar -czf "$TARBALL" "$INNER"
                    rm "$INNER"
                    echo "Created: $TARBALL"
                  done
              shell: bash
            - uses: actions/upload-artifact@v7
              with:
                  name: elixir-nifs-${{ matrix.label }}
                  path: nif-tarballs/*.tar.gz
                  retention-days: 14

    # ── PHP extension ──────────────────────────────────────────────────────────
    build-php:
        name: Build PHP PIE binary (php${{ matrix.php }} ${{ matrix.platform.label }})
        needs: [prepare, publish-crates]
        if: |
            !cancelled() && needs.publish-crates.result != 'failure' &&
            needs.prepare.outputs.release_php == 'true'
        runs-on: ${{ matrix.platform.os }}
        timeout-minutes: 60
        permissions:
            contents: read
        strategy:
            fail-fast: false
            matrix:
                php: ["8.2", "8.3", "8.4", "8.5"]
                platform:
                    - os: ubuntu-latest
                      label: linux-x86_64
                      target: x86_64-unknown-linux-gnu
                    - os: ubuntu-24.04-arm
                      label: linux-arm64
                      target: aarch64-unknown-linux-gnu
                    - os: macos-latest
                      label: macos-arm64
                      target: aarch64-apple-darwin
                    - os: windows-latest
                      label: windows-x86_64
                      target: x86_64-pc-windows-msvc
                exclude:
                    # shivammathur/setup-php has no PHP 8.5 build for macos-arm64
                    # as of 2026-06; PHP 8.5 was released Nov 2025 and the action
                    # is still catching up. Re-enable once setup-php publishes
                    # an 8.5 macos-arm64 image.
                    - php: "8.5"
                      platform:
                          os: macos-latest
                          label: macos-arm64
                          target: aarch64-apple-darwin
        steps:
            - name: Checkout
              uses: actions/checkout@v6
              with:
                  ref: ${{ needs.prepare.outputs.checkout_ref }}
                  fetch-depth: 0

            - name: Ensure target commit
              if: ${{ needs.prepare.outputs.target_sha != '' }}
              env:
                  TARGET_SHA: ${{ needs.prepare.outputs.target_sha }}
              run: scripts/publish/common/ensure-target-commit.sh
              shell: bash

            - name: Setup PHP
              uses: kreuzberg-dev/actions/setup-php@v1
              with:
                  php-version: ${{ matrix.php }}

            - name: Setup Rust
              uses: kreuzberg-dev/actions/setup-rust@v1
              with:
                  cache-key-prefix: publish-php-${{ matrix.platform.label }}-php${{ matrix.php }}
                  toolchain: stable
                  use-sccache: false

            - name: Install alef
              uses: kreuzberg-dev/actions/install-alef@v1

            - name: Build PHP extension
              uses: kreuzberg-dev/actions/build-php-extension@v1
              with:
                  crate-name: liter-llm-php
                  lib-name: liter_llm_php
                  php-version: ${{ matrix.php }}
                  php-ts: nts
                  dry-run: ${{ needs.prepare.outputs.dry_run }}

            - name: Determine Windows compiler
              if: runner.os == 'Windows'
              id: wincompiler
              shell: pwsh
              run: |
                  $compiler = switch ('${{ matrix.php }}') {
                    '8.2' { 'vs16' }
                    '8.3' { 'vs16' }
                    '8.4' { 'vs17' }
                    '8.5' { 'vs17' }
                    default { 'vs17' }
                  }
                  "compiler=$compiler" | Out-File -FilePath $env:GITHUB_OUTPUT -Encoding utf8 -Append

            - name: Package PIE archive
              uses: kreuzberg-dev/actions/package-php-pie@v1
              with:
                  php-version: ${{ matrix.php }}
                  php-ts: nts
                  target: ${{ matrix.platform.target }}
                  windows-compiler: ${{ steps.wincompiler.outputs.compiler }}
                  version: ${{ needs.prepare.outputs.version }}
                  output-dir: dist/php-package
                  dry-run: ${{ needs.prepare.outputs.dry_run }}

            - name: Upload PHP PIE package artifact
              if: needs.prepare.outputs.dry_run != 'true'
              uses: actions/upload-artifact@v7
              with:
                  name: php-package-${{ matrix.platform.label }}-php${{ matrix.php }}
                  path: |
                      dist/php-package/php_*.tgz
                      dist/php-package/php_*.tgz.sha256
                      dist/php-package/php_*.zip
                      dist/php-package/php_*.zip.sha256
                  retention-days: 14

    # ── Rust FFI (shared for Go / Java / C# / C consumers) ────────────────────
    build-ffi:
        name: Build Rust FFI (${{ matrix.label }})
        needs: [prepare, validate-versions, registry-results]
        if: |
            always() &&
            needs.prepare.result == 'success' &&
            needs.validate-versions.result == 'success' &&
            (
              (needs.prepare.outputs.release_go == 'true' &&
               (needs.registry-results.outputs.go != 'true' || needs.prepare.outputs.force_republish == 'true')) ||
              (needs.prepare.outputs.release_java == 'true' &&
               (needs.registry-results.outputs.maven != 'true' || needs.prepare.outputs.force_republish == 'true')) ||
              (needs.prepare.outputs.release_csharp == 'true' &&
               (needs.registry-results.outputs.nuget != 'true' || needs.prepare.outputs.force_republish == 'true'))
            )
        runs-on: ${{ matrix.runner }}
        timeout-minutes: 60
        strategy:
            fail-fast: false
            matrix:
                include:
                    - label: linux-x86_64
                      runner: ubuntu-latest
                      target: x86_64-unknown-linux-gnu
                      rid: linux-x64
                    - label: linux-aarch64
                      runner: ubuntu-24.04-arm
                      target: aarch64-unknown-linux-gnu
                      rid: linux-arm64
                    - label: macos-arm64
                      runner: macos-latest
                      target: aarch64-apple-darwin
                      rid: osx-arm64
                    - label: windows-x86_64
                      runner: windows-latest
                      target: x86_64-pc-windows-msvc
                      rid: win-x64
        steps:
            - uses: actions/checkout@v6
              with:
                  ref: ${{ needs.prepare.outputs.checkout_ref }}
            - name: Setup Rust
              uses: kreuzberg-dev/actions/setup-rust@v1
              with:
                  target: ${{ matrix.target }}
                  use-sccache: false
            - name: Install alef
              uses: kreuzberg-dev/actions/install-alef@v1
            - name: Build FFI
              shell: bash
              run: alef publish build --lang ffi --target ${{ matrix.target }}
            - name: Package Go FFI
              shell: bash
              run: alef publish package --lang go --target ${{ matrix.target }} -o go-ffi-dist
            - name: Stage FFI artifacts
              env:
                  TARGET: ${{ matrix.target }}
                  RID: ${{ matrix.rid }}
              run: |
                  mkdir -p "ffi-staging/${RID}"
                  find "target/${TARGET}/release" -maxdepth 1 -type f \( -name '*.so' -o -name '*.dylib' -o -name '*.dll' -o -name '*.a' -o -name '*.dll.lib' \) -name '*liter_llm_ffi*' -exec cp {} "ffi-staging/${RID}/" \;
                  # Copy cbindgen-generated header if present
                  if [ -f crates/liter-llm-ffi/include/liter_llm_ffi.h ]; then
                    mkdir -p ffi-staging/include
                    cp crates/liter-llm-ffi/include/liter_llm_ffi.h ffi-staging/include/
                  elif [ -f crates/liter-llm-ffi/liter_llm.h ]; then
                    mkdir -p ffi-staging/include
                    cp crates/liter-llm-ffi/liter_llm.h ffi-staging/include/
                  fi
              shell: bash
            - name: Package C FFI tarball
              env:
                  TARGET: ${{ matrix.target }}
                  LABEL: ${{ matrix.label }}
                  VERSION: ${{ needs.prepare.outputs.version }}
              run: |
                  declare -A triple_map=(
                    ["linux-x86_64"]="x86_64-unknown-linux-gnu"
                    ["linux-aarch64"]="aarch64-unknown-linux-gnu"
                    ["macos-arm64"]="aarch64-apple-darwin"
                    ["windows-x86_64"]="x86_64-pc-windows-msvc"
                  )
                  TRIPLE="${triple_map[$LABEL]}"
                  STAGE_DIR="liter_llm_ffi-v${VERSION}-${TRIPLE}"
                  mkdir -p "$STAGE_DIR/lib" "$STAGE_DIR/include"
                  find "target/${TARGET}/release" -maxdepth 1 -type f \
                    \( -name '*.so' -o -name '*.dylib' -o -name '*.dll' -o -name '*.dll.lib' \) \
                    -name '*liter_llm_ffi*' \
                    -exec cp {} "$STAGE_DIR/lib/" \;
                  if [ -f crates/liter-llm-ffi/include/liter_llm.h ]; then
                    cp crates/liter-llm-ffi/include/liter_llm.h "$STAGE_DIR/include/"
                  elif [ -f crates/liter-llm-ffi/liter_llm.h ]; then
                    cp crates/liter-llm-ffi/liter_llm.h "$STAGE_DIR/include/"
                  fi
                  mkdir -p dist/c-ffi
                  tar -czf "dist/c-ffi/${STAGE_DIR}.tar.gz" "$STAGE_DIR"
              shell: bash
            - uses: actions/upload-artifact@v7
              with:
                  name: ffi-${{ matrix.label }}
                  path: ffi-staging/
                  retention-days: 14
            - uses: actions/upload-artifact@v7
              with:
                  name: c-ffi-${{ matrix.label }}
                  path: dist/c-ffi/*.tar.gz
                  if-no-files-found: error
                  retention-days: 14
            - uses: actions/upload-artifact@v7
              with:
                  name: go-ffi-${{ matrix.label }}
                  path: go-ffi-dist/
                  retention-days: 14

    # ── Java package assembly ──────────────────────────────────────────────────
    build-java-package:
        name: Build Java package
        needs: [prepare, registry-results, build-ffi]
        if: |
            always() &&
            needs.prepare.outputs.release_java == 'true' &&
            needs.build-ffi.result == 'success' &&
            (needs.registry-results.outputs.maven != 'true' || needs.prepare.outputs.force_republish == 'true')
        runs-on: ubuntu-latest
        timeout-minutes: 30
        steps:
            - uses: actions/checkout@v6
              with:
                  ref: ${{ needs.prepare.outputs.checkout_ref }}
            - uses: actions/download-artifact@v7
              with:
                  pattern: ffi-*
                  path: ffi-artifacts
                  merge-multiple: true
            - name: Stage native libs for Java
              run: |
                  # Map runtime IDs (RID) to Java native directory structure.
                  # FFI build uses osx/win prefixes (compatibility with Go/.NET);
                  # Java NativeLib resolver expects macos/windows prefixes.
                  declare -A rid_map=(
                    [linux-x64]="linux-x64"
                    [linux-arm64]="linux-arm64"
                    [osx-arm64]="macos-arm64"
                    [win-x64]="windows-x64"
                  )
                  for ffi_rid in "${!rid_map[@]}"; do
                    java_rid="${rid_map[$ffi_rid]}"
                    dest="packages/java/src/main/resources/natives/${java_rid}"
                    mkdir -p "$dest"
                    find "ffi-artifacts/${ffi_rid}" -type f -print0 | xargs -0 -I{} cp {} "$dest/"
                  done
              shell: bash
            - uses: actions/setup-java@v5
              with:
                  java-version: "25"
                  distribution: temurin
                  cache: maven
            - name: Setup Maven 3.9.11
              uses: kreuzberg-dev/actions/setup-maven@v1
            - name: Build Maven package
              run: mvn clean package -DskipTests -q
              working-directory: packages/java
              shell: bash
            - uses: actions/upload-artifact@v7
              with:
                  name: maven-packages
                  path: packages/java/target/*.jar
                  retention-days: 14

    # ── C# NuGet assembly ──────────────────────────────────────────────────────
    build-csharp-package:
        name: Build C# NuGet package
        needs: [prepare, registry-results, build-ffi]
        if: |
            always() &&
            needs.prepare.outputs.release_csharp == 'true' &&
            needs.build-ffi.result == 'success' &&
            (needs.registry-results.outputs.nuget != 'true' || needs.prepare.outputs.force_republish == 'true')
        runs-on: ubuntu-latest
        timeout-minutes: 30
        steps:
            - uses: actions/checkout@v6
              with:
                  ref: ${{ needs.prepare.outputs.checkout_ref }}
            - uses: actions/download-artifact@v7
              with:
                  pattern: ffi-*
                  path: ffi-artifacts
                  merge-multiple: true
            - name: Stage native libs for C#
              run: |
                  for rid in linux-x64 linux-arm64 osx-arm64 win-x64; do
                    dest="packages/csharp/LiterLlm/runtimes/${rid}/native"
                    mkdir -p "$dest"
                    find "ffi-artifacts/${rid}" -type f -print0 | xargs -0 -I{} cp {} "$dest/"
                  done
              shell: bash
            - uses: actions/setup-dotnet@v5
              with:
                  dotnet-version: "10.0.x"
            - name: Pack NuGet package
              run: dotnet pack packages/csharp/LiterLlm/LiterLlm.csproj -c Release -o nuget-output
              shell: bash
            - uses: actions/upload-artifact@v7
              with:
                  name: nuget-packages
                  path: nuget-output/*.nupkg
                  retention-days: 14

    # ── Kotlin Android natives (.aar) ──────────────────────────────────────────
    build-kotlin-android-natives:
        name: Build Kotlin Android natives (${{ matrix.abi }})
        needs: [prepare, registry-results]
        if: |
            always() &&
            needs.prepare.outputs.release_kotlin == 'true'
        runs-on: ubuntu-latest
        timeout-minutes: 30
        strategy:
            fail-fast: false
            matrix:
                abi: [arm64-v8a, x86_64]
        steps:
            - uses: actions/checkout@v6
              with:
                  ref: ${{ needs.prepare.outputs.checkout_ref }}
            - uses: kreuzberg-dev/actions/setup-rust@v1
              with:
                  cache-key-prefix: publish-android-${{ matrix.abi }}
                  use-sccache: false
            - uses: kreuzberg-dev/actions/setup-android-ndk@v1
            - name: Build liter-llm-jni for ${{ matrix.abi }}
              run: cargo ndk --target ${{ matrix.abi }} --platform 21 -- build -p liter-llm-jni --release
            - name: Stage jniLibs
              shell: bash
              run: |
                  mkdir -p packages/kotlin-android/src/main/jniLibs/${{ matrix.abi }}
                  case "${{ matrix.abi }}" in
                    arm64-v8a) RUST_TGT=aarch64-linux-android ;;
                    x86_64)    RUST_TGT=x86_64-linux-android ;;
                  esac
                  cp "target/${RUST_TGT}/release/libliterllm_jni.so" \
                     "packages/kotlin-android/src/main/jniLibs/${{ matrix.abi }}/"
            - uses: actions/setup-java@v5
              with:
                  distribution: temurin
                  java-version: "17"
            - uses: gradle/actions/setup-gradle@v6
              with:
                  gradle-version: "8.13"
            - name: Assemble Android library aar
              working-directory: packages/kotlin-android
              env:
                  PROJECT_VERSION: ${{ needs.prepare.outputs.version }}
              run: gradle "assembleRelease" "-Pversion=${PROJECT_VERSION}"
            - uses: actions/upload-artifact@v7
              with:
                  name: kotlin-android-${{ matrix.abi }}
                  path: packages/kotlin-android/build/outputs/aar/*.aar
                  retention-days: 14

    # ─────────────────────────────────────────────────────────────────────────
    # Phase 5 — Upload release assets (Go FFI, C FFI, Elixir NIFs)
    # ─────────────────────────────────────────────────────────────────────────
    upload-c-ffi:
        name: Upload C FFI assets
        needs: [prepare, validate-versions, build-ffi]
        if: |
            always() &&
            needs.build-ffi.result == 'success' &&
            needs.validate-versions.result == 'success'
        runs-on: ubuntu-latest
        timeout-minutes: 15
        steps:
            - uses: actions/create-github-app-token@v2
              id: app-token
              with:
                  app-id: ${{ secrets.BOT_APP_ID }}
                  private-key: ${{ secrets.BOT_APP_PRIVATE_KEY }}
                  owner: kreuzberg-dev
            - uses: actions/checkout@v6
              with:
                  ref: ${{ needs.prepare.outputs.checkout_ref }}
            - name: Ensure GitHub release exists
              uses: kreuzberg-dev/actions/publish-github-release@v1
              with:
                  tag: ${{ needs.prepare.outputs.tag }}
                  draft: "true"
                  dry-run: ${{ needs.prepare.outputs.dry_run }}
                  token: ${{ steps.app-token.outputs.token }}
            - uses: actions/download-artifact@v7
              with:
                  pattern: c-ffi-*
                  path: c-ffi-release
                  merge-multiple: true
            - name: Upload to GitHub Release
              uses: kreuzberg-dev/actions/upload-release-assets@v1
              with:
                  tag: ${{ needs.prepare.outputs.tag }}
                  assets: c-ffi-release/*.tar.gz
                  dry-run: ${{ needs.prepare.outputs.dry_run }}
                  token: ${{ steps.app-token.outputs.token }}

    upload-go-ffi:
        name: Upload Go FFI assets
        needs: [prepare, validate-versions, registry-results, build-ffi]
        if: |
            always() &&
            needs.prepare.outputs.release_go == 'true' &&
            needs.validate-versions.result == 'success' &&
            needs.build-ffi.result == 'success' &&
            (needs.registry-results.outputs.go != 'true' || needs.prepare.outputs.force_republish == 'true')
        runs-on: ubuntu-latest
        timeout-minutes: 15
        steps:
            - uses: actions/create-github-app-token@v2
              id: app-token
              with:
                  app-id: ${{ secrets.BOT_APP_ID }}
                  private-key: ${{ secrets.BOT_APP_PRIVATE_KEY }}
                  owner: kreuzberg-dev
            - uses: actions/checkout@v6
              with:
                  ref: ${{ needs.prepare.outputs.checkout_ref }}
            - name: Ensure GitHub release exists
              uses: kreuzberg-dev/actions/publish-github-release@v1
              with:
                  tag: ${{ needs.prepare.outputs.tag }}
                  draft: "true"
                  dry-run: ${{ needs.prepare.outputs.dry_run }}
                  token: ${{ steps.app-token.outputs.token }}
            - uses: actions/download-artifact@v7
              with:
                  pattern: go-ffi-*
                  path: go-ffi-release
                  merge-multiple: true
            - name: Upload to GitHub Release
              uses: kreuzberg-dev/actions/upload-release-assets@v1
              with:
                  tag: ${{ needs.prepare.outputs.tag }}
                  assets: go-ffi-release/*.tar.gz
                  dry-run: ${{ needs.prepare.outputs.dry_run }}
                  token: ${{ steps.app-token.outputs.token }}

    # Commit the prebuilt shared libraries into packages/go/.lib/<platform>/ so
    # that `go get github.com/kreuzberg-dev/liter-llm/packages/go@v{version}` ships
    # a self-contained cgo module.  cgo LDFLAGS use Go arch names (amd64/arm64) for
    # directories; alef release tarballs use its own names (x86_64/aarch64).
    # The mapping table below bridges the two naming conventions.
    publish-go-module:
        name: Bundle Go FFI libs and publish Go module tag
        needs: [prepare, validate-versions, registry-results, build-ffi, upload-go-ffi]
        if: |
            always() &&
            needs.prepare.outputs.release_go == 'true' &&
            needs.validate-versions.result == 'success' &&
            needs.build-ffi.result == 'success' &&
            (needs.upload-go-ffi.result == 'success' || needs.upload-go-ffi.result == 'skipped')
        runs-on: ubuntu-latest
        timeout-minutes: 15
        steps:
            - uses: actions/create-github-app-token@v2
              id: app-token
              with:
                  app-id: ${{ secrets.BOT_APP_ID }}
                  private-key: ${{ secrets.BOT_APP_PRIVATE_KEY }}
                  owner: kreuzberg-dev

            - uses: actions/checkout@v6
              with:
                  ref: ${{ needs.prepare.outputs.checkout_ref }}
                  fetch-depth: 0
                  token: ${{ steps.app-token.outputs.token }}
                  persist-credentials: true

            - name: Setup Git
              run: |
                  git config user.name "kreuzberg-dev-publisher[bot]"
                  git config user.email "291994444+kreuzberg-dev-publisher[bot]@users.noreply.github.com"
              shell: bash

            - uses: actions/download-artifact@v7
              with:
                  pattern: go-ffi-*
                  path: go-ffi-artifacts
                  merge-multiple: true

            - name: Extract shared libs into packages/go/.lib/
              env:
                  DRY_RUN: ${{ needs.prepare.outputs.dry_run }}
              shell: bash
              run: |
                  # Match the platform suffix explicitly; the version string contains
                  # hyphens (e.g. v1.4.0-rc.39) so glob-strip with `##` over-strips and
                  # drops the OS prefix. Anchored case matches at the END only.
                  for tarball in go-ffi-artifacts/*.tar.gz; do
                    base=$(basename "$tarball" .tar.gz)
                    case "$base" in
                      *-linux-x86_64)   lib_dir="linux-amd64"   ;;
                      *-linux-aarch64)  lib_dir="linux-arm64"   ;;
                      *-macos-arm64)    lib_dir="macos-arm64"   ;;
                      *-macos-x86_64)   lib_dir="macos-amd64"   ;;
                      *-windows-x86_64) lib_dir="windows-amd64" ;;
                      *)
                        echo "WARNING: unknown platform suffix on '$base', skipping"
                        continue
                        ;;
                    esac
                    echo "Extracting $tarball → packages/go/.lib/$lib_dir/"
                    mkdir -p "packages/go/.lib/$lib_dir"
                    # Tarballs structure: {pkg_name}/lib/{shared_lib} {pkg_name}/include/{header}
                    # Extract to a temp dir, then copy only the shared lib (.so/.dylib/.dll).
                    tmp_dir=$(mktemp -d)
                    tar xzf "$tarball" -C "$tmp_dir"
                    find "$tmp_dir" -maxdepth 3 -type f \
                      \( -name '*.so' -o -name '*.dylib' -o -name '*.dll' \) \
                      -exec cp {} "packages/go/.lib/$lib_dir/" \;
                    rm -rf "$tmp_dir"
                    ls -la "packages/go/.lib/$lib_dir/" || true
                  done

            - name: Commit .lib/ files and create Go module tag
              if: ${{ needs.prepare.outputs.dry_run != 'true' }}
              env:
                  GH_TOKEN: ${{ steps.app-token.outputs.token }}
                  TAG: ${{ needs.prepare.outputs.tag }}
                  VERSION: ${{ needs.prepare.outputs.version }}
                  REPO: ${{ github.repository }}
              shell: bash
              run: |
                  # Stage the .lib/ files (binary blobs from build matrix).
                  # We cannot use `git pull --rebase` to recover from non-fast-forward
                  # pushes because binary files cannot be auto-merged; rebase fails with
                  # "Cannot merge binary files". Instead, snapshot the staged .lib/
                  # directory, reset hard to origin/main, re-stage, and re-commit.
                  # Binary files are replaced wholesale, not merged.
                  git add packages/go/.lib/
                  if git diff --cached --quiet; then
                    echo "No .lib/ changes to commit — skipping"
                  else
                    LIB_SNAPSHOT="$(mktemp -d)/lib-bundle"
                    mkdir -p "$LIB_SNAPSHOT"
                    cp -R packages/go/.lib/. "$LIB_SNAPSHOT/"
                    git commit -m "chore(go): bundle prebuilt FFI libs for v${VERSION} [ci skip]"
                    for i in 1 2 3 4 5; do
                      if git push origin HEAD:refs/heads/main; then
                        echo "Push succeeded on attempt $i"
                        break
                      fi
                      if [ "$i" -eq 5 ]; then
                        echo "Push failed after 5 attempts; aborting"
                        exit 1
                      fi
                      echo "Push attempt $i failed; resyncing onto origin/main..."
                      git fetch origin main
                      git reset --hard origin/main
                      rm -rf packages/go/.lib/
                      mkdir -p packages/go/.lib/
                      cp -R "$LIB_SNAPSHOT/." packages/go/.lib/
                      git add packages/go/.lib/
                      if git diff --cached --quiet; then
                        echo ".lib/ already current on origin/main — skipping commit"
                        break
                      fi
                      git commit -m "chore(go): bundle prebuilt FFI libs for v${VERSION} [ci skip]"
                      sleep $((i * 2))
                    done
                  fi
                  HEAD_SHA=$(git rev-parse HEAD)
                  # Create the packages/go/{tag} module tag on the new commit.
                  # The Go module proxy resolves github.com/kreuzberg-dev/liter-llm/packages/go@v{version}
                  # from this tag, which now includes the prebuilt .lib/ shared libraries.
                  MODULE_TAG="packages/go/${TAG}"
                  # Use git CLI for tag creation. `gh api git/refs` returns 403
                  # "Resource not accessible by integration" even with the job-level
                  # `contents: write` permission on release-triggered runs; `git push`
                  # using the GITHUB_TOKEN that actions/checkout configures works.
                  # Existence check still uses singular `git/ref/...` (exact-match):
                  # the plural endpoint returns ALL refs matching the prefix, so a
                  # query for "packages/go/v1.4.0-rc.38" would return every
                  # "packages/go/*" tag and incorrectly report new tags as existing.
                  if gh api "repos/${REPO}/git/ref/tags/${MODULE_TAG}" --silent 2>/dev/null; then
                    echo "Go module tag $MODULE_TAG already exists — skipping"
                  else
                    git tag "${MODULE_TAG}" "${HEAD_SHA}"
                    git push origin "refs/tags/${MODULE_TAG}"
                    echo "Created Go module tag: $MODULE_TAG → $HEAD_SHA"
                  fi

    upload-elixir-nifs:
        name: Upload Elixir NIF assets
        needs: [prepare, build-elixir-nifs]
        if: always() && needs.prepare.outputs.release_elixir == 'true' && needs.build-elixir-nifs.result == 'success'
        runs-on: ubuntu-latest
        timeout-minutes: 15
        steps:
            - uses: actions/create-github-app-token@v2
              id: app-token
              with:
                  app-id: ${{ secrets.BOT_APP_ID }}
                  private-key: ${{ secrets.BOT_APP_PRIVATE_KEY }}
                  owner: kreuzberg-dev
            - uses: actions/checkout@v6
              with:
                  ref: ${{ needs.prepare.outputs.checkout_ref }}
            - name: Ensure GitHub release exists
              uses: kreuzberg-dev/actions/publish-github-release@v1
              with:
                  tag: ${{ needs.prepare.outputs.tag }}
                  draft: "true"
                  dry-run: ${{ needs.prepare.outputs.dry_run }}
                  token: ${{ steps.app-token.outputs.token }}
            - uses: actions/download-artifact@v7
              with:
                  pattern: elixir-nifs-*
                  path: elixir-nifs
                  merge-multiple: true
            - name: Upload to GitHub Release
              uses: kreuzberg-dev/actions/upload-release-assets@v1
              with:
                  tag: ${{ needs.prepare.outputs.tag }}
                  assets: elixir-nifs/*.tar.gz
                  dry-run: ${{ needs.prepare.outputs.dry_run }}
                  token: ${{ steps.app-token.outputs.token }}

    upload-php-extensions:
        name: Upload PHP extension assets
        needs: [prepare, build-php]
        if: always() && needs.prepare.outputs.release_php == 'true' && needs.build-php.result == 'success'
        runs-on: ubuntu-latest
        timeout-minutes: 15
        steps:
            - uses: actions/create-github-app-token@v2
              id: app-token
              with:
                  app-id: ${{ secrets.BOT_APP_ID }}
                  private-key: ${{ secrets.BOT_APP_PRIVATE_KEY }}
                  owner: kreuzberg-dev
            - uses: actions/checkout@v6
              with:
                  ref: ${{ needs.prepare.outputs.checkout_ref }}
            - name: Ensure GitHub release exists
              uses: kreuzberg-dev/actions/publish-github-release@v1
              with:
                  tag: ${{ needs.prepare.outputs.tag }}
                  draft: "true"
                  dry-run: ${{ needs.prepare.outputs.dry_run }}
                  token: ${{ steps.app-token.outputs.token }}
            - uses: actions/download-artifact@v7
              with:
                  pattern: php-package-*
                  path: dist/php-package
                  merge-multiple: true
            - name: Upload PHP PIE packages
              uses: kreuzberg-dev/actions/upload-release-assets@v1
              with:
                  tag: ${{ needs.prepare.outputs.tag }}
                  assets: |
                      dist/php-package/php_*.tgz
                      dist/php-package/php_*.tgz.sha256
                      dist/php-package/php_*.zip
                      dist/php-package/php_*.zip.sha256
                  fail-if-empty: "false"
                  dry-run: ${{ needs.prepare.outputs.dry_run }}
                  token: ${{ steps.app-token.outputs.token }}

    upload-kotlin-android-aars:
        name: Upload Kotlin Android aars
        needs: [prepare, build-kotlin-android-natives]
        if: always() && needs.prepare.outputs.release_kotlin == 'true' && needs.build-kotlin-android-natives.result == 'success'
        runs-on: ubuntu-latest
        timeout-minutes: 15
        steps:
            - uses: actions/create-github-app-token@v2
              id: app-token
              with:
                  app-id: ${{ secrets.BOT_APP_ID }}
                  private-key: ${{ secrets.BOT_APP_PRIVATE_KEY }}
                  owner: kreuzberg-dev
            - uses: actions/checkout@v6
              with:
                  ref: ${{ needs.prepare.outputs.checkout_ref }}
            - name: Ensure GitHub release exists
              uses: kreuzberg-dev/actions/publish-github-release@v1
              with:
                  tag: ${{ needs.prepare.outputs.tag }}
                  draft: "true"
                  dry-run: ${{ needs.prepare.outputs.dry_run }}
                  token: ${{ steps.app-token.outputs.token }}
            - uses: actions/download-artifact@v7
              with:
                  pattern: kotlin-android-*
                  path: kotlin-android-aars
                  merge-multiple: true
            - name: Upload aar bundles
              uses: kreuzberg-dev/actions/upload-release-assets@v1
              with:
                  tag: ${{ needs.prepare.outputs.tag }}
                  assets: kotlin-android-aars/*.aar
                  fail-if-empty: "false"
                  dry-run: ${{ needs.prepare.outputs.dry_run }}
                  token: ${{ steps.app-token.outputs.token }}

    # ─────────────────────────────────────────────────────────────────────────
    # Phase 6 — Publish jobs (conditional on check + build results)
    # ─────────────────────────────────────────────────────────────────────────

    publish-crates:
        name: Publish crates.io
        needs: [prepare, validate-versions, registry-results]
        if: |
            always() &&
            needs.prepare.outputs.release_crates == 'true' &&
            needs.validate-versions.result == 'success' &&
            (needs.registry-results.outputs.cratesio != 'true' || needs.prepare.outputs.force_republish == 'true')
        runs-on: ubuntu-latest
        permissions:
            contents: read
            id-token: write
        timeout-minutes: 60
        steps:
            - uses: actions/checkout@v6
              with:
                  ref: ${{ needs.prepare.outputs.checkout_ref }}
            - uses: kreuzberg-dev/actions/setup-rust@v1
              with:
                  use-sccache: false
            - uses: kreuzberg-dev/actions/publish-crates@v1
              with:
                  crates: liter-llm liter-llm-ffi liter-llm-proxy liter-llm-cli
                  version: ${{ needs.prepare.outputs.version }}
                  dry-run: ${{ needs.prepare.outputs.dry_run }}

    publish-pypi:
        name: Publish PyPI
        needs: [prepare, validate-versions, registry-results, build-python-wheels, build-python-sdist]
        if: |
            always() &&
            needs.prepare.outputs.release_python == 'true' &&
            needs.validate-versions.result == 'success' &&
            needs.build-python-wheels.result == 'success' &&
            needs.build-python-sdist.result == 'success' &&
            (needs.registry-results.outputs.pypi != 'true' || needs.prepare.outputs.force_republish == 'true')
        runs-on: ubuntu-latest
        permissions:
            contents: read
            id-token: write
        timeout-minutes: 15
        environment:
            name: pypi
            url: https://pypi.org/p/liter-llm
        steps:
            - name: Re-check PyPI before publishing
              uses: kreuzberg-dev/actions/check-registry@v1
              id: recheck
              with:
                  registry: pypi
                  package: liter-llm
                  version: ${{ needs.prepare.outputs.version }}
            - name: Download all wheel + sdist artifacts
              if: steps.recheck.outputs.exists != 'true' || needs.prepare.outputs.force_republish == 'true'
              uses: actions/download-artifact@v7
              with:
                  pattern: python-*
                  path: dist
                  merge-multiple: true
            - name: List packages to publish
              if: steps.recheck.outputs.exists != 'true' || needs.prepare.outputs.force_republish == 'true'
              run: |
                  echo "Packages in dist:"
                  ls -lh dist/ 2>/dev/null || echo "No packages found"
              shell: bash
            - name: Publish to PyPI
              if: needs.prepare.outputs.dry_run != 'true' && (steps.recheck.outputs.exists != 'true' || needs.prepare.outputs.force_republish == 'true')
              uses: kreuzberg-dev/actions/publish-pypi@v1
              with:
                  packages-dir: dist/
                  dry-run: ${{ needs.prepare.outputs.dry_run }}

    publish-node:
        name: Publish Node packages
        needs: [prepare, validate-versions, registry-results, build-node-native]
        if: |
            always() &&
            needs.prepare.outputs.release_node == 'true' &&
            needs.validate-versions.result == 'success' &&
            (needs.registry-results.outputs.npm != 'true' || needs.prepare.outputs.dry_run == 'true') &&
            needs.build-node-native.result == 'success'
        runs-on: ubuntu-latest
        permissions:
            contents: read
            id-token: write
        timeout-minutes: 30
        steps:
            - name: Checkout
              uses: actions/checkout@v6
              with:
                  ref: ${{ needs.prepare.outputs.checkout_ref }}

            - name: Install pnpm
              uses: pnpm/action-setup@v6
              with:
                  package_json_file: package.json

            - name: Download Node artifacts
              uses: actions/download-artifact@v7
              with:
                  pattern: node-native-*
                  path: crates/liter-llm-node/artifacts
                  merge-multiple: true

            - name: Setup Node
              uses: actions/setup-node@v6
              with:
                  node-version: 22
                  registry-url: https://registry.npmjs.org/

            - name: Install @napi-rs/cli
              run: npm install -g @napi-rs/cli
              shell: bash

            - name: Assemble NAPI platform packages
              run: |
                  napi artifacts --output-dir artifacts --npm-dir npm
              working-directory: crates/liter-llm-node
              shell: bash

            - name: Node artifacts summary
              if: ${{ needs.prepare.outputs.dry_run == 'true' }}
              run: (echo "Dry run requested; Node binding tarballs staged:" && find crates/liter-llm-node/artifacts -name '*.node' -print) >> "$GITHUB_STEP_SUMMARY"

            - name: Install workspace dependencies
              if: ${{ needs.prepare.outputs.dry_run != 'true' }}
              run: |
                  # e2e/wasm depends on file:../../crates/liter-llm-wasm/pkg/nodejs (built by wasm-pack
                  # --target nodejs, gitignored). During the publish-node workspace scan that path must
                  # resolve, so stub a minimal package.
                  mkdir -p crates/liter-llm-wasm/pkg/nodejs
                  if [ ! -f crates/liter-llm-wasm/pkg/nodejs/package.json ]; then
                    cat > crates/liter-llm-wasm/pkg/nodejs/package.json <<'JSON'
                  {"name": "liter_llm", "version": "0.0.0", "private": true}
                  JSON
                  fi
                  # --no-frozen-lockfile because crates/liter-llm-node/package.json declares
                  # `optionalDependencies: @kreuzberg/liter-llm-<rid>@<version>` entries
                  # for the per-platform stubs alef-scaffold emits for napi-rs, but those
                  # packages don't exist on npm yet at this point in the workflow — this very
                  # step is preparing to publish them. The default `--frozen-lockfile` rejects
                  # the resolution gap; we want pnpm to install what it can (workspace links +
                  # the napi-rs dev tooling) and silently skip the not-yet-published optionals.
                  pnpm install -C crates/liter-llm-node --no-frozen-lockfile
              shell: bash

            - name: Pack platform packages
              run: |
                  for pkg_dir in crates/liter-llm-node/npm/*/; do
                    echo "Packing $pkg_dir..."
                    (cd "$pkg_dir" && npm pack && mv ./*.tgz ..)
                  done

            - name: Re-check npm before publish
              id: recheck
              uses: kreuzberg-dev/actions/check-registry@v1
              with:
                  registry: npm
                  package: "@kreuzberg/liter-llm"
                  version: ${{ needs.prepare.outputs.version }}

            - name: Publish native binary packages
              if: ${{ needs.prepare.outputs.dry_run != 'true' && steps.recheck.outputs.exists != 'true' }}
              uses: kreuzberg-dev/actions/publish-npm@v1
              with:
                  packages-dir: crates/liter-llm-node/npm
                  npm-tag: ${{ needs.prepare.outputs.npm_tag }}
                  dry-run: ${{ needs.prepare.outputs.dry_run }}

            - name: Wait for npm indexing (x64)
              if: ${{ needs.prepare.outputs.dry_run != 'true' && steps.recheck.outputs.exists != 'true' }}
              uses: kreuzberg-dev/actions/wait-for-package@v1
              with:
                  registry: npm
                  package: "@kreuzberg/liter-llm-linux-x64-gnu"
                  version: ${{ needs.prepare.outputs.version }}
                  max-attempts: "25"

            - name: Wait for npm indexing (ARM64)
              if: ${{ needs.prepare.outputs.dry_run != 'true' && steps.recheck.outputs.exists != 'true' }}
              uses: kreuzberg-dev/actions/wait-for-package@v1
              with:
                  registry: npm
                  package: "@kreuzberg/liter-llm-linux-arm64-gnu"
                  version: ${{ needs.prepare.outputs.version }}
                  max-attempts: "25"

            - name: Publish main Node package
              if: ${{ needs.prepare.outputs.dry_run != 'true' && steps.recheck.outputs.exists != 'true' }}
              uses: kreuzberg-dev/actions/publish-npm@v1
              with:
                  package-dir: crates/liter-llm-node
                  npm-tag: ${{ needs.prepare.outputs.npm_tag }}
                  dry-run: ${{ needs.prepare.outputs.dry_run }}
                  provenance: "true"

            - name: Wait for @kreuzberg/liter-llm to be available
              if: ${{ needs.prepare.outputs.dry_run != 'true' && steps.recheck.outputs.exists != 'true' }}
              uses: kreuzberg-dev/actions/wait-for-package@v1
              with:
                  registry: npm
                  package: "@kreuzberg/liter-llm"
                  version: ${{ needs.prepare.outputs.version }}
                  max-attempts: "25"

            - name: npm already published summary
              if: ${{ steps.recheck.outputs.exists == 'true' }}
              run: echo "Node package @kreuzberg/liter-llm@${{ needs.prepare.outputs.version }} already published on npm — skipped." >> "$GITHUB_STEP_SUMMARY"

    publish-wasm:
        name: Publish WASM package
        needs: [prepare, validate-versions, registry-results, build-wasm, publish-node]
        if: |
            always() &&
            needs.prepare.outputs.release_wasm == 'true' &&
            needs.validate-versions.result == 'success' &&
            (needs.registry-results.outputs.npm_wasm != 'true' || needs.prepare.outputs.dry_run == 'true') &&
            needs.build-wasm.result == 'success'
        runs-on: ubuntu-latest
        permissions:
            contents: read
            id-token: write
        timeout-minutes: 30
        steps:
            - name: Download WASM artifact
              uses: actions/download-artifact@v7
              with:
                  name: wasm-pkg
                  path: dist

            - name: Setup Node
              uses: actions/setup-node@v6
              with:
                  node-version: 22
                  registry-url: https://registry.npmjs.org/

            - name: Check if version already published to npm
              id: npm_check
              uses: kreuzberg-dev/actions/check-registry@v1
              with:
                  registry: npm
                  package: "@kreuzberg/liter-llm-wasm"
                  version: ${{ needs.prepare.outputs.version }}

            - name: WASM artifact summary
              if: ${{ needs.prepare.outputs.dry_run == 'true' }}
              run: (echo "Dry run requested; WASM tarball staged:" && find dist -type f -print) >> "$GITHUB_STEP_SUMMARY"

            - name: Publish to npm
              if: ${{ needs.prepare.outputs.dry_run != 'true' && steps.npm_check.outputs.exists != 'true' }}
              uses: kreuzberg-dev/actions/publish-npm@v1
              with:
                  package-dir: dist
                  npm-tag: ${{ needs.prepare.outputs.npm_tag }}
                  dry-run: ${{ needs.prepare.outputs.dry_run }}
                  provenance: "true"

            - name: Wait for npm indexing
              if: ${{ needs.prepare.outputs.dry_run != 'true' && steps.npm_check.outputs.exists != 'true' }}
              uses: kreuzberg-dev/actions/wait-for-package@v1
              with:
                  registry: npm
                  package: "@kreuzberg/liter-llm-wasm"
                  version: ${{ needs.prepare.outputs.version }}
                  max-attempts: "25"

            - name: Publish summary
              if: ${{ needs.prepare.outputs.dry_run != 'true' }}
              run: |
                  if [ "${{ steps.npm_check.outputs.exists }}" = "true" ]; then
                    echo "WASM package @kreuzberg/liter-llm-wasm@${{ needs.prepare.outputs.version }} already published on npm — skipped." >> "$GITHUB_STEP_SUMMARY"
                  else
                    echo "Published @kreuzberg/liter-llm-wasm@${{ needs.prepare.outputs.version }} to npm." >> "$GITHUB_STEP_SUMMARY"
                  fi

    publish-rubygems:
        name: Publish RubyGems
        needs: [prepare, validate-versions, registry-results, build-ruby-gem]
        if: |
            always() &&
            needs.prepare.outputs.release_ruby == 'true' &&
            needs.validate-versions.result == 'success' &&
            needs.build-ruby-gem.result == 'success' &&
            (needs.registry-results.outputs.rubygems != 'true' || needs.prepare.outputs.force_republish == 'true')
        runs-on: ubuntu-latest
        permissions:
            contents: read
            id-token: write
        timeout-minutes: 30
        steps:
            - name: Checkout code
              uses: actions/checkout@v6
              with:
                  ref: ${{ needs.prepare.outputs.checkout_ref }}
                  fetch-depth: 0

            - name: Download Ruby gem artifacts
              uses: actions/download-artifact@v7
              with:
                  pattern: rubygems-*
                  path: dist
                  merge-multiple: true

            - name: Set up Ruby
              uses: ruby/setup-ruby@v1
              with:
                  ruby-version: "3.3"
                  bundler: none
                  bundler-cache: false

            - name: Install Bundler
              shell: bash
              run: (gem install bundler -v 4.0.0 --no-document || gem install bundler --no-document) && bundler --version

            - name: Install Ruby dependencies
              shell: bash
              working-directory: packages/ruby
              run: |
                  bundle config set --local path vendor/bundle
                  bundle install --jobs 4

            - name: Rewrite native dependencies to registry versions
              if: needs.prepare.outputs.dry_run != 'true'
              uses: kreuzberg-dev/actions/rewrite-native-deps@v1
              with:
                  lang: ruby

            - name: Build source gem (fallback for unsupported platforms)
              shell: bash
              working-directory: packages/ruby
              run: |
                  bundle config set --local path vendor/bundle
                  bundle check || bundle install
                  bundle exec rake build

            - name: Copy source gem to dist directory
              shell: bash
              run: |
                  mkdir -p dist
                  cp packages/ruby/pkg/*.gem dist/

            - name: List all gems for publishing
              shell: bash
              working-directory: dist
              run: |
                  echo "=== All gems to publish ==="
                  ls -lh liter_llm-*.gem
                  echo ""
                  gem_count=$(find . -maxdepth 1 -name 'liter_llm-*.gem' -print | wc -l)
                  echo "Total gems: $gem_count"
                  echo ""
                  echo "Expected:"
                  echo "  - Source gem: liter_llm-VERSION.gem"
                  echo "  - Linux x86_64: liter_llm-VERSION-x86_64-linux.gem"
                  echo "  - Linux ARM64: liter_llm-VERSION-aarch64-linux.gem"
                  echo "  - macOS ARM64: liter_llm-VERSION-arm64-darwin.gem"
                  if [ "$gem_count" -lt 2 ]; then
                    echo "WARNING: Expected at least 2 gems (source + platform), found $gem_count" >&2
                  fi

            - name: Re-check RubyGems before publish
              id: recheck
              uses: kreuzberg-dev/actions/check-registry@v1
              with:
                  registry: rubygems
                  package: liter_llm
                  version: ${{ needs.prepare.outputs.version }}

            - name: Configure trusted publishing credentials
              if: ${{ needs.prepare.outputs.dry_run != 'true' && steps.recheck.outputs.exists != 'true' }}
              uses: rubygems/configure-rubygems-credentials@v2.0.0

            - name: Publish gems to RubyGems
              if: ${{ needs.prepare.outputs.dry_run != 'true' && steps.recheck.outputs.exists != 'true' }}
              uses: kreuzberg-dev/actions/publish-rubygems@v1
              with:
                  gems-dir: dist
                  dry-run: ${{ needs.prepare.outputs.dry_run }}

            - name: RubyGems already published summary
              if: ${{ steps.recheck.outputs.exists == 'true' }}
              run: echo "Gem liter_llm@${{ needs.prepare.outputs.version }} already published on RubyGems — skipped." >> "$GITHUB_STEP_SUMMARY"

    publish-maven:
        name: Publish Maven Central
        needs: [prepare, validate-versions, registry-results, build-java-package]
        if: |
            always() &&
            needs.prepare.outputs.release_java == 'true' &&
            needs.validate-versions.result == 'success' &&
            needs.build-java-package.result == 'success' &&
            (needs.registry-results.outputs.maven != 'true' || needs.prepare.outputs.force_republish == 'true')
        runs-on: ubuntu-latest
        permissions:
            contents: read
        timeout-minutes: 30
        steps:
            - uses: actions/checkout@v6
              with:
                  ref: ${{ needs.prepare.outputs.checkout_ref }}
            - uses: actions/download-artifact@v7
              with:
                  name: maven-packages
                  path: packages/java/target
            # The publish-maven composite action runs `mvn clean deploy`, which
            # wipes packages/java/target before rebuilding the jar from source.
            # Re-stage the per-platform FFI native libraries into
            # packages/java/src/main/resources/natives/{rid}/ so the deploy-time
            # rebuild includes them as JAR resources — otherwise the central jar
            # ships with no bundled natives and NativeLib.loadNativeLibrary fails
            # at runtime with UnsatisfiedLinkError. See rc.33 java test-app failure.
            - uses: actions/download-artifact@v7
              with:
                  pattern: ffi-*
                  path: ffi-artifacts
                  merge-multiple: true
            - name: Stage native libs for Java publish
              run: |
                  declare -A rid_map=(
                    [linux-x64]="linux-x64"
                    [linux-arm64]="linux-arm64"
                    [osx-arm64]="macos-arm64"
                    [win-x64]="windows-x64"
                  )
                  for ffi_rid in "${!rid_map[@]}"; do
                    java_rid="${rid_map[$ffi_rid]}"
                    dest="packages/java/src/main/resources/natives/${java_rid}"
                    mkdir -p "$dest"
                    find "ffi-artifacts/${ffi_rid}" -type f -print0 | xargs -0 -I{} cp {} "$dest/"
                  done
              shell: bash
            - name: Setup Java
              id: setup-java
              env:
                  MAVEN_USERNAME: ${{ secrets.CENTRAL_USERNAME }}
                  MAVEN_PASSWORD: ${{ secrets.CENTRAL_PASSWORD }}
                  MAVEN_GPG_PASSPHRASE: ${{ secrets.GPG_PASSPHRASE }}
              uses: actions/setup-java@v5
              with:
                  distribution: temurin
                  java-version: "25"
                  cache: maven
                  server-id: ossrh
                  server-username: MAVEN_USERNAME
                  server-password: MAVEN_PASSWORD
                  gpg-private-key: ${{ secrets.GPG_PRIVATE_KEY }}
                  gpg-passphrase: MAVEN_GPG_PASSPHRASE
            - name: Setup Maven 3.9.11
              uses: kreuzberg-dev/actions/setup-maven@v1
            - name: Configure Maven GPG
              uses: kreuzberg-dev/actions/configure-maven-gpg@v1
              with:
                  pom-file: packages/java/pom.xml
            - name: Release Maven package
              uses: kreuzberg-dev/actions/publish-maven@v1
              with:
                  pom-file: packages/java/pom.xml
                  maven-profile: publish
                  extra-args: -DskipTests
                  dry-run: ${{ needs.prepare.outputs.dry_run }}
              env:
                  MAVEN_USERNAME: ${{ secrets.CENTRAL_USERNAME }}
                  MAVEN_PASSWORD: ${{ secrets.CENTRAL_PASSWORD }}
                  MAVEN_GPG_PASSPHRASE: ${{ secrets.GPG_PASSPHRASE }}

    publish-kotlin-android-maven:
        name: Publish Kotlin Android AAR to Maven Central
        needs: [prepare, build-kotlin-android-natives, upload-kotlin-android-aars]
        if: |
            always() &&
            needs.prepare.outputs.release_kotlin == 'true' &&
            (needs.prepare.outputs.is_tag == 'true' || needs.prepare.outputs.dry_run == 'true')
        runs-on: ubuntu-latest
        permissions:
            contents: read
        timeout-minutes: 30
        steps:
            - uses: actions/checkout@v6
              with:
                  ref: ${{ needs.prepare.outputs.checkout_ref }}
            - name: Download pre-built AARs from build matrix
              uses: actions/download-artifact@v7
              with:
                  pattern: kotlin-android-*
                  path: kotlin-android-aars-prebuilt
                  merge-multiple: true
            - name: Stage JNI libraries from build artifacts
              shell: bash
              run: |
                  # The build-kotlin-android-natives job stages jniLibs into src/main/jniLibs/{abi}/
                  # within its own workspace, then runs gradle assembleRelease to package them into AARs.
                  # The pre-built AARs are uploaded as artifacts.
                  #
                  # To prevent gradle from rebuilding the AAR from source (which would lose jniLibs),
                  # we extract the jniLibs from the pre-built AARs and re-stage them so that when
                  # publishAndReleaseToMavenCentral re-assembles, it includes them.
                  for aar in kotlin-android-aars-prebuilt/*.aar; do
                    echo "Extracting jniLibs from $(basename "$aar")..."
                    unzip -q "$aar" -d temp-aar-extract
                    # Each pre-built AAR contains jni/{abi}/*.so (Android AAR structure)
                    if [ -d temp-aar-extract/jni ]; then
                      for abi_dir in temp-aar-extract/jni/*/; do
                        abi=$(basename "$abi_dir")
                        mkdir -p "packages/kotlin-android/src/main/jniLibs/$abi"
                        find "$abi_dir" -type f -name "*.so" -exec cp {} "packages/kotlin-android/src/main/jniLibs/$abi/" \;
                        echo "  Staged jniLibs/$abi from AAR"
                      done
                    fi
                    rm -rf temp-aar-extract
                  done
                  # Verify jniLibs were staged
                  if [ ! -d packages/kotlin-android/src/main/jniLibs ] || [ -z "$(find packages/kotlin-android/src/main/jniLibs -type f)" ]; then
                    echo "ERROR: No jniLibs staged from AARs!" >&2
                    exit 1
                  fi
                  echo "jniLibs staging complete:"
                  find packages/kotlin-android/src/main/jniLibs -type f -exec ls -lh {} \;
            - uses: actions/setup-java@v5
              with:
                  distribution: temurin
                  java-version: "17"
                  cache: gradle
            - uses: kreuzberg-dev/actions/setup-maven@v1
            - uses: kreuzberg-dev/actions/configure-maven-gpg@v1
            - uses: kreuzberg-dev/actions/publish-maven-gradle@v1
              with:
                  working-directory: packages/kotlin-android
                  gradle-task: publishAndReleaseToMavenCentral
                  dry-run: ${{ needs.prepare.outputs.dry_run }}
              env:
                  MAVEN_USERNAME: ${{ secrets.CENTRAL_USERNAME }}
                  MAVEN_PASSWORD: ${{ secrets.CENTRAL_PASSWORD }}
                  MAVEN_GPG_PASSPHRASE: ${{ secrets.GPG_PASSPHRASE }}
                  MAVEN_GPG_PRIVATE_KEY: ${{ secrets.GPG_PRIVATE_KEY }}

    publish-hex:
        name: Publish Hex.pm
        needs: [prepare, validate-versions, registry-results, publish-crates, build-elixir-nifs, upload-elixir-nifs]
        if: |
            always() &&
            needs.prepare.outputs.release_elixir == 'true' &&
            needs.validate-versions.result == 'success' &&
            needs.upload-elixir-nifs.result == 'success' &&
            (needs.registry-results.outputs.hex != 'true' || needs.prepare.outputs.force_republish == 'true')
        runs-on: ubuntu-latest
        environment: hex
        permissions:
            id-token: write
        timeout-minutes: 30
        steps:
            - uses: actions/create-github-app-token@v2
              id: app-token
              with:
                  app-id: ${{ secrets.BOT_APP_ID }}
                  private-key: ${{ secrets.BOT_APP_PRIVATE_KEY }}
                  owner: kreuzberg-dev

            - uses: actions/checkout@v6
              with:
                  ref: ${{ needs.prepare.outputs.checkout_ref }}
                  fetch-depth: 0
                  token: ${{ steps.app-token.outputs.token }}
                  persist-credentials: true

            - name: Generate checksums from GitHub release
              if: needs.prepare.outputs.dry_run != 'true'
              uses: kreuzberg-dev/actions/generate-elixir-checksums@v1
              with:
                  github-repo: kreuzberg-dev/liter-llm
                  tag: ${{ needs.prepare.outputs.tag }}
                  version: ${{ needs.prepare.outputs.version }}
                  lib-name: liter_llm_nif
                  targets: "aarch64-apple-darwin,aarch64-unknown-linux-gnu,x86_64-unknown-linux-gnu,x86_64-pc-windows-gnu"
                  output-path: packages/elixir/checksum-Elixir.LiterLlm.Native.exs

            - name: Commit updated checksum file to main
              if: needs.prepare.outputs.dry_run != 'true'
              run: |
                  git config user.name "kreuzberg-dev-publisher[bot]"
                  git config user.email "291994444+kreuzberg-dev-publisher[bot]@users.noreply.github.com"
                  git add packages/elixir/checksum-Elixir.LiterLlm.Native.exs
                  if git diff --cached --quiet; then
                    echo "No checksum changes to commit — skipping"
                    exit 0
                  fi
                  CHECKSUM_SNAPSHOT="$(mktemp)"
                  cp packages/elixir/checksum-Elixir.LiterLlm.Native.exs "$CHECKSUM_SNAPSHOT"
                  git commit -m "chore: update Elixir NIF checksums for v${{ needs.prepare.outputs.version }}"
                  for i in 1 2 3 4 5; do
                    if git push origin HEAD:refs/heads/main; then
                      echo "Push succeeded on attempt $i"
                      exit 0
                    fi
                    echo "Push attempt $i failed; retrying after rebase"
                    if [ "$i" -eq 5 ]; then
                      echo "ERROR: push failed after 5 attempts" >&2
                      exit 1
                    fi
                    git fetch origin main
                    git reset --hard origin/main
                    cp "$CHECKSUM_SNAPSHOT" packages/elixir/checksum-Elixir.LiterLlm.Native.exs
                    git add packages/elixir/checksum-Elixir.LiterLlm.Native.exs
                    if git diff --cached --quiet; then
                      echo "Remote already has these checksums — done"
                      exit 0
                    fi
                    git commit -m "chore: update Elixir NIF checksums for v${{ needs.prepare.outputs.version }}"
                    sleep $((i * 2))
                  done
              shell: bash

            - uses: erlef/setup-beam@v1
              with:
                  elixir-version: "1.17"
                  otp-version: "27"

            - name: Install Mix dependencies
              run: mix local.hex --force && mix local.rebar --force && mix deps.get
              working-directory: packages/elixir
              shell: bash

            - uses: kreuzberg-dev/actions/publish-hex@v1
              with:
                  package-dir: packages/elixir
                  skip-docs: "true"
                  dry-run: ${{ needs.prepare.outputs.dry_run }}
              env:
                  HEX_API_KEY: ${{ secrets.HEX_API_KEY }}

    publish-nuget:
        name: Publish NuGet
        needs: [prepare, validate-versions, registry-results, build-csharp-package]
        if: |
            always() &&
            needs.prepare.outputs.release_csharp == 'true' &&
            needs.validate-versions.result == 'success' &&
            needs.build-csharp-package.result == 'success' &&
            (needs.registry-results.outputs.nuget != 'true' || needs.prepare.outputs.force_republish == 'true')
        runs-on: ubuntu-latest
        permissions:
            contents: read
            id-token: write
        timeout-minutes: 15
        steps:
            - uses: actions/download-artifact@v7
              with:
                  name: nuget-packages
                  path: nuget-output
            - uses: kreuzberg-dev/actions/publish-nuget@v1
              with:
                  packages-dir: nuget-output
                  dry-run: ${{ needs.prepare.outputs.dry_run }}
              env:
                  NUGET_API_KEY: ${{ secrets.NUGET_API_KEY }}

    publish-packagist:
        name: Publish Packagist
        needs: [prepare, validate-versions, registry-results, upload-php-extensions]
        if: |
            always() &&
            needs.prepare.outputs.release_php == 'true' &&
            needs.upload-php-extensions.result == 'success' &&
            needs.validate-versions.result == 'success' &&
            (needs.registry-results.outputs.packagist != 'true' || needs.prepare.outputs.force_republish == 'true')
        runs-on: ubuntu-latest
        permissions:
            id-token: write
        timeout-minutes: 15
        steps:
            - uses: kreuzberg-dev/actions/publish-packagist@v1
              with:
                  packagist-username: kreuzberg-dev
                  package-name: kreuzberg-dev/liter-llm
                  version: ${{ needs.prepare.outputs.version }}
                  repository-url: https://github.com/kreuzberg-dev/liter-llm
                  dry-run: ${{ needs.prepare.outputs.dry_run }}
              env:
                  PACKAGIST_API_TOKEN: ${{ secrets.PACKAGIST_API_TOKEN }}

    trigger-pubdev:
        name: Trigger pub.dev publish workflow
        needs: [prepare, check-pub, assemble-dart-package]
        if: ${{ needs.prepare.outputs.release_dart == 'true' && needs.prepare.outputs.is_tag == 'true' && needs.prepare.outputs.dry_run != 'true' && (needs.check-pub.outputs.exists != 'true' || needs.prepare.outputs.force_republish == 'true') }}
        runs-on: ubuntu-latest
        steps:
            - uses: actions/create-github-app-token@v2
              id: app-token
              with:
                  app-id: ${{ secrets.BOT_APP_ID }}
                  private-key: ${{ secrets.BOT_APP_PRIVATE_KEY }}
                  owner: kreuzberg-dev
            - name: Dispatch publish-pubdev workflow
              env:
                  GH_TOKEN: ${{ steps.app-token.outputs.token }}
                  GH_REPO: ${{ github.repository }}
              run: |
                  gh workflow run publish-pubdev.yaml \
                    --ref ${{ needs.prepare.outputs.tag }} \
                    -f run_id=${{ github.run_id }}

    publish-zig:
        name: Publish Zig package metadata
        needs: [prepare, check-zig, build-ffi]
        if: ${{ needs.prepare.outputs.release_zig == 'true' && needs.prepare.outputs.is_tag == 'true' && (needs.check-zig.outputs.exists != 'true' || needs.prepare.outputs.force_republish == 'true') && needs.build-ffi.result == 'success' }}
        runs-on: ubuntu-latest
        steps:
            - uses: actions/create-github-app-token@v2
              id: app-token
              with:
                  app-id: ${{ secrets.BOT_APP_ID }}
                  private-key: ${{ secrets.BOT_APP_PRIVATE_KEY }}
                  owner: kreuzberg-dev
            - uses: actions/checkout@v6
              with:
                  ref: ${{ needs.prepare.outputs.checkout_ref }}
            - uses: actions/download-artifact@v7
              with:
                  pattern: ffi-*
                  path: ffi-artifacts
                  merge-multiple: true
            - uses: kreuzberg-dev/actions/publish-zig@v1
              with:
                  working-directory: packages/zig
                  tag: ${{ needs.prepare.outputs.tag }}
                  token: ${{ steps.app-token.outputs.token }}
                  # Override the auto-detected package-name (`liter_llm` from
                  # build.zig.zon) to match the alef-emitted test_app URL pattern
                  # `{crate-name}-zig-v{version}.tar.gz`. Without this, the asset
                  # uploads as `liter_llm-v{version}.tar.gz` while
                  # test_apps/zig fetches `liter-llm-zig-v{version}.tar.gz`
                  # → 404 + consumer build.zig.zon TODO hash.
                  package-name: liter-llm-zig
                  # Multi-platform packaging: the action bundles per-RID FFI libs
                  # from ffi-artifacts/{linux-x64,linux-arm64,osx-arm64,win-x64}/
                  # into packages/zig/lib/<canonical-target>/, patches the .paths
                  # allowlist, and rewrites packages/zig/build.zig to select the
                  # right lib subdir from Zig's compile-time target. Replaces the
                  # previous manual bundle + raw-tar fallback that shipped the
                  # in-tree build.zig pointing at ../../target/release.
                  multi-platform-ffi-dir: ffi-artifacts
                  module-name: liter_llm
                  ffi-lib-name: liter_llm_ffi
                  update-release-notes: "true"
                  dry-run: ${{ needs.prepare.outputs.dry_run }}
                  update-existing: "true"

    # ── Swift Artifact Bundle (pre-built XCFramework for .binaryTarget consumers) ─
    swift-artifactbundle:
        name: Build Swift Artifact Bundle
        needs: [prepare]
        if: ${{ (needs.prepare.outputs.is_tag == 'true' || needs.prepare.outputs.dry_run == 'true') && needs.prepare.outputs.release_swift == 'true' }}
        runs-on: macos-latest
        timeout-minutes: 180
        outputs:
            checksum: ${{ steps.checksum.outputs.checksum }}
        steps:
            - uses: actions/checkout@v6
              with:
                  ref: ${{ needs.prepare.outputs.checkout_ref }}
                  fetch-depth: 0

            - uses: kreuzberg-dev/actions/setup-rust@v1
              with:
                  cache-key-prefix: publish-swift-artifactbundle
                  use-sccache: false

            - uses: kreuzberg-dev/actions/build-swift-artifactbundle@v1
              id: build
              with:
                  crate-name: liter-llm-swift
                  artifact-name: LiterLlm-rs
                  header-path: target/release/build/liter-llm-swift-*/out
                  output-dir: dist/swift-artifactbundle
                  build-profile: release

            - name: Record checksum
              id: checksum
              run: |
                  CHECKSUM=$(cat "${{ steps.build.outputs.bundle-zip }}.sha256" 2>/dev/null || swift package compute-checksum "${{ steps.build.outputs.bundle-zip }}")
                  echo "checksum=${CHECKSUM}" >> "$GITHUB_OUTPUT"
                  echo "Artifact bundle checksum: ${CHECKSUM}"

            - name: Save checksum as job output
              if: always()
              run: echo "Checksum saved to swift-artifactbundle job output"

            - uses: actions/upload-artifact@v7
              with:
                  name: swift-artifactbundle
                  path: dist/swift-artifactbundle
                  retention-days: 14

            - name: Save checksum as artifact
              run: |
                  mkdir -p dist/swift-checksums
                  echo "${{ steps.checksum.outputs.checksum }}" > dist/swift-checksums/LiterLlm-rs.artifactbundle.zip.checksum

            - uses: actions/upload-artifact@v7
              with:
                  name: swift-checksum
                  path: dist/swift-checksums/
                  retention-days: 14

    upload-swift-release:
        name: Upload Swift Artifact Bundle to GitHub Release
        needs: [prepare, swift-artifactbundle]
        if: ${{ (needs.prepare.outputs.is_tag == 'true' || needs.prepare.outputs.dry_run == 'true') && needs.swift-artifactbundle.result == 'success' }}
        runs-on: ubuntu-latest
        steps:
            - uses: actions/create-github-app-token@v2
              id: app-token
              with:
                  app-id: ${{ secrets.BOT_APP_ID }}
                  private-key: ${{ secrets.BOT_APP_PRIVATE_KEY }}
                  owner: kreuzberg-dev

            - uses: actions/checkout@v6
              with:
                  ref: ${{ needs.prepare.outputs.checkout_ref }}
                  fetch-depth: 0
                  token: ${{ steps.app-token.outputs.token }}
                  persist-credentials: true

            - uses: actions/download-artifact@v7
              with:
                  pattern: swift-*
                  path: dist/swift
                  merge-multiple: true

            - uses: kreuzberg-dev/actions/upload-release-assets@v1
              with:
                  tag: ${{ needs.prepare.outputs.tag }}
                  working-directory: dist/swift
                  dry-run: ${{ needs.prepare.outputs.dry_run }}
                  assets: |
                      **/*.zip
                      **/*.checksum
                  token: ${{ steps.app-token.outputs.token }}

            - name: Create swift-release tag with substituted checksum
              if: ${{ needs.prepare.outputs.dry_run != 'true' }}
              env:
                  VERSION: ${{ needs.prepare.outputs.version }}
                  CHECKSUM: ${{ needs.swift-artifactbundle.outputs.checksum }}
                  TAG: ${{ needs.prepare.outputs.tag }}
                  GH_TOKEN: ${{ steps.app-token.outputs.token }}
              run: |
                  set -euo pipefail

                  SWIFT_TAG="swift-${VERSION}"

                  # Idempotent guard: if the swift tag already exists on origin, skip.
                  if git ls-remote --tags origin "refs/tags/${SWIFT_TAG}" 2>/dev/null | grep -q "${SWIFT_TAG}"; then
                    echo "Swift tag ${SWIFT_TAG} already exists on origin; skipping."
                    exit 0
                  fi

                  # Patch Package.swift with the real checksum
                  sed -i.bak "s/__ALEF_SWIFT_CHECKSUM__/${CHECKSUM}/g" Package.swift
                  rm -f Package.swift.bak

                  # Verify the substitution
                  if grep -q "__ALEF_SWIFT_CHECKSUM__" Package.swift; then
                    echo "ERROR: checksum placeholder not substituted" >&2
                    exit 1
                  fi

                  # Configure git
                  git config user.name "kreuzberg-dev-publisher[bot]"
                  git config user.email "291994444+kreuzberg-dev-publisher[bot]@users.noreply.github.com"

                  # Commit the patched Package.swift to a temporary release branch
                  git add Package.swift
                  git commit -m "chore(swift): pin checksum for ${SWIFT_TAG}"

                  # Create a new tag in the swift namespace (NOT --force, NOT modifying main tag)
                  git tag "${SWIFT_TAG}"

                  # Push the release branch (not to main, to avoid modifying main)
                  git push origin "HEAD:refs/heads/release/swift/${VERSION}"

                  # Push the swift tag
                  git push origin "refs/tags/${SWIFT_TAG}"

                  echo "Created ${SWIFT_TAG} tag on release/swift/${VERSION} branch with real checksum"
              shell: bash

            - name: Generate substituted Package.swift artifact
              env:
                  VERSION: ${{ needs.prepare.outputs.version }}
              run: |
                  CHECKSUM=${{ needs.swift-artifactbundle.outputs.checksum }}
                  cp Package.swift /tmp/Package.swift
                  sed -i "s/__ALEF_SWIFT_VERSION__/${VERSION}/g" /tmp/Package.swift
                  sed -i "s/__ALEF_SWIFT_CHECKSUM__/${CHECKSUM}/g" /tmp/Package.swift
                  echo "Substituted Package.swift:"
                  head -30 /tmp/Package.swift

            - name: Upload substituted Package.swift to GitHub Release
              if: ${{ needs.prepare.outputs.dry_run != 'true' }}
              env:
                  GH_TOKEN: ${{ steps.app-token.outputs.token }}
                  VERSION: ${{ needs.prepare.outputs.version }}
              run: |
                  gh release upload "v${VERSION}" /tmp/Package.swift \
                    --clobber \
                    --repo "${{ github.repository }}"

            - name: Update release notes with Swift install instructions
              if: ${{ needs.prepare.outputs.dry_run != 'true' }}
              env:
                  GH_TOKEN: ${{ steps.app-token.outputs.token }}
                  VERSION: ${{ needs.prepare.outputs.version }}
              run: |
                  CHECKSUM=${{ needs.swift-artifactbundle.outputs.checksum }}
                  ASSET_URL="https://github.com/kreuzberg-dev/liter-llm/releases/download/v${VERSION}/LiterLlm-rs.artifactbundle.zip"

                  cat > /tmp/swift-notes.md << EOF
                  ## Swift Package Manager

                  The Swift binding is distributed as a pre-built artifact bundle. No Rust toolchain required.

                  **Recommended — use \`.binaryTarget\` directly in your \`Package.swift\`:**

                  \`\`\`swift
                  .binaryTarget(
                      name: "LiterLlm",
                      url: "${ASSET_URL}",
                      checksum: "${CHECKSUM}"
                  )
                  \`\`\`

                  **Alternative — pin via tag-specific Swift package release:**

                  \`\`\`swift
                  .package(url: "https://github.com/kreuzberg-dev/liter-llm", from: "swift-${VERSION}")
                  \`\`\`

                  > The main repository's \`Package.swift\` uses placeholder values. Swift consumers pin to a tag-specific release in the \`swift-\` namespace (e.g. \`from: "swift-${VERSION}"\`), which includes the real artifact bundle checksum. Other languages continue to pin to \`from: "${VERSION}"\`.

                  **Artifact bundle**: [LiterLlm-rs.artifactbundle.zip](${ASSET_URL})
                  **Checksum**: \`${CHECKSUM}\`
                  EOF

                  gh release edit "v${VERSION}" --notes-file /tmp/swift-notes.md

    # ── CLI binary tarballs (for direct download, non-brew/non-docker users) ─
    build-cli-binaries:
        name: Build CLI binary (${{ matrix.label }})
        needs: [prepare, validate-versions]
        if: |
            always() &&
            needs.prepare.outputs.release_homebrew == 'true' &&
            needs.validate-versions.result == 'success'
        runs-on: ${{ matrix.runner }}
        timeout-minutes: 45
        strategy:
            fail-fast: false
            matrix:
                include:
                    - label: linux-x86_64
                      runner: ubuntu-latest
                      target: x86_64-unknown-linux-gnu
                      archive: tar.gz
                    - label: linux-aarch64
                      runner: ubuntu-24.04-arm
                      target: aarch64-unknown-linux-gnu
                      archive: tar.gz
                    - label: macos-aarch64
                      runner: macos-latest
                      target: aarch64-apple-darwin
                      archive: tar.gz
                    - label: windows-x86_64
                      runner: windows-latest
                      target: x86_64-pc-windows-msvc
                      archive: zip
        steps:
            - uses: actions/checkout@v6
              with:
                  ref: ${{ needs.prepare.outputs.checkout_ref }}
            - uses: kreuzberg-dev/actions/setup-rust@v1
              with:
                  target: ${{ matrix.target }}
                  cache-key-prefix: publish-cli-${{ matrix.label }}
                  use-sccache: false
            - name: Build CLI
              shell: bash
              run: cargo build --release -p liter-llm-cli --target ${{ matrix.target }}
            - name: Stage archive
              id: stage
              shell: bash
              env:
                  VERSION: ${{ needs.prepare.outputs.version }}
                  TARGET: ${{ matrix.target }}
                  ARCHIVE: ${{ matrix.archive }}
              run: |
                  stem="liter-llm-${VERSION}-${TARGET}"
                  stage_dir="dist/${stem}"
                  mkdir -p "${stage_dir}"
                  if [ "${ARCHIVE}" = "zip" ]; then
                    cp "target/${TARGET}/release/liter-llm.exe" "${stage_dir}/"
                  else
                    cp "target/${TARGET}/release/liter-llm" "${stage_dir}/"
                  fi
                  cp LICENSE README.md "${stage_dir}/"
                  cd dist
                  if [ "${ARCHIVE}" = "zip" ]; then
                    archive_name="${stem}.zip"
                    if command -v 7z >/dev/null 2>&1; then
                      7z a "${archive_name}" "${stem}" >/dev/null
                    else
                      powershell -Command "Compress-Archive -Path '${stem}' -DestinationPath '${archive_name}'"
                    fi
                  else
                    archive_name="${stem}.tar.gz"
                    tar -czf "${archive_name}" "${stem}"
                  fi
                  # Emit a sha256sum-format line ("<hash>  <filename>") on every
                  # platform so the upload job can concatenate them into a single
                  # SHA256SUMS file consumable by `sha256sum -c`.
                  if [ "${RUNNER_OS}" = "Windows" ]; then
                    hash=$(certutil -hashfile "${archive_name}" SHA256 | sed -n '2p' | tr -d ' \r')
                    printf '%s  %s\n' "${hash}" "${archive_name}" > "${archive_name}.sha256"
                  else
                    shasum -a 256 "${archive_name}" > "${archive_name}.sha256"
                  fi
                  echo "archive=${archive_name}" >> "$GITHUB_OUTPUT"
            - uses: actions/upload-artifact@v7
              with:
                  name: cli-binary-${{ matrix.label }}
                  path: |
                      dist/${{ steps.stage.outputs.archive }}
                      dist/${{ steps.stage.outputs.archive }}.sha256
                  retention-days: 14

    upload-cli-binaries:
        name: Upload CLI binaries to GitHub Release
        needs: [prepare, build-cli-binaries]
        # Upload whatever CLI binaries actually built. The matrix has
        # `fail-fast: false`, so a single platform failure (e.g. Windows MSVC)
        # mustn't drop the linux/macos artifacts on the floor. Require the
        # parent matrix to have at least started (not cancelled) and check that
        # at least one artifact was produced via download-artifact's
        # `if-no-files-found: error` below.
        if: |
            always() &&
            needs.prepare.outputs.dry_run != 'true' &&
            needs.prepare.outputs.release_homebrew == 'true' &&
            needs.build-cli-binaries.result != 'cancelled' &&
            needs.build-cli-binaries.result != 'skipped'
        runs-on: ubuntu-latest
        timeout-minutes: 10
        steps:
            - uses: actions/create-github-app-token@v2
              id: app-token
              with:
                  app-id: ${{ secrets.BOT_APP_ID }}
                  private-key: ${{ secrets.BOT_APP_PRIVATE_KEY }}
                  owner: kreuzberg-dev
            - uses: actions/checkout@v6
            - uses: actions/download-artifact@v7
              with:
                  pattern: cli-binary-*
                  path: dist/cli
                  merge-multiple: true
            - name: Consolidate per-archive checksums into SHA256SUMS
              # Per-platform jobs each emit a `<archive>.sha256` (sha256sum-format).
              # Combine them into a single file so the GitHub release surface lists
              # one checksum artifact instead of one per CLI archive (#67).
              shell: bash
              env:
                  VERSION: ${{ needs.prepare.outputs.version }}
              run: |
                  set -euo pipefail
                  shopt -s nullglob
                  shasum_files=(dist/cli/*.sha256)
                  if [ ${#shasum_files[@]} -eq 0 ]; then
                    echo "::error::no per-archive checksum files found"
                    exit 1
                  fi
                  combined="dist/cli/SHA256SUMS-${VERSION}.txt"
                  # Sort for deterministic ordering across runs.
                  cat "${shasum_files[@]}" | LC_ALL=C sort > "${combined}"
                  rm -f "${shasum_files[@]}"
                  echo "Consolidated checksums:"
                  cat "${combined}"
            - uses: kreuzberg-dev/actions/publish-github-release@v1
              with:
                  tag: ${{ needs.prepare.outputs.tag }}
                  artifacts: "dist/cli/*"
                  draft: "false"
                  token: ${{ steps.app-token.outputs.token }}

    # ── Homebrew (formula update + bottles) ──────────────────────────────────
    #
    # Topology (mirrors kreuzberg / html-to-markdown):
    #   1. publish-homebrew-formula — bump Formula/liter-llm.rb source url+sha
    #      in the tap (no bottle DSL).
    #   2. homebrew-bottles         — real `brew install --build-bottle` per
    #      platform via homebrew-build-bottles@v1, uploads bottle tarballs to
    #      the GitHub release and saves JSON manifests as artifacts.
    #   3. publish-homebrew-bottles — homebrew-merge-bottles@v1 aggregates the
    #      JSON manifests into a `bottle do` block and commits it to the tap.
    check-homebrew:
        name: Check Homebrew tap for formula
        needs: [prepare]
        if: ${{ needs.prepare.outputs.release_homebrew == 'true' }}
        runs-on: ubuntu-latest
        outputs:
            exists: ${{ steps.check.outputs.exists }}
        steps:
            - uses: kreuzberg-dev/actions/check-registry@v1
              id: check
              with:
                  registry: homebrew
                  package: liter-llm
                  version: ${{ needs.prepare.outputs.version }}
                  tap-repo: kreuzberg-dev/homebrew-tap

    publish-homebrew-formula:
        name: Update Homebrew formula
        needs: [prepare, check-homebrew, publish-crates]
        if: |
            needs.prepare.outputs.release_homebrew == 'true' &&
            needs.prepare.outputs.dry_run != 'true' &&
            needs.check-homebrew.outputs.exists != 'true' &&
            needs.publish-crates.result != 'failure'
        runs-on: ubuntu-latest
        steps:
            - uses: actions/create-github-app-token@v2
              id: app-token
              with:
                  app-id: ${{ secrets.BOT_APP_ID }}
                  private-key: ${{ secrets.BOT_APP_PRIVATE_KEY }}
                  owner: kreuzberg-dev

            - uses: actions/create-github-app-token@v2
              id: tap-token
              with:
                  app-id: ${{ secrets.BOT_APP_ID }}
                  private-key: ${{ secrets.BOT_APP_PRIVATE_KEY }}
                  owner: kreuzberg-dev
                  repositories: homebrew-tap

            - name: Checkout source repo
              uses: actions/checkout@v6
              with:
                  ref: ${{ needs.prepare.outputs.checkout_ref }}

            - name: Checkout homebrew-tap
              uses: actions/checkout@v6
              with:
                  repository: kreuzberg-dev/homebrew-tap
                  token: ${{ steps.tap-token.outputs.token }}
                  path: homebrew-tap
                  persist-credentials: true

            - name: Update formula source url+sha
              env:
                  GH_TOKEN: ${{ steps.app-token.outputs.token }}
                  TAG: ${{ needs.prepare.outputs.tag }}
                  VERSION: ${{ needs.prepare.outputs.version }}
                  TAP_DIR: ${{ github.workspace }}/homebrew-tap
                  DRY_RUN: ${{ needs.prepare.outputs.dry_run }}
              run: scripts/publish/update-homebrew-formula.sh

            - name: Commit and push to tap
              working-directory: homebrew-tap
              env:
                  GH_TOKEN: ${{ steps.tap-token.outputs.token }}
              run: |
                  git config user.name "kreuzberg-dev-publisher[bot]"
                  git config user.email "291994444+kreuzberg-dev-publisher[bot]@users.noreply.github.com"
                  if git diff --quiet Formula/; then
                    echo "No formula changes; skipping commit."
                    exit 0
                  fi
                  git add Formula/liter-llm.rb
                  git commit -m "liter-llm ${{ needs.prepare.outputs.version }}"
                  git push origin HEAD

    homebrew-bottles:
        name: Build Homebrew bottle (${{ matrix.bottle_tag }})
        needs: [prepare, publish-homebrew-formula]
        if: |
            needs.prepare.outputs.release_homebrew == 'true' &&
            needs.prepare.outputs.dry_run != 'true' &&
            needs.publish-homebrew-formula.result == 'success'
        runs-on: ${{ matrix.os }}
        strategy:
            fail-fast: false
            matrix:
                include:
                    - { os: macos-latest, bottle_tag: arm64_sequoia, install_brew: false }
                    - { os: macos-15-intel, bottle_tag: sequoia, install_brew: false }
                    - { os: ubuntu-latest, bottle_tag: x86_64_linux, install_brew: true }
                    - { os: ubuntu-24.04-arm, bottle_tag: arm64_linux, install_brew: true }
        steps:
            - uses: actions/create-github-app-token@v2
              id: app-token
              with:
                  app-id: ${{ secrets.BOT_APP_ID }}
                  private-key: ${{ secrets.BOT_APP_PRIVATE_KEY }}
                  owner: kreuzberg-dev

            # actions/checkout@v6 regression on macos-15-intel: the includeIf-gated
            # credential helper isn't honored by git 2.54 on that runner image, so
            # the fetch falls back to interactive auth and fails. v5 writes the
            # extraheader directly into .git/config and works on every runner.
            - uses: actions/checkout@v5
              with:
                  ref: ${{ needs.prepare.outputs.checkout_ref }}

            - name: Install Homebrew (Linux)
              if: ${{ matrix.install_brew }}
              uses: kreuzberg-dev/actions/install-homebrew-linux@v1

            - name: Build bottles
              uses: kreuzberg-dev/actions/homebrew-build-bottles@v1
              with:
                  tag: ${{ needs.prepare.outputs.tag }}
                  version: ${{ needs.prepare.outputs.version }}
                  tap: kreuzberg-dev/homebrew-tap
                  formulas: |
                      liter-llm
                  out-dir: ${{ github.workspace }}/bottle-json
                  github-repo: kreuzberg-dev/liter-llm
                  token: ${{ steps.app-token.outputs.token }}

            - uses: actions/upload-artifact@v7
              with:
                  name: homebrew-bottle-json-${{ matrix.bottle_tag }}
                  path: ${{ github.workspace }}/bottle-json/*.json
                  if-no-files-found: error
                  retention-days: 14

    publish-homebrew-bottles:
        name: Merge Homebrew bottle DSL
        needs: [prepare, publish-homebrew-formula, homebrew-bottles]
        if: |
            needs.prepare.outputs.release_homebrew == 'true' &&
            needs.prepare.outputs.dry_run != 'true' &&
            needs.publish-homebrew-formula.result == 'success' &&
            needs.homebrew-bottles.result == 'success'
        runs-on: ubuntu-latest
        steps:
            - uses: actions/create-github-app-token@v2
              id: tap-token
              with:
                  app-id: ${{ secrets.BOT_APP_ID }}
                  private-key: ${{ secrets.BOT_APP_PRIVATE_KEY }}
                  owner: kreuzberg-dev
                  repositories: homebrew-tap

            - uses: actions/checkout@v6
              with:
                  ref: ${{ needs.prepare.outputs.checkout_ref }}

            - uses: actions/checkout@v6
              with:
                  repository: kreuzberg-dev/homebrew-tap
                  token: ${{ steps.tap-token.outputs.token }}
                  path: homebrew-tap
                  persist-credentials: true

            - uses: actions/download-artifact@v7
              with:
                  path: ${{ github.workspace }}/bottle-json
                  pattern: homebrew-bottle-json-*
                  merge-multiple: true

            - uses: kreuzberg-dev/actions/homebrew-merge-bottles@v1
              with:
                  tag: ${{ needs.prepare.outputs.tag }}
                  version: ${{ needs.prepare.outputs.version }}
                  tap-dir: ${{ github.workspace }}/homebrew-tap
                  json-dir: ${{ github.workspace }}/bottle-json
                  formulas: |
                      liter-llm
                  github-repo: kreuzberg-dev/liter-llm

            - name: Commit and push bottle DSL
              working-directory: homebrew-tap
              env:
                  GH_TOKEN: ${{ steps.tap-token.outputs.token }}
              run: |
                  git config user.name "kreuzberg-dev-publisher[bot]"
                  git config user.email "291994444+kreuzberg-dev-publisher[bot]@users.noreply.github.com"
                  if git diff --quiet Formula/; then
                    echo "No bottle DSL changes; skipping commit."
                    exit 0
                  fi
                  git add Formula/liter-llm.rb
                  git commit -m "liter-llm ${{ needs.prepare.outputs.version }}: add bottle DSL"
                  git push origin HEAD

    # ─────────────────────────────────────────────────────────────────────────
    # Phase 7 — Finalize
    # ─────────────────────────────────────────────────────────────────────────
    # NOTE: per-channel verify-install jobs are rebuilt in the test_apps plan
    # (Phase 3). The previous `verify-install-python` was wired against an
    # empty `test_apps/python` stub and consistently red post-publish; it is
    # removed here and re-introduced alongside its 11 siblings once alef
    # emits a real registry-mode `test_apps/` tree.

    release-finalize:
        name: Finalize release
        needs:
            - prepare
            - upload-c-ffi
            - upload-go-ffi
            - publish-go-module
            - upload-php-extensions
            - publish-crates
            - publish-pypi
            - publish-node
            - publish-wasm
            - publish-rubygems
            - publish-maven
            - publish-kotlin-android-maven
            - publish-hex
            - publish-nuget
            - publish-packagist
            - publish-homebrew-bottles
            - trigger-pubdev
            - publish-zig
            - upload-swift-release
        if: always()
        runs-on: ubuntu-latest
        timeout-minutes: 15
        steps:
            - uses: actions/create-github-app-token@v2
              id: app-token
              with:
                  app-id: ${{ secrets.BOT_APP_ID }}
                  private-key: ${{ secrets.BOT_APP_PRIVATE_KEY }}
                  owner: kreuzberg-dev

            - uses: actions/checkout@v6
              with:
                  ref: ${{ needs.prepare.outputs.checkout_ref }}

            - name: Finalize release
              if: needs.prepare.outputs.dry_run != 'true'
              uses: kreuzberg-dev/actions/finalize-release@v1
              with:
                  tag: ${{ needs.prepare.outputs.tag }}
                  token: ${{ steps.app-token.outputs.token }}
                  # go-module-path omitted: publish-go-module creates packages/go/{tag}
                  # on a commit that includes the bundled .lib/ prebuilt libraries.

            - name: Publish summary
              env:
                  VERSION: ${{ needs.prepare.outputs.version }}
              run: |
                  {
                    echo "## Release v${VERSION}"
                    echo ""
                    echo "| Registry | Status |"
                    echo "|----------|--------|"
                  } >> "$GITHUB_STEP_SUMMARY"
                  report() {
                    local name="$1" result="$2"
                    case "$result" in
                      success)  echo "| $name | ✅ Published |" ;;
                      skipped)  echo "| $name | ⏭️ Skipped |" ;;
                      *)        echo "| $name | ❌ $result |" ;;
                    esac
                  }
                  {
                    report "crates.io"   "${{ needs.publish-crates.result }}"
                    report "PyPI"        "${{ needs.publish-pypi.result }}"
                    report "npm"         "${{ needs.publish-node.result }}"
                    report "npm (WASM)"  "${{ needs.publish-wasm.result }}"
                    report "RubyGems"    "${{ needs.publish-rubygems.result }}"
                    report "Maven"       "${{ needs.publish-maven.result }}"
                    report "Maven (Kotlin Android)" "${{ needs.publish-kotlin-android-maven.result }}"
                    report "Hex.pm"      "${{ needs.publish-hex.result }}"
                    report "NuGet"       "${{ needs.publish-nuget.result }}"
                    report "Packagist"   "${{ needs.publish-packagist.result }}"
                    report "pub.dev"     "${{ needs.trigger-pubdev.result }}"
                    report "Zig"         "${{ needs.publish-zig.result }}"
                    report "Go FFI"      "${{ needs.upload-go-ffi.result }}"
                    report "PHP ext"     "${{ needs.upload-php-extensions.result }}"
                    report "Homebrew"    "${{ needs.publish-homebrew-bottles.result }}"
                    report "Swift"       "${{ needs.upload-swift-release.result }}"
                  } >> "$GITHUB_STEP_SUMMARY"
              shell: bash

    announce-discord:
        name: Announce release on Discord
        needs:
            - prepare
            - publish-crates
            - publish-pypi
            - publish-node
            - publish-wasm
            - publish-rubygems
            - publish-maven
            - publish-hex
            - publish-nuget
            - publish-packagist
            - publish-homebrew-bottles
            - upload-c-ffi
            - upload-go-ffi
            - publish-go-module
            - upload-elixir-nifs
            - upload-php-extensions
            - upload-cli-binaries
        if: |
            always() &&
            !cancelled() &&
            needs.prepare.outputs.dry_run != 'true' &&
            !contains(needs.*.result, 'failure')
        runs-on: ubuntu-latest
        steps:
            - uses: actions/create-github-app-token@v2
              id: app-token
              with:
                  app-id: ${{ secrets.BOT_APP_ID }}
                  private-key: ${{ secrets.BOT_APP_PRIVATE_KEY }}
                  owner: kreuzberg-dev
            - uses: kreuzberg-dev/actions/announce-release-discord@v1
              with:
                  tag: ${{ needs.prepare.outputs.tag }}
                  webhook-url: ${{ secrets.DISCORD_WEBHOOK_URL }}
                  project-name: liter-llm
                  token: ${{ steps.app-token.outputs.token }}

    cli-proxy:
        name: Publish CLI proxy package (npm)
        needs: [prepare, validate-versions, upload-cli-binaries]
        # The npm trusted publisher is bound to this workflow file (publish.yaml). The publish
        # runs inline here via the publish-npm composite action (which executes in this job's
        # context) rather than delegating to a reusable workflow — otherwise npm's OIDC
        # trusted-publishing check sees the reusable workflow's filename, not publish.yaml.
        #
        # Wired into the main release: publishes @kreuzberg/liter-llm-cli at the release version
        # once the standalone CLI binaries are on the GitHub release (install.js downloads them
        # at install time). Gated on the same `release_homebrew` flag that controls CLI-binary
        # uploads, so the npm wrapper never publishes ahead of the binaries it fetches.
        if: |
            always() &&
            needs.prepare.outputs.dry_run != 'true' &&
            needs.prepare.outputs.release_homebrew == 'true' &&
            needs.validate-versions.result == 'success' &&
            needs.upload-cli-binaries.result == 'success'
        runs-on: ubuntu-latest
        permissions:
            id-token: write
            contents: read
        steps:
            - uses: actions/checkout@v6
              with:
                  ref: ${{ needs.prepare.outputs.checkout_ref }}
            - name: Stamp release version into cli-proxy package.json
              shell: bash
              run: |
                  cd cli-proxy/npm
                  npm version "${{ needs.prepare.outputs.version }}" --no-git-tag-version --allow-same-version
            - name: Re-check npm before publish
              id: recheck
              uses: kreuzberg-dev/actions/check-registry@v1
              with:
                  registry: npm
                  package: "@kreuzberg/liter-llm-cli"
                  version: ${{ needs.prepare.outputs.version }}
            - name: Publish CLI proxy package
              if: ${{ steps.recheck.outputs.exists != 'true' }}
              uses: kreuzberg-dev/actions/publish-npm@v1
              with:
                  package-dir: cli-proxy/npm
                  npm-tag: ${{ needs.prepare.outputs.npm_tag }}
                  access: public
                  provenance: "true"
