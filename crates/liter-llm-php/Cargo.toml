[package]
name = "liter-llm-php"
version = "1.4.0-rc.33"
edition = "2024"
license = "MIT"
description = "Universal LLM API client with Rust-powered polyglot bindings."
readme = false
keywords = ["llm", "api-client", "openai", "anthropic"]
categories = ["text-processing"]

# `ahash` is conditionally referenced: only when the umbrella crate exposes
# `AHashMap<Cow<str>, _>` parameters (the conditional `__*_ahash` shim rebuilds).
# `futures-util` is similarly conditional on streaming adapters being declared.
[package.metadata.cargo-machete]
ignored = ["tokio", "ahash", "futures-util"]

[lib]
crate-type = ["cdylib"]

[features]
extension-module = []

[dependencies]
ext-php-rs = "0.15"
futures-util = "0.3"
liter-llm = { version = "1.4.0-rc.33", path = "../liter-llm", features = ["native-http", "full"] }
serde = { version = "1", features = ["derive"] }
serde_json = "1"
tokio = { version = "1", features = ["full"] }
