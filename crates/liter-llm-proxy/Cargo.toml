[package]
name = "liter-llm-proxy"
version.workspace = true
edition.workspace = true
license.workspace = true
repository.workspace = true
homepage.workspace = true
authors.workspace = true
description = "OpenAI-compatible LLM proxy server — model routing, virtual keys, rate limiting, cost tracking."
keywords = ["llm", "proxy", "openai", "gateway", "kreuzberg"]

[package.metadata.cargo-machete]
ignored = ["opentelemetry", "tracing-opentelemetry"]

[features]
# OTel export bridge — forwarded to the core `liter-llm/otel` feature.
# OTel is the single observability surface; no prometheus feature exists by design.
otel = ["liter-llm/otel", "dep:opentelemetry", "dep:tracing-opentelemetry"]

# Caching layer backed by opendal — forwarded to `liter-llm/opendal-cache`.
opendal-cache = ["liter-llm/opendal-cache"]

# `proxy` — MCP server, files, batches, and responses endpoints.
# All are always compiled into the proxy binary; this feature is a named
# surface so upstream crates can depend on the proxy with explicit intent.
proxy = []

# `full` — all proxy features: otel + opendal-cache.
full = ["otel", "opendal-cache", "proxy"]

default = ["proxy"]

[dependencies]
axum = { workspace = true }
base64 = { workspace = true }
bytes = { workspace = true }
dashmap = { workspace = true }
futures-util = { workspace = true }
http = { workspace = true }
liter-llm = { path = "../liter-llm", version = "1.6.0-rc.0", features = [
    "native-http",
    "tower",
    "tracing",
] }
opendal = { workspace = true }

# Feature-gated
opentelemetry = { workspace = true, optional = true }
rmcp = { workspace = true }
schemars = { workspace = true }
secrecy = { workspace = true }
serde = { workspace = true }
serde_json = { workspace = true }
subtle = { workspace = true }
tokio = { workspace = true }
tokio-util = { workspace = true }
toml = { workspace = true }
tower = { workspace = true }
tower-http = { workspace = true }
tracing = { workspace = true }
tracing-opentelemetry = { workspace = true, optional = true }
utoipa = { workspace = true }

[dev-dependencies]
ctor = "1.0"
http-body-util = "0.1"
reqwest = { workspace = true }
tokio = { workspace = true, features = ["test-util"] }

[lints]
workspace = true
