default_install_hook_types:
  - pre-commit
  - commit-msg
exclude: ^e2e/|vendor/|node_modules/|target/|_build/|test_apps/|dist/|artifacts/|^scripts/ci/

repos:
  # AI-Rulez: validate and auto-generate AI assistant configuration files
  - repo: https://github.com/Goldziher/ai-rulez
    rev: v4.1.6
    hooks:
      - id: ai-rulez-validate
      - id: ai-rulez-generate

  # Commit message linting
  - repo: https://github.com/Goldziher/gitfluff
    rev: v0.8.0
    hooks:
      - id: gitfluff-lint
        args: ["--write"]
        stages: [commit-msg]

  # General file checks
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v6.0.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-merge-conflict
      - id: check-added-large-files
        args: ["--maxkb=500"]
        exclude: Cargo.lock|docs/assets/
      - id: detect-private-key
      - id: check-json
      - id: check-yaml
        args: ["--allow-multiple-documents", "--unsafe"]
      - id: check-toml
      - id: check-case-conflict

  # TOML formatting
  - repo: https://github.com/tox-dev/pyproject-fmt
    rev: "v2.21.2"
    hooks:
      - id: pyproject-fmt

  # Markdown: linting
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.15.12
    hooks:
      - id: ruff
        args: [--fix]
      - id: ruff-format

  # Node/TS/WASM: oxlint
  - repo: https://github.com/kreuzberg-dev/pre-commit-hooks
    rev: v1.0.0
    hooks:
      - id: cargo-sort
        args: [-w]
      - id: cargo-fmt
        args: ["--all"]
      - id: cargo-check
        name: cargo check (workspace)
        args:
          [
            "--workspace",
            "--exclude=liter-llm-php",
            "--all-features",
            "--all-targets",
          ]
        files: ^(crates/|tools/|Cargo\.(toml|lock))
        types_or: [rust, toml]
      - id: cargo-clippy
        name: clippy (workspace — core, cli, proxy, ffi, bindings)
        args:
          [
            "--fix",
            "--allow-dirty",
            "--allow-staged",
            "--workspace",
            "--exclude=liter-llm-php",
            "--all-features",
            "--all-targets",
            "--",
            "-D",
            "warnings",
          ]
        files: ^(crates/|tools/|Cargo\.(toml|lock))
        types_or: [rust, toml]
      - id: cargo-machete
        args: [crates/]
      - id: cargo-deny
        args: ["check"]
      - id: shfmt
        args: ["-w", "-i", "2"]
      - id: shellcheck
        args: ["-x"]
      - id: clang-format
        args: ["--style=file"]
        files: ^crates/liter-llm-ffi/tests/c/
      - id: clang-tidy
        files: ^crates/liter-llm-ffi/tests/c/
      - id: checkstyle
        args: ["-c", "packages/java/checkstyle.xml", "-p", "packages/java/checkstyle.properties"]
        exclude: ^(\.mvn/wrapper/|e2e/|packages/java/src/)
      - id: mypy
        args: ["--strict", "packages/python/liter_llm/"]
        exclude: ^(e2e/|scripts/|test_apps/|tests/|benchmarks/)
      - id: go-fmt
        exclude: ^(e2e/|test_apps/)
      - id: golangci-lint
        exclude: ^(e2e/|test_apps/)
        env:
          KREUZBERG_GO_MOD_DIRS: packages/go
      - id: govulncheck
        exclude: ^(e2e/|test_apps/)
      - id: rubocop
        files: ^packages/ruby/(?!ext/).*\.rb$
      - id: rubocop-lint
        files: ^packages/ruby/(?!ext/).*\.(rb|rbs)$
      - id: steep
        files: ^packages/ruby/.*\.(rb|rbs)$
      - id: dotnet-format
        files: ^packages/csharp/.*\.cs$
      - id: dotnet-format-check
        files: ^packages/csharp/.*\.cs$
      - id: php-cs-fixer
        files: ^packages/php/.*\.php$
        args: ["fix", "--config=packages/php/.php-cs-fixer.dist.php"]
      - id: phpstan
        files: ^packages/php/.*\.php$
      - id: mix-format
        files: ^packages/elixir/
      - id: mix-credo
        files: ^packages/elixir/
      - id: java-verify
        files: ^packages/java/

      - id: oxlint
      - id: oxfmt
      - id: cppcheck
      - id: rumdl-fmt
      - id: cpd
  # Alef: multi-language formatting, linting, type checking, and version sync.
  # The script entry prefers a locally-installed `alef` binary whose --version
  # matches the pinned alef.toml version, falling back to a sha256-verified
  # release-tarball download. Do not override `entry:` here.
  - repo: https://github.com/kreuzberg-dev/alef
    rev: v0.15.1
    hooks:
      - id: alef-verify
      - id: alef-sync-versions

  # GitHub Actions: linting
  - repo: https://github.com/rhysd/actionlint
    rev: v1.7.12
    hooks:
      - id: actionlint

  # Spelling: fast Rust-based spell checker
  - repo: https://github.com/crate-ci/typos
    rev: v1.46.0
    hooks:
      - id: typos
        args: [--force-exclude]
