default_install_hook_types:
  - pre-commit
  - commit-msg
exclude: ^e2e/|vendor/|node_modules/|target/|_build/|test_apps/|dist/|artifacts/|^scripts/ci/

repos:
  # AI-Rulez: validate and auto-generate AI assistant configuration files
  - repo: https://github.com/Goldziher/ai-rulez
    rev: v4.1.6
    hooks:
      - id: ai-rulez-validate
      - id: ai-rulez-generate

  # Commit message linting
  - repo: https://github.com/Goldziher/gitfluff
    rev: v0.8.0
    hooks:
      - id: gitfluff-lint
        args: ["--write"]
        stages: [commit-msg]

  # General file checks
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v6.0.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
        exclude: ^(packages/python/liter_llm/py\.typed|packages/java/checkstyle\.properties)$
      - id: check-merge-conflict
      - id: check-added-large-files
        args: ["--maxkb=500"]
        exclude: Cargo.lock|docs/assets/
      - id: detect-private-key
      - id: check-json
      - id: check-yaml
        args: ["--allow-multiple-documents", "--unsafe"]
      - id: check-toml
      - id: check-case-conflict

  # TOML formatting
  - repo: https://github.com/tox-dev/pyproject-fmt
    rev: "v2.21.2"
    hooks:
      - id: pyproject-fmt
        exclude: ^packages/python/pyproject\.toml$

  # Markdown: linting
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.15.13
    hooks:
      - id: ruff
        args: [--fix]
        exclude: ^packages/python/liter_llm/(__init__\.py|api\.py|exceptions\.py|options\.py|_internal_bindings\.pyi)$
      - id: ruff-format
        exclude: ^packages/python/liter_llm/(__init__\.py|api\.py|exceptions\.py|options\.py|_internal_bindings\.pyi)$

  # Node/TS/WASM: oxlint
  - repo: https://github.com/kreuzberg-dev/pre-commit-hooks
    rev: v1.1.11
    hooks:
      - id: cargo-sort
        args: [-w]
        exclude: ^(crates/liter-llm-(ffi|node|php|py|wasm|swift|dart|rb)/Cargo\.toml|packages/(dart|swift|elixir/native/liter_llm_nif|ruby/ext/liter_llm_rb/native)/Cargo\.toml|packages/(go|java|csharp|python|elixir|php|zig|wasm|typescript|swift|dart|ruby)/.*/Cargo\.toml|e2e/rust/Cargo\.toml)$
      - id: cargo-fmt
        args: ["--all"]
      - id: cargo-check
        name: cargo check (workspace)
        args: ["--workspace", "--exclude=liter-llm-php", "--all-features", "--all-targets"]
        files: ^(crates/|tools/|Cargo\.(toml|lock))
        types_or: [rust, toml]
      - id: cargo-clippy
        name: clippy (workspace — core, cli, proxy, ffi, bindings)
        args:
          [
            "--fix",
            "--allow-dirty",
            "--allow-staged",
            "--workspace",
            "--exclude=liter-llm-php",
            "--exclude=liter-llm-swift",
            "--exclude=liter-llm-dart",
            "--all-features",
            "--all-targets",
            "--",
            "-D",
            "warnings",
          ]
        files: ^(crates/|tools/|Cargo\.(toml|lock))
        types_or: [rust, toml]
      - id: cargo-machete
        args: [crates/]
        exclude: ^(e2e/|test_apps/)
      - id: cargo-deny
        args: ["check"]
      - id: rustdoc-lint
        files: ^crates/liter-llm/src/.*\.rs$
        exclude: /tests/
        args: ["-p", "liter-llm"]
      - id: pydocstyle
        files: ^packages/python/.*\.py$
        exclude: ^packages/python/(tests/|.*_native\.py$)
      - id: alef-docs-fresh
      - id: roxygen2-check
        files: ^packages/r/R/.*\.R$
      - id: javadoc-lint
        files: ^packages/java/src/main/.*\.java$
      - id: cs-xmldoc-lint
        files: ^packages/csharp/LiterLlm/.*\.cs$
      - id: phpdoc-lint
        files: ^packages/php/src/.*\.php$
      - id: dart-doc-lint
        files: ^packages/dart/lib/.*\.dart$
        exclude: ^packages/dart/lib/src/rust/
      - id: swift-doc-coverage
        files: ^packages/swift/Sources/LiterLlm/.*\.swift$
      - id: swift-format
        files: ^packages/swift/.*\.swift$
      - id: swiftlint
        files: ^packages/swift/.*\.swift$
      - id: shfmt
        args: ["-w", "-i", "2"]
      - id: shellcheck
        args: ["-x"]
      - id: checkstyle
        args: ["-c", "packages/java/checkstyle.xml", "-p", "packages/java/checkstyle.properties"]
        exclude: ^(\.mvn/wrapper/|e2e/|packages/java/src/)
      - id: mypy
        args: ["--strict", "packages/python/liter_llm/"]
        exclude: ^(e2e/|scripts/|test_apps/|tests/|benchmarks/)
      - id: go-fmt
        exclude: ^(e2e/|test_apps/)
      - id: golangci-lint
        exclude: ^(e2e/|test_apps/)
        env:
          KREUZBERG_GO_MOD_DIRS: packages/go
      - id: govulncheck
        exclude: ^(e2e/|test_apps/)
        env:
          KREUZBERG_GO_MOD_DIRS: packages/go
      - id: rubocop
        files: ^packages/ruby/(?!ext/).*\.rb$
        exclude: ^packages/ruby/lib/liter_llm/native\.rb$
      - id: rubocop-lint
        files: ^packages/ruby/(?!ext/).*\.(rb|rbs)$
        exclude: ^packages/ruby/lib/liter_llm/native\.rb$
      - id: steep
        files: ^packages/ruby/.*\.(rb|rbs)$
      - id: dotnet-format
        files: ^packages/csharp/.*\.cs$
      - id: dotnet-format-check
        files: ^packages/csharp/.*\.cs$
      - id: php-cs-fixer
        files: ^packages/php/.*\.php$
        exclude: ^packages/php/(src/(DefaultClient|LiterLlm)\.php|stubs/liter_llm_extension\.php)$
        args: ["fix", "--config=packages/php/.php-cs-fixer.dist.php"]
      - id: phpstan
        files: ^packages/php/.*\.php$
        exclude: ^packages/php/(\.?php-cs-fixer(\.dist)?\.php|vendor/)
      - id: mix-format
        files: ^packages/elixir/
        exclude: ^packages/elixir/lib/liter_llm\.ex$
      - id: mix-credo
        files: ^packages/elixir/
      - id: java-verify
        files: ^packages/java/
      - id: dart-format
        files: ^packages/dart/.*\.dart$
      - id: dart-analyze
        files: ^packages/dart/.*\.dart$
      - id: zig-fmt
        files: ^packages/zig/.*\.zig$
      - id: zig-build-check
        files: ^packages/zig/.*\.zig$
      - id: detekt
        files: ^packages/kotlin-android/.*\.kts?$
      - id: ktlint
        files: ^packages/kotlin-android/.*\.kts?$
      - id: clang-format
        args: ["--style=file"]
        files: ^crates/liter-llm-ffi/tests/c/
      - id: clang-tidy
        files: ^crates/liter-llm-ffi/tests/c/
      - id: textlint
        files: ^docs/.*\.md$
        exclude: ^docs/(reference/|api-|snippets/|migration/)
        args: ["--fix", "--config", ".textlintrc.json"]

      - id: oxlint
        require_serial: true
        exclude: ^(crates/liter-llm-node/index\.d\.ts|packages/(typescript|wasm)/src/index\.ts)$
      - id: oxfmt
        require_serial: true
        exclude: ^(crates/liter-llm-node/index\.d\.ts|packages/(typescript|wasm)/src/index\.ts)$
      - id: cppcheck
        args: ["--suppress=unusedStructMember"]
        require_serial: true
      - id: rumdl-fmt
        exclude: ^docs/providers\.md$
      - id: cpd
  # Alef: multi-language formatting, linting, type checking, and version sync.
  # The script entry prefers a locally-installed `alef` binary whose --version
  # matches the pinned alef.toml version, falling back to a sha256-verified
  # release-tarball download. Do not override `entry:` here.
  - repo: https://github.com/kreuzberg-dev/alef
    rev: v0.16.59
    hooks:
      - id: alef-verify
      - id: alef-sync-versions

  # Documentation snippets: validate every fenced code block under docs/snippets/
  # against the language's toolchain via alef-snippets. The runner returns
  # Unavailable (not Fail) when a toolchain is missing on the local machine, so
  # hooks stay non-flaky across contributors with different toolchain coverage.
  - repo: local
    hooks:
      - id: alef-snippets-audit
        name: alef snippets audit (snippet structural integrity)
        entry: alef snippets audit --snippets docs/snippets
        language: system
        files: ^docs/snippets/
        pass_filenames: false
        require_serial: true
      - id: alef-snippets-validate-syntax
        name: alef snippets validate --level syntax
        entry: alef snippets validate --snippets docs/snippets --level syntax
        language: system
        files: ^docs/snippets/
        pass_filenames: false
        require_serial: true

  # GitHub Actions: linting
  - repo: https://github.com/rhysd/actionlint
    rev: v1.7.12
    hooks:
      - id: actionlint

  # GitHub Actions: pin maintenance
  - repo: https://github.com/Goldziher/gh-actions-updater
    rev: v0.1.2
    hooks:
      - id: gh-actions-updater

  # Spelling: fast Rust-based spell checker
  - repo: https://github.com/crate-ci/typos
    rev: v1.46.2
    hooks:
      - id: typos
        args: [--force-exclude]
