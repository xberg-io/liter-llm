default_install_hook_types:
    - pre-commit
    - commit-msg
default_stages:
    - pre-commit
exclude: ^e2e/|vendor/|node_modules/|target/|_build/|test_apps/|dist/|artifacts/|^scripts/ci/
repos:
    - repo: https://github.com/Goldziher/gitfluff
      rev: v0.8.0
      hooks:
          - id: gitfluff-lint
            args:
                - --write
            stages:
                - commit-msg
    - repo: https://github.com/kreuzberg-dev/pre-commit-hooks
      rev: v2.2.0
      hooks:
          # Alef verification
          - id: alef-verify

          # Cargo / Rust
          - id: cargo-clippy
            name: "clippy (workspace — core, cli, proxy, ffi, bindings)"
            args:
                - --fix
                - --allow-dirty
                - --allow-staged
                - --workspace
                - --exclude=liter-llm-php
                - --exclude=liter-llm-swift
                - --exclude=liter-llm-dart
                # Exclude CLI because `--all-features` activates both
                # `mimalloc` and `jemalloc` (mutually-exclusive global allocators)
                # which is a compile-time error by design (see allocator.rs).
                - --exclude=liter-llm-cli
                - --all-features
                - --all-targets
                - --
                - -D
                - warnings
            files: ^(crates/|tools/|Cargo\.(toml|lock))
            types_or:
                - rust
                - toml
          - id: cargo-sort
            args:
                - -w
            exclude: ^(crates/liter-llm-(ffi|node|php|py|wasm|swift|dart|rb)/Cargo\.toml|packages/(dart|swift|elixir/native/liter_llm_nif|ruby/ext/liter_llm_rb/native)/Cargo\.toml|packages/(go|java|csharp|python|elixir|php|zig|wasm|typescript|swift|dart|ruby)/.*/Cargo\.toml|e2e/rust/Cargo\.toml)$
          - id: cargo-machete
            args:
                - crates/
            exclude: ^(e2e/|test_apps/)
          - id: cargo-deny
            args: ["check"]
          - id: rustdoc-lint
            files: ^crates/liter-llm/src/.*\.rs$
            exclude: /tests/
            args:
                - -p
                - liter-llm
          - id: rust-max-lines
            args: ["--max=1000"]
            # Remediation backlog: existing files over the 1,000-LOC ceiling. New
            # files are subject to the cap. Shrink this list when files are split.
            exclude: ^(crates/liter-llm-ffi/src/lib\.rs|crates/liter-llm-jni/src/lib\.rs|crates/liter-llm-node/src/lib\.rs|crates/liter-llm-php/src/lib\.rs|crates/liter-llm-py/src/lib\.rs|crates/liter-llm-wasm/src/lib\.rs|crates/liter-llm/src/client/mod\.rs|crates/liter-llm/src/provider/anthropic\.rs|crates/liter-llm/src/provider/bedrock\.rs|crates/liter-llm/src/provider/vertex\.rs|crates/liter-llm/src/tower/budget\.rs|crates/liter-llm/src/tower/cache\.rs|crates/liter-llm/src/tower/route_classify\.rs|crates/liter-llm/src/tower/router\.rs|crates/liter-llm/src/types/common\.rs|packages/dart/rust/src/frb_generated\.rs|packages/dart/rust/src/lib\.rs|packages/elixir/native/liter_llm_nif/src/lib\.rs|packages/ruby/ext/liter_llm_rb/src/lib\.rs|packages/swift/rust/src/lib\.rs)$

          # Linters and checks
          - id: ai-rulez-generate

          - id: check-merge-conflict
          - id: check-added-large-files
            args:
                - --maxkb=500
            exclude: Cargo.lock|docs/assets/
          - id: detect-private-key
          - id: check-case-conflict
          - id: check-executables-have-shebangs
          - id: check-shebang-scripts-are-executable
          - id: typos
            args: ["--force-exclude"]
          - id: check-json
          - id: check-yaml
            args:
                - --allow-multiple-documents
                - --unsafe
          - id: check-toml

          - id: actionlint
          - id: gh-actions-updater

          - id: shellcheck
            args:
                - -x
            exclude: ^packages/kotlin-android/gradlew$

          - id: markdownlint-rumdl-strict
            # Alef-generated artifacts (snippets, agents, README partials, skills)
            # follow their own structural conventions: snippets are heading-less
            # code excerpts meant for embedding, ordered-list `1.` repetition in
            # agent docs is intentional, and ecosystem grids exceed 120 cols.
            # All of docs/ uses Zensical (Material for MkDocs) conventions
            # rumdl strict mis-flags: 4-space-indent `=== "Tab"` blocks
            # (MD046), inline HTML in hero/ecosystem grids (MD033), and
            # snippet partials that begin with a fenced block (MD041). Alef-
            # generated READMEs/skills/agents follow the same patterns.
            # CHANGELOG entries intentionally describe one fix per long line.
            exclude: ^(docs/|\.agents/|\.github/PULL_REQUEST_TEMPLATE\.md$|templates/readme/|skills/|packages/[^/]+/README\.md$|crates/[^/]+/README\.md$|README\.md$|CONTRIBUTING\.md$|CHANGELOG\.md$)
          - id: textlint
            files: ^docs/.*\.md$
            exclude: ^docs/(reference/|api-|snippets/|migration/)
            args:
                - --fix
                - --config
                - .textlintrc.json

          - id: ruff
            exclude: ^packages/python/liter_llm/(__init__\.py|api\.py|exceptions\.py|options\.py|_internal_bindings\.pyi)$
          - id: mypy
            args:
                - --strict
                - --config-file
                - packages/python/pyproject.toml
                - packages/python/liter_llm/
            exclude: ^(e2e/|scripts/|test_apps/|tests/|benchmarks/)
          - id: pydocstyle
            files: ^packages/python/.*\.py$
            exclude: ^packages/python/(tests/|.*_native\.py$)

          - id: oxlint
            require_serial: true
            exclude: ^(crates/liter-llm-node/index\.(d\.ts|js)|packages/(typescript|wasm)/src/index\.ts)$
          - id: tsc-typecheck
          - id: tsdoc-lint

          - id: golangci-lint
            exclude: ^(e2e/|test_apps/)
            env:
                KREUZBERG_GO_MOD_DIRS: packages/go
          - id: govulncheck
            exclude: ^(e2e/|test_apps/)
            env:
                KREUZBERG_GO_MOD_DIRS: packages/go
          - id: godoc-lint

          - id: checkstyle
            args:
                - -c
                - packages/java/checkstyle.xml
                - -p
                - packages/java/checkstyle.properties
            exclude: ^(\.mvn/wrapper/|e2e/|packages/java/src/)
          - id: pmd
            args:
                - check
                - -R
                - packages/java/pmd-ruleset.xml
                - -f
                - text
          - id: cpd
          - id: java-verify
            files: ^packages/java/
          - id: javadoc-lint
            files: ^packages/java/src/main/.*\.java$

          - id: detekt
            files: ^packages/kotlin-android/.*\.kts?$
            args: [--build-upon-default-config]
          # NOTE: ktlint is intentionally NOT run on alef-generated kotlin-android.
          # ktfmt (--kotlinlang-style) is the canonical formatter (matches alef:format);
          # ktlint's always-format mode conflicts with ktfmt (blank-line-after-brace) and
          # mangles alef's `///` doc comments into `// /`. detekt covers static analysis.
          - id: kotlin-dokka

          - id: rubocop-lint
            files: ^packages/ruby/(?!ext/).*\.(rb|rbs)$
            exclude: ^packages/ruby/lib/liter_llm/native\.rb$
          - id: steep
            files: ^packages/ruby/.*\.(rb|rbs)$
          - id: yard-coverage
            # Rakefile + native.rb + build scripts are not API surface — they
            # are build tooling / alef-generated FFI marshalling that yard
            # can't introspect through Sorbet `sig { ... }` blocks.
            exclude: ^(packages/ruby/Rakefile$|packages/ruby/lib/liter_llm/native\.rb$|scripts/publish/ruby/)

          - id: dotnet-format-check
            files: ^packages/csharp/.*\.cs$
          - id: cs-xmldoc-lint
            files: ^packages/csharp/LiterLlm/.*\.cs$

          - id: phpstan
            files: ^packages/php/.*\.php$
            exclude: ^packages/php/(\.?php-cs-fixer(\.dist)?\.php|vendor/)
            args:
                - analyse
                - --configuration=packages/php/phpstan.neon
                - --memory-limit=1G
          - id: phpdoc-lint
            files: ^packages/php/src/.*\.php$

          - id: mix-credo
            files: ^packages/elixir/
          - id: ex-doc-coverage

          - id: roxygen2-check
            files: ^packages/r/R/.*\.R$
          - id: swiftlint
            files: ^packages/swift/.*\.swift$
          - id: swift-doc-coverage
            files: ^packages/swift/Sources/LiterLlm/.*\.swift$
          - id: dart-analyze
            files: ^packages/dart/.*\.dart$
          - id: dart-doc-lint
            files: ^packages/dart/lib/.*\.dart$
            exclude: ^packages/dart/lib/src/rust/

          - id: zig-build-check
            files: ^packages/zig/.*\.zig$
          - id: zig-doc-lint

          - id: clang-tidy
            files: ^crates/liter-llm-ffi/tests/c/
          - id: cppcheck
            args:
                - --suppress=unusedStructMember
            require_serial: true
          - id: hadolint
          - id: alef-snippets-validate

          - id: ai-rulez-validate

          # Formatters
          - id: trailing-whitespace
            exclude: ^packages/dart/lib/src/liter_llm_bridge_generated/lib\.freezed\.dart$
          - id: end-of-file-fixer
            exclude: ^(packages/python/liter_llm/py\.typed|packages/java/checkstyle\.properties)$
          - id: mixed-line-ending
          - id: shfmt
            args: ["-w", "-i", "2"]
          - id: rumdl-fmt
            exclude: ^docs/providers\.md$
          - id: cargo-fmt
            args: ["--all"]
          - id: pyproject-fmt
            exclude: ^packages/python/pyproject\.toml$
            # Pin toml-fmt-common < 1.3.3: 1.3.3 (released 2026-05-28) renamed
            # `build_cli` → `_build_cli`, breaking pyproject-fmt 2.21.2 which
            # still imports the old public name. Upstream fix pending in
            # pyproject-fmt. Without this constraint, prek installs the latest
            # toml-fmt-common and pyproject-fmt fails with ImportError.
            additional_dependencies:
                - pyproject-fmt==2.21.2
                - toml-fmt-common<1.3.3
          - id: ruff-format
            exclude: ^packages/python/liter_llm/(__init__\.py|api\.py|exceptions\.py|options\.py|_internal_bindings\.pyi)$
          - id: oxfmt
            require_serial: true
            exclude: ^(crates/liter-llm-node/index\.(d\.ts|js)|packages/(typescript|wasm)/src/index\.ts)$
          - id: go-fmt
            exclude: ^(e2e/|test_apps/)
          - id: palantir-java-format
          - id: ktfmt
            files: ^packages/kotlin-android/.*\.kts?$
            args:
                - --kotlinlang-style
          - id: rubocop
            files: ^packages/ruby/(?!ext/).*\.rb$
            exclude: ^packages/ruby/lib/liter_llm/native\.rb$
          - id: dotnet-format
            files: ^packages/csharp/.*\.cs$
          - id: php-cs-fixer
            files: ^packages/php/.*\.php$
            exclude: ^packages/php/(src/(DefaultClient|LiterLlm)\.php|stubs/liter_llm_extension\.php)$
            args:
                - fix
                - --config=packages/php/.php-cs-fixer.dist.php
          - id: mix-format
            files: ^packages/elixir/
            exclude: ^packages/elixir/lib/liter_llm(/native)?\.ex$
          - id: swift-format
            files: ^packages/swift/.*\.swift$
          - id: dart-format
            files: ^packages/dart/.*\.dart$
          - id: zig-fmt
            files: ^packages/zig/.*\.zig$
          - id: clang-format
            args:
                - --style=file
            files: ^crates/liter-llm-ffi/tests/c/
    - repo: local
      hooks:
          - id: alef-snippets-audit
            name: alef snippets audit (snippet structural integrity)
            entry: alef snippets audit --snippets docs/snippets
            language: system
            files: ^docs/snippets/
            pass_filenames: false
            require_serial: true
          - id: alef-snippets-validate-syntax
            name: alef snippets validate --level syntax
            entry: alef snippets validate --snippets docs/snippets --level syntax
            language: system
            files: ^docs/snippets/
            pass_filenames: false
            require_serial: true
