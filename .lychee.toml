# Configuration for the lychee link checker.
# https://github.com/lycheeverse/lychee

# The root directory for resolving root-relative links is passed on the CLI
# (`--root-dir "$PWD/docs-site/dist"`) by the `docs:lint:links` task, since it
# must be an absolute path to the freshly built site.

# Exclude common patterns that produce false positives
exclude = [
    # Localhost / loopback addresses
    "localhost",
    "127\\.0\\.0\\.1",
    "0\\.0\\.0\\.0",

    # Placeholder / example domains
    "example\\.com",
    "example\\.org",

    # Template variables (e.g. ${var}, {{ var }})
    "\\$\\{",
    "\\{\\{",

    # GitHub edit links (require auth)
    "github\\.com/.*/edit/",

    # GitHub raw links for new/renamed files (404 until pushed)
    "github\\.com/.*/raw/",

    # Docs site self-references (404 until deployed)
    "docs\\.liter-llm\\.xberg\\.dev",

    # Theme-injected favicon (served from the brand-asset CDN in production,
    # absent from the built dist/ tree)
    "favicon\\.svg",

    # Known upstream alef-generator bug: the generated reference/types.md footer
    # emits a relative `configuration.md` link instead of the routed
    # `/reference/configuration/` path. The target file is DO-NOT-EDIT generated
    # output; track/fix in the alef docs generator.
    "reference/types/configuration\\.md",

    # Placeholder provider URL used in docs examples
    "api\\.my-provider\\.com",

    # PyPI project pages (rate-limited)
    "pypi\\.org/project/",

    # crates.io (rate-limited)
    "crates\\.io/crates/",

    # npm (rate-limited)
    "npmjs\\.com/package/",

    # Discord invite links (require auth)
    "discord\\.gg/",

    # OpenDAL service-list docs page (URL keeps churning across versions)
    "opendal\\.apache\\.org/docs/category/services",

    # Taskfile.dev installation page — Cloudflare frequently resets connections from GHA runners
    "taskfile\\.dev/installation",
]

# Accept these HTTP status codes as valid
accept = [200, 204, 301, 302, 429]

# Connection timeout in seconds
timeout = 30

# Max retries per link
max_retries = 3

# Max concurrent requests
max_concurrency = 10

# Do not check email addresses
include_mail = false

# Do not require HTTPS
require_https = false

# Cache results to speed up repeated runs
cache = true
