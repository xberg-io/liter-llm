version = "4.0"
name = "liter-llm"
description = "Multi-language LLM library with Rust core and polyglot bindings (Python, TypeScript, Ruby, PHP, Elixir, Go, Java, C#, WASM)"
gitignore = true

presets = ["claude", "gemini", "codex"]

[header]
style = "minimal"

builtins = [
    "rust",
    "python",
    "typescript",
    "ruby",
    "php",
    "elixir",
    "go",
    "java",
    "csharp",
    "pyo3",
    "napi-rs",
    "default-commands",
]

[[includes]]
name = "kreuzberg-core"
source = "https://github.com/kreuzberg-dev/ai-rulez"
path = "modules/core"
merge_strategy = "local-override"

[[includes]]
name = "kreuzberg-cicd"
source = "https://github.com/kreuzberg-dev/ai-rulez"
path = "modules/cicd"
merge_strategy = "local-override"

[[installed_skills]]
name = "alef"
source = "https://github.com/kreuzberg-dev/alef.git"

[[mcp_servers]]
name = "ai-rulez"
description = "AI-Rulez MCP server for configuration management"
command = "npx"
args = ["-y", "ai-rulez@latest", "mcp"]

[[mcp_servers]]
name = "playwright"
description = "Playwright browser automation for E2E testing and docs verification"
command = "npx"
args = ["-y", "@playwright/mcp@latest"]

[defaults]
effort = "medium"
