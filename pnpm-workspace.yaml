packages:
  - "crates/liter-llm-node"
  - "crates/liter-llm-wasm"
  - "e2e/node"
  - "e2e/wasm"
allowBuilds:
  esbuild: true
minimumReleaseAge: 0
minimumReleaseAgeExclude:
  - "@xberg-io/*"

# pnpm settings migrated from .npmrc (npm warns on kebab-case keys it does not recognize)
sharedWorkspaceLockfile: true
autoInstallPeers: true
hoist: true
