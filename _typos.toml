[files]
extend-exclude = [
  "fixtures/",
  "e2e/",
  "schemas/",
  "*.lock",
  "vendor/",
  "node_modules/",
  "target/",
  ".alef/",
  ".lycheecache",
  "docs/assets/",
  "*.svg",
  # Auto-generated Java bindings include Jackson imports like
  # `com.fasterxml.jackson.databind.ser.std.*` whose "ser" segment trips typos.
  "packages/java/",
]

[default.extend-words]
# German text in test fixtures
ist = "ist"
ein = "ein"
# Hyphenated words
mis = "mis"
# Request IDs
ded = "ded"
