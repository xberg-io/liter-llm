[package]
name = "liter_llm_nif"
version = "1.4.0-rc.27"
edition = "2024"
license = "MIT"
description = "Universal LLM API client with Rust-powered polyglot bindings."
readme = false
keywords = ["llm", "api-client", "openai", "anthropic"]
categories = ["text-processing"]

[lib]
name = "liter_llm_nif"
crate-type = ["cdylib"]

[dependencies]
liter-llm = { path = "../../../../crates/liter-llm", features = ["native-http", "full"] }
rustler = "0.37"
serde = { version = "1", features = ["derive"] }
serde_json = "1"
tokio = { version = "1", features = ["rt-multi-thread", "sync"] }
futures-util = "0.3"

[workspace]
