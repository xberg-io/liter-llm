[package]
name = "liter_llm_nif"
version = "1.5.0"
edition = "2024"
license = "MIT"
description = "Universal LLM API client with Rust-powered polyglot bindings."
readme = false
keywords = ["anthropic", "api-client", "llm", "openai"]
categories = []

[package.metadata.cargo-machete]
ignored = ["tokio", "futures-util"]

[workspace]

[lib]
name = "liter_llm_nif"

crate-type = ["cdylib"]

[dependencies]
futures-util = "0.3"
liter-llm = { version = "1.5.0", path = "../../../../crates/liter-llm", features = ["native-http", "full"] }
rustler = "0.38"
serde = { version = "1", features = ["derive"] }
serde_json = "1"
tokio = { version = "1", features = ["rt-multi-thread", "sync"] }
