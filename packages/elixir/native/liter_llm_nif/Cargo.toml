[package]
name = "liter_llm_nif"
version = "1.6.4"
edition = "2024"
license = "MIT"
description = "Universal LLM API client with Rust-powered polyglot bindings."
readme = false
keywords = ["anthropic", "api-client", "llm", "openai"]
categories = []

[package.metadata.cargo-machete]
ignored = ["tokio", "futures-util", "alloc-no-stdlib", "alloc-stdlib", "brotli-decompressor"]

[workspace]

[lib]
name = "liter_llm_nif"

crate-type = ["cdylib"]

[features]
# liter-llm does NOT define `config`, `download`, or `serde` as features —
# alef's canonical rustler feature list (alef 0.25.x) is over-generalised
# from tslp. Until alef derives features from the actual core Cargo.toml,
# enumerate only the ones that exist on liter-llm.
default = ["native-http", "opendal-cache", "wasm-http"]
native-http = ["liter-llm/native-http"]
opendal-cache = ["liter-llm/opendal-cache"]
wasm-http = ["liter-llm/wasm-http"]

[dependencies]
alloc-no-stdlib = "=2.0.4"
alloc-stdlib = "=0.2.2"
brotli-decompressor = "=5.0.1"
futures-util = "0.3"
liter-llm = { version = "1.6.4", path = "../../../../crates/liter-llm", features = ["native-http", "full"] }
rustler = "0.38"
serde = { version = "1", features = ["derive"] }
serde_json = "1"
tokio = { version = "1", features = ["rt-multi-thread", "sync"] }
[lints.rust]
unexpected_cfgs = { level = "warn", check-cfg = ['cfg(feature, values("config", "download", "native-http", "opendal-cache", "serde", "wasm-http"))'] }
