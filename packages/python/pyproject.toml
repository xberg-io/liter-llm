[build-system]
build-backend = "maturin"
requires = [ "maturin>=1,<2" ]

[project]
name = "liter-llm"
version = "1.4.0rc27"
description = "Universal LLM API client with Rust-powered polyglot bindings."
keywords = [ "anthropic", "api-client", "llm", "openai" ]
license = "MIT"
authors = [ { name = "Na'aman Hirschfeld" } ]
requires-python = ">=3.10"
classifiers = [
  "Programming Language :: Python :: 3 :: Only",
  "Programming Language :: Python :: 3.10",
  "Programming Language :: Python :: 3.11",
  "Programming Language :: Python :: 3.12",
  "Programming Language :: Python :: 3.13",
  "Programming Language :: Python :: 3.14",
]
urls.repository = "https://github.com/kreuzberg-dev/liter-llm"

[dependency-groups]
dev = [ "mypy>=1.19", "ruff>=0.14.8" ]

[tool.maturin]
module-name = "liter_llm._internal_bindings"
manifest-path = "../../crates/liter-llm-py/Cargo.toml"
features = [ "pyo3/extension-module" ]
python-packages = [ "liter_llm" ]

[tool.ruff]
target-version = "py310"
line-length = 120
format.docstring-code-line-length = 120
format.docstring-code-format = true
lint.select = [ "ALL" ]
lint.ignore = [
  "ANN401",
  "ASYNC109",
  "ASYNC110",
  "BLE001",
  "COM812",
  "D100",
  "D104",
  "D107",
  "D205",
  "E501",
  "EM",
  "FBT",
  "FIX",
  "ISC001",
  "PD011",
  "PGH003",
  "PLR2004",
  "PLW0603",
  "S104",
  "S110",
  "S603",
  "TD",
  "TRY",
]
lint.per-file-ignores."tests/**" = [ "ANN", "D103", "PLR2004", "S101" ]
lint.mccabe.max-complexity = 15
lint.pydocstyle.convention = "google"
lint.pylint.max-args = 10
lint.pylint.max-branches = 15
lint.pylint.max-returns = 10

[tool.mypy]
python_version = "3.10"
strict = true
show_error_codes = true
implicit_reexport = false
namespace_packages = true
