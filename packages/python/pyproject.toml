[build-system]
build-backend = "maturin"
requires = ["maturin>=1,<2"]

[project]
name = "liter-llm"
version = "1.9.3"
description = "Universal LLM API client with Rust-powered polyglot bindings."
keywords = ["anthropic", "api-client", "llm", "openai"]
license = "MIT"
license-files = ["LICENSE"]
authors = [{ name = "Na'aman Hirschfeld" }]
requires-python = ">=3.10"
classifiers = [
    "Programming Language :: Python :: 3 :: Only",
    "Programming Language :: Python :: 3.10",
    "Programming Language :: Python :: 3.11",
    "Programming Language :: Python :: 3.12",
    "Programming Language :: Python :: 3.13",
    "Programming Language :: Python :: 3.14",
]
urls.repository = "https://github.com/xberg-io/liter-llm"

[dependency-groups]
dev = ["pyrefly>=1.1.1", "ruff>=0.14.8"]

[tool.maturin]
profile = "release"
module-name = "liter_llm._internal_bindings"
manifest-path = "../../crates/liter-llm-py/Cargo.toml"
features = ["pyo3/extension-module", "pyo3/abi3-py310"]
python-packages = ["liter_llm"]

[tool.pyrefly]
python-version = "3.10"
preset = "strict"
[[tool.pyrefly.sub-config]]
matches = "**/api.py"
[tool.pyrefly.sub-config.errors]
bad-argument-type = false
bad-argument-count = false
bad-return = false
not-iterable = false
missing-attribute = false
