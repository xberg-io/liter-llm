[build-system]
build-backend = "maturin"
requires = [ "maturin>=1.0,<2.0" ]

[project]
name = "liter-llm"
version = "1.4.0rc27"
description = "Universal LLM API client with Rust-powered polyglot bindings."
keywords = [ "anthropic", "api-client", "llm", "openai" ]
license = "MIT"
authors = [ { name = "Na'aman Hirschfeld" } ]
requires-python = ">=3.10"
classifiers = [
  "Programming Language :: Python :: 3 :: Only",
  "Programming Language :: Python :: 3.10",
  "Programming Language :: Python :: 3.11",
  "Programming Language :: Python :: 3.12",
  "Programming Language :: Python :: 3.13",
  "Programming Language :: Python :: 3.14",
]
urls.repository = "https://github.com/kreuzberg-dev/liter-llm"
[dependency-groups]
dev = [ "mypy>=1.19.0", "ruff>=0.14.8" ]

[tool.maturin]
module-name = "liter_llm._internal_bindings"
manifest-path = "../../crates/liter-llm-py/Cargo.toml"
# abi3-py310 produces a single wheel per platform that loads on Python 3.10+,
# avoiding a per-Python-version build matrix.
features = [ "pyo3/extension-module", "pyo3/abi3-py310" ]
python-packages = [ "liter_llm" ]

[tool.ruff]
target-version = "py310"
line-length = 120
format.docstring-code-format = true
format.docstring-code-line-length = 120
lint.select = [ "ALL" ]
lint.ignore = [
  "ANN401", "ASYNC109", "ASYNC110", "BLE001", "COM812",
  "D100", "D104", "D107", "D205", "E501", "EM",
  "FBT", "FIX", "ISC001", "PD011", "PGH003", "PLR2004",
  "PLW0603", "S104", "S110", "S603", "TD", "TRY",
]
lint.mccabe.max-complexity = 15
lint.per-file-ignores."tests/**" = [ "ANN", "D103", "PLR2004", "S101" ]
# Alef-generated stubs/wrapper modules ship with conservative
# `# noqa: TC001`/`F401` markers on imports that are conditionally used and
# `from typing import AsyncIterator`/un-sorted import blocks that ruff would
# rewrite on every regen. Disable the cosmetic rules on the generated files
# until the alef Python codegen emits clean output. Remove once fixed
# upstream.
lint.per-file-ignores."liter_llm/api.py" = [ "F401", "I001", "UP035" ]
lint.per-file-ignores."liter_llm/options.py" = [ "F401", "RUF100" ]
lint.per-file-ignores."liter_llm/__init__.py" = [ "I001" ]
lint.pydocstyle.convention = "google"
lint.pylint.max-args = 10
lint.pylint.max-branches = 15
lint.pylint.max-returns = 10

[tool.mypy]
python_version = "3.10"
strict = true
show_error_codes = true
implicit_reexport = false
namespace_packages = true

# The alef-generated `liter_llm.api` wrapper has a known structural mismatch
# between its `options.*` dataclass signatures and the `_internal_bindings.*`
# pyclass types that the pyo3 bindings actually accept/return at runtime.
# pyo3 reconciles the two via FromPyObject, so the runtime works and the
# Python e2e suite passes; mypy only sees the static-type discrepancy. Remove
# these overrides once alef's Python wrapper codegen emits the matching
# converter calls (`_to_rust_*`) and casts the return values.
[[tool.mypy.overrides]]
module = "liter_llm.api"
disable_error_code = [ "call-arg", "arg-type", "return-value", "attr-defined" ]
