[package]
name = "liter-llm-rb"
version = "1.9.3"
edition = "2024"
license = "MIT"
description = "Universal LLM API client with Rust-powered polyglot bindings."
readme = false
keywords = ["anthropic", "api-client", "llm", "openai"]
categories = []

[package.metadata.cargo-machete]
ignored = ["rb-sys"]

[lib]
name = "liter_llm_rb"
path = "../src/lib.rs"
crate-type = ["cdylib"]

[features]
default = ["native-http", "opendal-cache", "wasm-http"]
native-http = ["liter-llm/native-http"]
opendal-cache = ["liter-llm/opendal-cache"]
wasm-http = ["liter-llm/wasm-http"]

[dependencies]
futures = "0.3"
liter-llm = { version = "1.9.3", path = "../../../../../crates/liter-llm", features = ["native-http", "full"] }
magnus = "0.8"
rb-sys = ">=0.9, <0.9.128"
serde = { version = "1", features = ["derive"] }
serde_json = "1"
tokio = { version = "1", features = ["rt-multi-thread"] }
