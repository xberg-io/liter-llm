plugins:
  - rubocop-performance
  - rubocop-rspec

AllCops:
  TargetRubyVersion: 3.2
  NewCops: enable
  SuggestExtensions: false
  Exclude:
    - "vendor/**/*"
    - "tmp/**/*"
    - "lib/**/*.bundle"
    - "ext/**/*"

Style/FrozenStringLiteralComment:
  Enabled: true
  EnforcedStyle: always

Style/StringLiterals:
  Enabled: true
  EnforcedStyle: single_quotes

Style/StringLiteralsInInterpolation:
  Enabled: true
  EnforcedStyle: single_quotes

Style/Documentation:
  Enabled: false

Layout/LineLength:
  Max: 120
  AllowedPatterns:
    - '\A\s*#'
  Exclude:
    - "spec/**/*"

Metrics/MethodLength:
  Max: 20
  Exclude:
    - "spec/**/*"

Metrics/BlockLength:
  Enabled: true
  Max: 350
  CountComments: false

Metrics/AbcSize:
  Max: 20
  Exclude:
    - "spec/**/*"

RSpec/ExampleLength:
  Max: 50

RSpec/MultipleExpectations:
  Max: 25

RSpec/NestedGroups:
  Max: 6

# `lib/liter_llm/native.rb` is alef-generated: one file containing the whole
# DTO surface (request/response structs, enum variants, error type, multiple
# top-level modules). Splitting would either duplicate boilerplate or require
# a multi-file scaffold that alef doesn't currently support.
Metrics/ModuleLength:
  Exclude:
    - "lib/liter_llm/native.rb"

Metrics/CyclomaticComplexity:
  Exclude:
    - "lib/liter_llm/native.rb"

Style/OneClassPerFile:
  Exclude:
    - "lib/liter_llm/native.rb"
