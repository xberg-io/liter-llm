[discovery]
exclude = [
    "**/*.freezed.dart",
    "**/*.g.dart",
    "**/*.jinja",
    "**/*.lock",
    "**/Cargo.lock",
    "**/go.sum",
    "**/package-lock.json",
    "**/pnpm-lock.yaml",
    "**/uv.lock",
    ".alef/**",
    "artifacts/**",
    "dist/**",
    "docs/assets/**",
    "docs/snippets/**",
    "fixtures/**",
    "node_modules/**",
    "readme_templates/**",
    "target/**",
    "templates/readme/**",
    "test_documents/**",
    "vendor/**",
    "**/Cargo.toml",
    "**/frb_generated.rs",
    "crates/*-ffi/include/*.h",
    "packages/dart/lib/src/liter_llm_bridge_generated/**",
    "packages/go/include/*.h",
]

[lint.markdown.rumdl]
disable = ["MD012", "MD013", "MD024", "MD033", "MD036", "MD041", "MD046", "MD051", "MD076"]


[lint.uncomment]
enabled = true
remove_todos = false
remove_fixme = false
remove_docs = false
use_default_ignores = true
preserve_patterns = [
    "SAFETY",
    "HACK",
    "WORKAROUND",
    "NOTE",
    "Copyright",
    "Licensed",
    "License",
    "SPDX",
    "Apache",
    "MIT",
    "WITHOUT WARRANTIES",
    "limitations under the License",
    "copyright",
    "licensed",
    "license",
    "apache",
    "you may not use this file except in compliance",
    "You may obtain a copy of the License",
    "you may obtain a copy of the license",
    "http://www.apache.org/licenses/LICENSE-2.0",
    "http://www.apache.org/licenses/license-2.0",
    "Unless required by applicable law",
    "unless required by applicable law",
    "distributed under the License",
    "distributed under the license",
    "AS IS",
    "as is",
    "without warranties",
    "specific language governing permissions",
    "limitations under the license",
]
[fmt.markdown.rumdl]
disable = ["MD012", "MD013", "MD024", "MD033", "MD036", "MD041", "MD046", "MD051", "MD076"]

[lint.python.ruff]
select = ["ALL"]
ignore = [
    "ANN401",
    "ASYNC109",
    "ASYNC110",
    "BLE001",
    "COM812",
    "D100",
    "D104",
    "D107",
    "D205",
    "E501",
    "EM",
    "FBT",
    "FIX",
    "ISC001",
    "PD011",
    "PGH003",
    "PLR2004",
    "PLW0603",
    "S104",
    "S110",
    "S603",
    "TD",
    "TRY",
]
mccabe_max_complexity = 15
pydocstyle_convention = "google"
pylint_max_args = 10
pylint_max_branches = 15
pylint_max_returns = 10

[lint.php.mago]
select = ["correctness", "security"]
ignore = ["strict-assertions", "use-specific-assertions", "no-redundant-variable", "sensitive-parameter"]
php_version = "8.2"

[lint.typos.extend_words]
Hashi = "Hashi"
ein = "ein"
ist = "ist"

