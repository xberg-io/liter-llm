    "dist/**",
    "docs/assets/**",
    "docs/snippets/**",
    "fixtures/**",
    "node_modules/**",
    "readme_templates/**",
    "target/**",
    "templates/readme/**",
    "test_documents/**",
    "vendor/**",
    "**/Cargo.toml",
    "**/frb_generated.rs",
    "crates/*-ffi/include/*.h",
    "crates/*-ffi/src/lib.rs",
    "packages/dart/lib/src/liter_llm_bridge_generated/**",
    "packages/go/include/*.h",
] }
