[files]
extend-exclude = [
    "fixtures/",
    "e2e/",
    "schemas/",
    "*.lock",
    "*.min.js",
    "vendor/",
    "node_modules/",
    "target/",
    ".alef/",
    ".lycheecache",
    "docs/assets/",
    "*.svg",
    # Auto-generated Java bindings include Jackson imports like
    # `com.fasterxml.jackson.databind.ser.std.*` whose "ser" segment trips typos.
    "packages/java/",
    # Kotlin-android bundles the same Jackson-based Java facade.
    "packages/kotlin-android/src/main/java/",
    # Alef-emitted Swift test sources use hash-suffixed local variable names
    # (e.g. `_vec_choices_equals_7ba7bc0e`) where random hex digit pairs match
    # English typo patterns like `ba` -> `by`/`be`.
    "packages/swift/Tests/",
]

[default.extend-words]
# German text in test fixtures
ist = "ist"
ein = "ein"
# Hyphenated words
mis = "mis"
# Request IDs
ded = "ded"
